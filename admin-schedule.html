<!DOCTYPE html>
<html>
<head>
<title>Admin Schedule</title>
</head>
<body>

<h2>Set Available Time</h2>

<input type="date" id="date">
<input type="time" id="start">
<input type="time" id="end">
<button onclick="setSlot()">Add Slot</button>

<h2 style="margin-top:30px">Booked Times</h2>
<div id="bookedList"></div>

<script>
let backend=null
let token=localStorage.getItem("Token")

async function init(){
backend=(await fetch("server.txt").then(r=>r.text())).trim()
loadBooked()
}
init()

async function setSlot(){
const date=document.getElementById("date").value
const start=document.getElementById("start").value
const end=document.getElementById("end").value

await fetch(backend+"/admin/schedule/set",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({date,start,end})
})

alert("Added")
}

async function loadBooked(){
const r=await fetch(backend+"/admin/schedule/all",{
headers:{Authorization:token}
})
const data=await r.json()

const container=document.getElementById("bookedList")
container.innerHTML=""

for(const date in data){
const day=document.createElement("div")
day.innerHTML="<b>"+date+"</b>"
container.appendChild(day)

data[date].forEach(b=>{
const div=document.createElement("div")
div.textContent=b.start+" - "+b.end+" | Ticket: "+b.ticketId+" | User: "+b.user
container.appendChild(div)
})
}
}
</script>

</body>
</html>
