<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Schedule</title>
<style>
body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#0b0e13;
color:#e6e6e6;
}

.container{
max-width:900px;
margin:40px auto;
padding:20px;
}

.card{
background:#151922;
padding:20px;
border-radius:14px;
box-shadow:0 20px 40px rgba(0,0,0,.5);
margin-bottom:20px;
}

h2{
margin-bottom:15px;
}

input{
background:#0f131a;
border:1px solid #2a2f3a;
color:#fff;
padding:10px;
border-radius:10px;
margin-right:10px;
}

button{
border:none;
padding:10px 16px;
border-radius:10px;
color:#fff;
cursor:pointer;
font-weight:600;
}

.add{
background:#4caf50;
}

.delete{
background:#ff5252;
margin-left:10px;
}

.slot{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
margin-top:10px;
border-radius:10px;
background:#0f131a;
border:1px solid #252a35;
}

.left{
font-size:15px;
}

.right{
text-align:right;
}

.free{
color:#4caf50;
font-weight:600;
}

.booked{
color:#ff5252;
font-weight:600;
}

.meta{
font-size:13px;
opacity:.8;
margin-top:4px;
}

a{
color:#6ea8ff;
text-decoration:none;
}
</style>
</head>
<body>

<div class="container">

<div class="card">
<h2>Set Available Time</h2>
<input type="date" id="date">
<input type="time" id="start">
<input type="time" id="end">
<button class="add" onclick="setSlot()">Add Slot</button>
</div>

<div class="card">
<h2>All Times</h2>
<div id="list"></div>
</div>

</div>

<script>
let backend=null
let token=localStorage.getItem("Token")

async function init(){
backend=(await fetch("server.txt").then(r=>r.text())).trim()
loadAll()
}
init()

async function setSlot(){
const date=document.getElementById("date").value
const start=document.getElementById("start").value
const end=document.getElementById("end").value

await fetch(backend+"/admin/schedule/set",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({date,start,end})
})

loadAll()
}

async function deleteSlot(date,start,end){
await fetch(backend+"/admin/schedule/delete",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({date,start,end})
})

loadAll()
}

async function loadAll(){
const r=await fetch(backend+"/admin/schedule/all",{
headers:{Authorization:token}
})
const booked=await r.json()

const container=document.getElementById("list")
container.innerHTML=""

if(Object.keys(booked).length===0){
container.innerHTML="<div class='meta'>No booked times</div>"
}

for(const date in booked){
const title=document.createElement("div")
title.innerHTML="<h3>"+date+"</h3>"
container.appendChild(title)

booked[date].forEach(slot=>{
const div=document.createElement("div")
div.className="slot"

div.innerHTML=`
<div class="left">
${slot.start} - ${slot.end}
</div>

<div class="right">
<div class="booked">Booked</div>
<div class="meta">${slot.user} • <a href="https://zyphor.cc/support#${slot.ticketId}" target="_blank">${slot.ticketId}</a></div>
<button class="delete" onclick="deleteSlot('${date}','${slot.start}','${slot.end}')">Delete</button>
</div>
`

container.appendChild(div)
})
}
}
</script>

</body>
</html>
