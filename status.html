<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Status</title>
<style>
body{background:#0e0e0e;color:#fff;font-family:Arial;margin:0;padding:20px}
.card{background:#1e1e1e;padding:15px;border-radius:10px;margin-bottom:10px}
.ok{color:#4caf50}
.fail{color:#f44336}
.warn{color:#ff9800}
</style>
</head>
<body>

<h2>Full API Status</h2>
<div id="list"></div>

<script>
let backend=null
let token=null

async function getBackend(){
try{
const r=await fetch("server.txt")
return (await r.text()).trim()
}catch{
return null
}
}

async function checkBackend(){
try{
const res=await fetch(backend+"/changelogs")
return res.ok
}catch{
return false
}
}

async function signupStatus(){
try{
await fetch(backend+"/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:"Status",password:"Status"})
})
}catch{}
}

async function loginTest(){
try{
const res=await fetch(backend+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:"Status",password:"Status"})
})

const data=await res.json()

if(data && data.token){
token=data.token
localStorage.setItem("Token",token)
return true
}

return false
}catch{
return false
}
}

async function testEndpoint(name,ep){
const div=document.createElement("div")
div.className="card"
div.textContent=name+" ... testing"
list.appendChild(div)

const start=Date.now()

try{
const res=await fetch(backend+ep.url,{
method:ep.method,
headers:{
"Content-Type":"application/json",
Authorization:token||""
},
body:ep.method==="POST"?JSON.stringify(ep.body||{}):undefined
})

const time=Date.now()-start
const ok=res.ok

div.innerHTML=`${name} - <span class="${ok?"ok":"fail"}">${ok?"SUCCESS":"FAILED"}</span> (${res.status}) - ${time}ms`
}catch{
div.innerHTML=`${name} - <span class="fail">FAILED</span>`
}
}

async function run(){
backend=await getBackend()
const list=document.getElementById("list")
list.innerHTML=""

if(!backend){
list.innerHTML=`<div class="card fail">Backend URL not found</div>`
return
}

const backendDiv=document.createElement("div")
backendDiv.className="card"
backendDiv.textContent="Checking backend..."
list.appendChild(backendDiv)

const up=await checkBackend()

if(!up){
backendDiv.innerHTML=`Backend - <span class="fail">OFFLINE</span>`
return
}

backendDiv.innerHTML=`Backend - <span class="ok">ONLINE</span>`

await signupStatus()

await testEndpoint("/login (Status/Status)",{
url:"/login",
method:"POST",
body:{username:"Status",password:"Status"}
})

const loginRes=await fetch(backend+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:"Status",password:"Status"})
})

const loginData=await loginRes.json()
if(loginData && loginData.token){
token=loginData.token
localStorage.setItem("Token",token)
}

await testEndpoint("/me",{url:"/me",method:"GET"})
await testEndpoint("/quests",{url:"/quests",method:"POST",body:{}})
await testEndpoint("/balance",{url:"/balance",method:"GET"})
await testEndpoint("/history",{url:"/history",method:"GET"})
await testEndpoint("/profile",{url:"/profile?username=Status",method:"GET"})
await testEndpoint("/changelogs",{url:"/changelogs",method:"GET"})

await testEndpoint("/track/page",{url:"/track/page",method:"POST",body:{page:"status.html"}})

await testEndpoint("/support/list",{url:"/support/list",method:"GET"})
await testEndpoint("/support/create",{url:"/support/create",method:"POST",body:{title:"Status Test",reason:"test"}})
await testEndpoint("/support/close",{url:"/support/close",method:"POST",body:{ticketId:"invalid"}})

await testEndpoint("/schedule/available",{url:"/schedule/available?date=2026-01-01",method:"GET"})
await testEndpoint("/schedule/book",{url:"/schedule/book",method:"POST",body:{ticketId:"invalid",date:"2026-01-01",start:"10:00",end:"11:00"}})

await testEndpoint("/2fa/send",{url:"/2fa/send",method:"POST",body:{email:"test@test.com"}})
await testEndpoint("/2fa/verify",{url:"/2fa/verify",method:"POST",body:{code:"000000"}})
await testEndpoint("/2fa/toggle",{url:"/2fa/toggle",method:"POST",body:{enabled:true}})

await testEndpoint("/link-discord",{url:"/link-discord",method:"POST",body:{secret:"invalid",username:"Status",discordId:"1",code:"1234"}})
await testEndpoint("/link-roblox",{url:"/link-roblox",method:"POST",body:{token:"invalid",username:"Status"}})

}

run()
</script>

</body>
</html>
