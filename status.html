<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Status</title>
<style>
body{background:#0e0e0e;color:#fff;font-family:Arial;margin:0;padding:20px}
.card{background:#1e1e1e;padding:15px;border-radius:10px;margin-bottom:10px}
.ok{color:#4caf50}
.fail{color:#f44336}
</style>
</head>
<body>

<h2>Full API Status</h2>
<div id="list"></div>

<script>
let backend=null
let token=null

async function getBackend(){
const r=await fetch("server.txt")
return (await r.text()).trim()
}

async function signupStatus(){
try{
await fetch(backend+"/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:"Status",password:"Status"})
})
}catch{}
}

async function loginTest(){
try{
const res=await fetch(backend+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:"Status",password:"Status"})
})

const data=await res.json()

if(data && data.token){
token=data.token
localStorage.setItem("Token",token)
return true
}

return false
}catch{
return false
}
}

const endpoints=[
{url:"/me",method:"GET"},
{url:"/quests",method:"POST",body:{}},
{url:"/balance",method:"GET"},
{url:"/history",method:"GET"},
{url:"/profile?username=Status",method:"GET"},
{url:"/changelogs",method:"GET"},
{url:"/support/list",method:"GET"},
{url:"/schedule/available?date=2026-01-01",method:"GET"},
{url:"/track/page",method:"POST",body:{page:"status.html"}},
{url:"/2fa/toggle",method:"POST",body:{enabled:true}}
]

async function testEndpoint(ep){
try{
const res=await fetch(backend+ep.url,{
method:ep.method,
headers:{
"Content-Type":"application/json",
Authorization:token||""
},
body:ep.method==="POST"?JSON.stringify(ep.body||{}):undefined
})
return res.ok
}catch{
return false
}
}

async function run(){
backend=await getBackend()
const list=document.getElementById("list")
list.innerHTML=""

const signupDiv=document.createElement("div")
signupDiv.className="card"
signupDiv.textContent="/signup ... testing"
list.appendChild(signupDiv)

await signupStatus()
signupDiv.innerHTML=`/signup (Status/Status) - <span class="ok">DONE</span>`

const loginDiv=document.createElement("div")
loginDiv.className="card"
loginDiv.textContent="/login ... testing"
list.appendChild(loginDiv)

const loginOk=await loginTest()
loginDiv.innerHTML=`/login (Status/Status) - <span class="${loginOk?"ok":"fail"}">${loginOk?"SUCCESS":"FAILED"}</span>`

for(const ep of endpoints){
const div=document.createElement("div")
div.className="card"
div.textContent=ep.url+" ... testing"
list.appendChild(div)

const ok=await testEndpoint(ep)

div.innerHTML=`${ep.url} - <span class="${ok?"ok":"fail"}">${ok?"SUCCESS":"FAILED"}</span>`
}
}

run()
</script>

</body>
</html>
