<!DOCTYPE html>
<html>
<head>
<title>CHAOS OVERLOAD</title>
<style>
*{
box-sizing:border-box;
}

body{
margin:0;
width:100vw;
height:100vh;
overflow:hidden;
background:#000;
color:white;
font-family:Comic Sans MS,Arial;
cursor:none;
user-select:none;
}

#title{
position:fixed;
top:20px;
width:100%;
text-align:center;
font-size:60px;
z-index:99999;
animation:spin .7s infinite linear, rainbow 1s infinite;
}

.thing{
position:absolute;
padding:15px;
border-radius:20px;
font-weight:bold;
animation:move 1s infinite alternate;
box-shadow:0 0 30px white;
}

.explosion{
position:absolute;
font-size:80px;
animation:boom 1s forwards;
}

.fakeError{
position:absolute;
background:white;
color:black;
padding:20px;
border:5px solid red;
font-size:25px;
z-index:5000;
}

button{
position:absolute;
font-size:30px;
border:0;
border-radius:30px;
padding:20px;
background:lime;
box-shadow:0 0 30px lime;
}

#mouse{
position:absolute;
font-size:70px;
z-index:999999;
pointer-events:none;
}

#stats{
position:fixed;
left:10px;
bottom:10px;
font-size:25px;
z-index:999999;
background:#0008;
padding:10px;
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

@keyframes rainbow{
0%{color:red}
20%{color:yellow}
40%{color:lime}
60%{color:cyan}
80%{color:purple}
100%{color:red}
}

@keyframes move{
from{
transform:translate(-100px,-100px) rotate(0deg) scale(.5);
}
to{
transform:translate(100px,100px) rotate(720deg) scale(2);
}
}

@keyframes boom{
to{
transform:scale(5) rotate(720deg);
opacity:0;
}
}
</style>
</head>

<body>

<div id="title">💀 CHAOS OVERLOAD 💀</div>
<div id="mouse">🗿</div>
<div id="stats">Chaos: 0</div>

<script>

let chaos=0

let words=[
"potato.exe failed",
"duck invasion",
"your toaster is angry",
"banana update installed",
"free minecraft diamonds",
"grandma unlocked admin",
"NPC FOUND",
"your chair disconnected",
"water needs charging",
"installing more internet",
"cheese escaped prison",
"fish bought shoes",
"keyboard needs therapy",
"ERROR 69420",
"AI potato activated",
"microwave joined chat",
"spoon detected",
"floor is loading",
"air subscription expired",
"clown mode enabled",
"dog downloaded RAM"
]

let emojis=[
"💀","🤡","🗿","🥔","🐸",
"🦆","🔥","👽","🚀","🍞",
"🧀","🐟","💣","👾","🤖",
"🌈","🍌","🐒"
]

function r(a,b){
return Math.random()*(b-a)+a
}

function randomColor(){
return `rgb(${r(0,255)},${r(0,255)},${r(0,255)})`
}

function spawnText(){
let d=document.createElement("div")

d.className="thing"

d.innerHTML=
words[Math.floor(Math.random()*words.length)]

d.style.left=r(0,innerWidth)+"px"
d.style.top=r(0,innerHeight)+"px"
d.style.fontSize=r(15,80)+"px"

d.style.background=
`linear-gradient(45deg,${randomColor()},${randomColor()})`

d.style.transform=
`rotate(${r(0,360)}deg)`

document.body.appendChild(d)

setTimeout(()=>{
d.remove()
},10000)
}

function spawnEmoji(){

let e=document.createElement("div")

e.className="explosion"

e.innerHTML=
emojis[Math.floor(Math.random()*emojis.length)]

e.style.left=r(0,innerWidth)+"px"
e.style.top=r(0,innerHeight)+"px"

document.body.appendChild(e)

setTimeout(()=>{
e.remove()
},2000)

}


function fakeError(){

let x=document.createElement("div")

x.className="fakeError"

x.innerHTML=
"WINDOWS ERROR<br>Reason: Too much potato"

x.style.left=r(0,innerWidth-300)+"px"
x.style.top=r(0,innerHeight-200)+"px"

document.body.appendChild(x)

setTimeout(()=>{
x.remove()
},4000)

}


function chaosButton(){

let b=document.createElement("button")

b.innerHTML="DO NOT PRESS"

b.style.left=r(0,innerWidth)+"px"
b.style.top=r(0,innerHeight)+"px"

b.onclick=()=>{

chaos+=999

stats.innerHTML="Chaos: "+chaos

for(let i=0;i<300;i++){
spawnText()
spawnEmoji()
}

document.body.style.background=randomColor()

}

document.body.appendChild(b)

setTimeout(()=>{
b.remove()
},3000)

}


setInterval(()=>{

for(let i=0;i<50;i++){
spawnText()
}

},300)


setInterval(()=>{

for(let i=0;i<30;i++){
spawnEmoji()
}

},400)


setInterval(()=>{

for(let i=0;i<5;i++){
chaosButton()
}

},1000)


setInterval(()=>{

fakeError()

},1500)


setInterval(()=>{

document.body.style.filter=
`hue-rotate(${r(0,360)}deg)`

document.title=[
"HELP",
"CPU MELTING",
"POTATO VIRUS",
"WHAT IS HAPPENING",
"CHAOS LEVEL MAX"
][Math.floor(Math.random()*5)]

},100)


document.onmousemove=e=>{

mouse.style.left=e.clientX+"px"
mouse.style.top=e.clientY+"px"

for(let i=0;i<10;i++){
spawnEmoji()
}

}


document.onclick=()=>{

chaos++

stats.innerHTML="Chaos: "+chaos

for(let i=0;i<500;i++){
spawnText()
spawnEmoji()
}

}


setInterval(()=>{

let shakeX=r(-20,20)
let shakeY=r(-20,20)

document.body.style.transform=
`translate(${shakeX}px,${shakeY}px)`

},50)


</script>

</body>
</html>
