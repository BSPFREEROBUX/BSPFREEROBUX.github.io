<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ULTIMATE WIN</title>

<style>
html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:Impact,Arial;
background:#000;
color:white;
cursor:pointer;
}

body{
animation:bg 5s infinite;
}

@keyframes bg{
0%{background:#ff0055}
20%{background:#5500ff}
40%{background:#00ffee}
60%{background:#00ff44}
80%{background:#ffaa00}
100%{background:#ff0055}
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:100;
animation:shake .15s infinite;
}

h1{
font-size:80px;
text-shadow:
0 0 20px white,
0 0 60px gold,
0 0 120px yellow;
animation:rainbow .8s infinite,zoom 1s infinite;
}

h2{
font-size:40px;
animation:spinText 5s infinite linear;
}

button{
font-size:40px;
padding:25px 70px;
border:0;
border-radius:50px;
background:gold;
box-shadow:0 0 80px yellow;
animation:pulse .3s infinite;
}

@keyframes shake{
0%{translate:5px}
50%{translate:-5px}
}

@keyframes zoom{
50%{scale:1.2}
}

@keyframes pulse{
50%{scale:1.3}
}

@keyframes rainbow{
0%{color:red}
20%{color:yellow}
40%{color:lime}
60%{color:cyan}
80%{color:violet}
100%{color:red}
}

@keyframes spinText{
100%{rotate:360deg}
}

.item{
position:absolute;
pointer-events:none;
}

.confetti{
width:15px;
height:15px;
animation:fall linear infinite;
}

@keyframes fall{
100%{
transform:translateY(120vh) rotate(1500deg);
}
}

.float{
font-size:45px;
animation:float 5s linear infinite;
}

@keyframes float{
from{
top:110%;
}
to{
top:-20%;
rotate:720deg;
}
}

.laser{
position:absolute;
height:5px;
width:200%;
background:white;
box-shadow:0 0 30px white;
animation:laser 3s infinite;
}

@keyframes laser{
100%{
rotate:360deg;
}
}

.explode{
width:10px;
height:10px;
border-radius:50%;
animation:explode 1s forwards;
}

@keyframes explode{
100%{
box-shadow:
100px 0 red,
-100px 0 blue,
0 100px lime,
0 -100px yellow,
80px 80px pink,
-80px -80px cyan;
opacity:0;
}
}

.popup{
position:absolute;
font-size:35px;
padding:15px;
background:#0008;
border:3px solid white;
border-radius:20px;
animation:pop 2s forwards;
}

@keyframes pop{
50%{scale:2}
100%{
opacity:0;
rotate:360deg;
}
}

.ring{
position:absolute;
border:5px solid white;
border-radius:50%;
animation:ring 1.5s forwards;
}

@keyframes ring{
100%{
width:400px;
height:400px;
opacity:0;
}
}

.screenflash{
position:absolute;
inset:0;
background:white;
z-index:99;
pointer-events:none;
animation:flash 3s infinite;
}

@keyframes flash{
5%{opacity:.5}
10%{opacity:0}
}

</style>
</head>


<body>

<div class="screenflash"></div>

<div class="center">
<h1>🎉 YOU WON 🎉</h1>
<h1>💎 1,000,000 ROBUX 💎</h1>
<h2>OPEN A TICKET TO CLAIM</h2>
<button>🎁 CLAIM NOW 🎁</button>
</div>


<script>

let emojis=[
"💎","💰","🪙","🎁",
"🎉","🔥","⭐","🚀",
"👑","✨","🌈","🏆"
];

let colors=[
"red",
"blue",
"yellow",
"lime",
"cyan",
"pink",
"orange",
"purple"
];


for(let i=0;i<800;i++){
let e=document.createElement("div");
e.className="item confetti";
e.style.background=colors[Math.floor(Math.random()*colors.length)];
e.style.left=Math.random()*100+"%";
e.style.animationDuration=Math.random()*4+1+"s";
e.style.animationDelay=Math.random()*5+"s";
document.body.appendChild(e);
}


for(let i=0;i<200;i++){
let e=document.createElement("div");
e.className="item float";
e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
e.style.left=Math.random()*100+"%";
e.style.animationDelay=Math.random()*5+"s";
document.body.appendChild(e);
}


for(let i=0;i<15;i++){
let l=document.createElement("div");
l.className="laser";
l.style.top=Math.random()*100+"%";
document.body.appendChild(l);
}


setInterval(()=>{

let e=document.createElement("div");
e.className="item explode";
e.style.left=Math.random()*100+"%";
e.style.top=Math.random()*100+"%";
e.style.background=colors[Math.floor(Math.random()*colors.length)];
document.body.appendChild(e);

setTimeout(()=>{
e.remove();
},1000);

},80);



setInterval(()=>{

let p=document.createElement("div");

p.className="popup";

p.innerHTML=[
"🎊 MEGA WIN 🎊",
"💎 +1M ROBUX 💎",
"🔥 LEGENDARY 🔥",
"👑 JACKPOT 👑",
"🎁 CLAIM NOW 🎁"
][Math.floor(Math.random()*5)];

p.style.left=Math.random()*80+"%";
p.style.top=Math.random()*80+"%";

document.body.appendChild(p);

setTimeout(()=>{
p.remove();
},2000);

},350);



setInterval(()=>{

let r=document.createElement("div");

r.className="ring";

r.style.left=Math.random()*100+"%";
r.style.top=Math.random()*100+"%";

document.body.appendChild(r);

setTimeout(()=>{
r.remove();
},1500);

},200);



document.onclick=()=>{

for(let i=0;i<50;i++){

let boom=document.createElement("div");

boom.className="item float";

boom.innerHTML="💎";

boom.style.left=Math.random()*100+"%";

boom.style.top=Math.random()*100+"%";

document.body.appendChild(boom);

setTimeout(()=>{
boom.remove();
},3000);

}

};


</script>

</body>
</html>
