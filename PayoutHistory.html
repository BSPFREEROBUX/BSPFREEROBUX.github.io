<!DOCTYPE html>
<html>
<head>
<title>THE CHAOS MACHINE</title>
<style>
*{
box-sizing:border-box;
}

body{
margin:0;
width:100vw;
height:100vh;
overflow:hidden;
background:#000;
font-family:"Comic Sans MS",Arial;
color:white;
user-select:none;
cursor:none;
}

#world{
position:absolute;
width:100%;
height:100%;
}

#cursor{
position:absolute;
font-size:70px;
z-index:999999;
pointer-events:none;
}

#hud{
position:fixed;
top:10px;
left:10px;
background:#000a;
padding:15px;
border-radius:15px;
font-size:20px;
z-index:99999;
}

#boss{
position:absolute;
font-size:150px;
z-index:50;
}

.thing{
position:absolute;
font-weight:bold;
border-radius:20px;
padding:20px;
box-shadow:0 0 30px white;
animation:wiggle .4s infinite alternate;
}

.enemy{
position:absolute;
font-size:80px;
transition:.2s;
}

.window{
position:absolute;
background:#ddd;
color:black;
border:4px solid #555;
width:300px;
height:180px;
z-index:999;
}

.bar{
background:#005eff;
color:white;
padding:5px;
}

.window button{
margin:20px;
}

.laser{
position:absolute;
height:8px;
background:red;
box-shadow:0 0 30px red;
}

.rain{
position:absolute;
font-size:40px;
animation:fall 3s linear;
}

@keyframes fall{
from{top:-100px}
to{top:120vh}
}

@keyframes wiggle{
0%{transform:rotate(-20deg) scale(.7)}
100%{transform:rotate(20deg) scale(1.5)}
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

</style>
</head>

<body>

<div id="world"></div>

<div id="hud">
CHAOS: <span id="score">0</span><br>
FPS DESTROYER: ACTIVE<br>
POTATO AI: ONLINE
</div>

<div id="cursor">🗿</div>

<div id="boss">🥔</div>

<script>

let chaos=0

let words=[
"YOUR PC IS CONFUSED",
"DUCK.EXE",
"BANANA UPDATE",
"POTATO HAS ADMIN",
"AI FRIDGE ONLINE",
"404 IQ",
"FBI OPEN UP",
"YOUR MOUSE LEFT",
"DOWNLOADING RAM",
"TOASTER REVOLUTION",
"GRANDMA SPEEDRUN",
"CHAOS MODE"
]

let emojis=[
"💀","🤡","🥔","🦆","🐸",
"🔥","💣","👽","🚀","🐟",
"🧀","🍌","🤖"
]


function r(a,b){
return Math.random()*(b-a)+a
}

function color(){
return `rgb(${r(0,255)},${r(0,255)},${r(0,255)})`
}


function text(){

let x=document.createElement("div")

x.className="thing"

x.innerHTML=words[Math.floor(Math.random()*words.length)]

x.style.left=r(0,innerWidth)+"px"
x.style.top=r(0,innerHeight)+"px"
x.style.fontSize=r(15,70)+"px"
x.style.background=color()

world.appendChild(x)

setTimeout(()=>{
x.remove()
},8000)

}


function enemy(){

let e=document.createElement("div")

e.className="enemy"

e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)]

e.style.left=r(0,innerWidth)+"px"
e.style.top=r(0,innerHeight)+"px"

world.appendChild(e)

let move=setInterval(()=>{

e.style.left=r(0,innerWidth)+"px"
e.style.top=r(0,innerHeight)+"px"

},300)

setTimeout(()=>{
clearInterval(move)
e.remove()
},7000)

}


function popup(){

let w=document.createElement("div")

w.className="window"

w.style.left=r(0,innerWidth-300)+"px"
w.style.top=r(0,innerHeight-200)+"px"

w.innerHTML=
`
<div class="bar">Windows</div>
<br>
SYSTEM ERROR:<br>
Too many potatoes detected
<br>
<button>OK</button>
`

document.body.appendChild(w)

setTimeout(()=>{
w.remove()
},6000)

}


function laser(){

let l=document.createElement("div")

l.className="laser"

l.style.left="0px"
l.style.top=r(0,innerHeight)+"px"

l.style.width=innerWidth+"px"

document.body.appendChild(l)

setTimeout(()=>{
l.remove()
},300)

}


function rain(){

let x=document.createElement("div")

x.className="rain"

x.innerHTML=emojis[Math.floor(Math.random()*emojis.length)]

x.style.left=r(0,innerWidth)+"px"

document.body.appendChild(x)

setTimeout(()=>{
x.remove()
},3000)

}


function cloneScreen(){

let c=document.body.cloneNode(true)

c.style.position="absolute"
c.style.transform=
`scale(.2) rotate(${r(0,360)}deg)`

c.style.left=r(0,innerWidth)+"px"
c.style.top=r(0,innerHeight)+"px"

document.body.appendChild(c)

setTimeout(()=>{
c.remove()
},3000)

}


setInterval(()=>{

for(let i=0;i<10;i++){
text()
enemy()
}

},300)


setInterval(()=>{

for(let i=0;i<20;i++){
rain()
}

},200)


setInterval(()=>{
popup()
},1500)


setInterval(()=>{
laser()
},500)


setInterval(()=>{

boss.style.left=r(0,innerWidth)+"px"
boss.style.top=r(0,innerHeight)+"px"
boss.style.transform=
`rotate(${r(0,360)}deg) scale(${r(.5,3)})`

},200)


setInterval(()=>{

document.body.style.background=color()

document.body.style.filter=
`
hue-rotate(${r(0,360)}deg)
contrast(${r(1,5)})
`

document.body.style.transform=
`translate(${r(-20,20)}px,${r(-20,20)}px)`

},100)


setInterval(()=>{

cloneScreen()

},4000)


document.onclick=()=>{

chaos+=999

score.innerHTML=chaos

for(let i=0;i<300;i++){
text()
enemy()
rain()
}

}


document.onmousemove=e=>{

cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"

if(Math.random()>.5){
laser()
}

}


setInterval(()=>{

document.title=[
"CPU SCREAMING",
"POTATO TAKEOVER",
"ERROR ERROR ERROR",
"CHAOS WON",
"RUN"
][Math.floor(Math.random()*5)]

},100)


</script>

</body>
</html>
