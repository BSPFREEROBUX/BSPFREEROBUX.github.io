<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ULTIMATE PARTY</title>

<style>
html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
font-family:Impact,Arial;
background:#000;
color:white;
}

body{
animation:bg 3s infinite,hue 2s infinite;
}

@keyframes hue{
100%{filter:hue-rotate(360deg)}
}

@keyframes bg{
0%{background:#ff0044}
25%{background:#001eff}
50%{background:#00ff88}
75%{background:#ffaa00}
100%{background:#ff0044}
}

.main{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:999;
animation:shake .08s infinite;
}

h1{
font-size:90px;
animation:
pulse .5s infinite,
color .5s infinite;
text-shadow:
0 0 20px white,
0 0 80px yellow;
}

h2{
font-size:45px;
}

button{
font-size:40px;
border:0;
padding:25px 80px;
border-radius:50px;
background:gold;
box-shadow:0 0 80px gold;
animation:pulse .4s infinite;
}

@keyframes pulse{
50%{scale:1.25}
}

@keyframes shake{
25%{translate:10px}
50%{translate:-10px}
}

@keyframes color{
0%{color:red}
25%{color:yellow}
50%{color:cyan}
75%{color:lime}
100%{color:red}
}


.obj{
position:absolute;
pointer-events:none;
}


.rain{
font-size:45px;
animation:rain linear infinite;
}

@keyframes rain{
from{
top:-100px;
rotate:0deg;
}
to{
top:120%;
rotate:1000deg;
}
}


.ball{
width:30px;
height:30px;
border-radius:50%;
animation:bounce 3s infinite;
}

@keyframes bounce{
50%{
transform:translateY(500px);
}
}


.portal{
border-radius:50%;
border:8px solid white;
animation:portal 2s forwards;
}

@keyframes portal{
100%{
width:800px;
height:800px;
opacity:0;
rotate:720deg;
}
}


.wave{
position:absolute;
width:200%;
height:50px;
background:white;
animation:wave 3s infinite;
opacity:.5;
}

@keyframes wave{
100%{
rotate:360deg;
}
}


.bubble{
border-radius:50%;
background:#ffffff66;
animation:bubble 6s linear infinite;
}

@keyframes bubble{
from{
bottom:-100px;
}
to{
bottom:120%;
}
}


.text{
font-size:35px;
animation:text 2s forwards;
}

@keyframes text{
100%{
scale:3;
opacity:0;
rotate:360deg;
}
}


.comet{
font-size:60px;
animation:comet 2s linear forwards;
}

@keyframes comet{
100%{
translate:1500px 900px;
rotate:1000deg;
}
}


.eye{
position:absolute;
inset:0;
background:
radial-gradient(circle,transparent 20%,black 70%);
animation:eye 5s infinite;
pointer-events:none;
}

@keyframes eye{
50%{
scale:2;
opacity:.2;
}
}

</style>
</head>

<body>

<div class="eye"></div>

<div class="main">

<h1>🎉 YOU WON 🎉</h1>

<h1>
💎 1,000,000 ROBUX 💎
</h1>

<h2>
OPEN A TICKET TO CLAIM
</h2>

<button>
🎁 CLAIM 🎁
</button>

</div>


<script>

let emojis=[
"💎",
"💰",
"🎁",
"🎉",
"🔥",
"⭐",
"🚀",
"👑",
"🤑",
"🌈",
"⚡",
"🏆"
];


let colors=[
"red",
"blue",
"lime",
"yellow",
"cyan",
"orange",
"pink"
];



for(let i=0;i<400;i++){

let x=document.createElement("div");

x.className="obj rain";

x.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

x.style.left=Math.random()*100+"%";

x.style.animationDuration=
Math.random()*4+2+"s";

document.body.appendChild(x);

}



for(let i=0;i<80;i++){

let b=document.createElement("div");

b.className="obj ball";

b.style.left=Math.random()*100+"%";

b.style.background=
colors[Math.floor(Math.random()*colors.length)];

document.body.appendChild(b);

}



for(let i=0;i<20;i++){

let w=document.createElement("div");

w.className="wave";

w.style.top=Math.random()*100+"%";

document.body.appendChild(w);

}



setInterval(()=>{

let p=document.createElement("div");

p.className="obj portal";

p.style.left=Math.random()*100+"%";

p.style.top=Math.random()*100+"%";

document.body.appendChild(p);

setTimeout(()=>{
p.remove()
},2000);

},500);




setInterval(()=>{

let b=document.createElement("div");

b.className="obj bubble";

let size=Math.random()*100+20;

b.style.width=size+"px";

b.style.height=size+"px";

b.style.left=Math.random()*100+"%";

document.body.appendChild(b);

setTimeout(()=>{
b.remove()
},6000)

},100);




setInterval(()=>{

let t=document.createElement("div");

t.className="obj text";

t.innerHTML=[
"🎊 HUGE WIN",
"💎 RICH",
"🔥 INSANE",
"👑 LEGENDARY",
"🎁 OPEN TICKET",
"🚀 WOW"
][Math.floor(Math.random()*6)];

t.style.left=Math.random()*80+"%";

t.style.top=Math.random()*80+"%";

document.body.appendChild(t);


setTimeout(()=>{
t.remove()
},2000);


},300);




setInterval(()=>{

let c=document.createElement("div");

c.className="obj comet";

c.innerHTML="☄️";

c.style.left="-100px";

c.style.top=Math.random()*100+"%";

document.body.appendChild(c);


setTimeout(()=>{
c.remove()
},2000);


},400);




document.onclick=e=>{

for(let i=0;i<100;i++){

let x=document.createElement("div");

x.className="obj text";

x.innerHTML="💎";

x.style.left=e.clientX+"px";

x.style.top=e.clientY+"px";

document.body.appendChild(x);


setTimeout(()=>{
x.remove()
},2000)

}

}


</script>

</body>
</html>
