<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payout History</title>

<link id="themeStylesheet" rel="stylesheet" href="styles.css">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#0e0e0e;
color:white;
font-family:Arial,sans-serif;
min-height:100vh;
}

body.light{
background:#f2f2f2;
color:#111;
}

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
background:#121212;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
}

body.light .topbar{
background:white;
}

.wrapper{
max-width:900px;
margin:auto;
padding:100px 20px 20px;
}

.card{
background:#1e1e1e;
padding:20px;
border-radius:15px;
margin-bottom:15px;
animation:show .3s ease;
}

body.light .card{
background:white;
box-shadow:0 2px 8px #0002;
}

@keyframes show{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.amount{
font-size:32px;
font-weight:bold;
color:#22c55e;
}

.reason{
margin-top:10px;
font-size:17px;
}

.time{
margin-top:15px;
opacity:.6;
font-size:13px;
}

.empty{
text-align:center;
font-size:25px;
opacity:.5;
margin-top:100px;
}

.vipName{
position:relative;
display:inline-block;
padding-top:18px;
color:#ffd54a;
font-weight:bold;
}

.vipName::before{
content:"";
position:absolute;
top:-2px;
left:50%;
width:2px;
height:18px;
background:linear-gradient(to bottom,#ddd,#777);
transform:translateX(-50%);
}

.vipName::after{
content:"";
position:absolute;
top:-18px;
left:50%;
width:18px;
height:14px;
background:#ffd700;
transform:translateX(-50%) rotate(-8deg);
clip-path:polygon(
0% 100%,
0% 45%,
18% 0%,
35% 40%,
50% 8%,
65% 40%,
82% 0%,
100% 45%,
100% 100%
);
animation:swing 2.5s infinite;
}

@keyframes swing{

50%{
transform:translateX(-50%) rotate(8deg);
}

}

button{
background:#2563eb;
color:white;
border:0;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>


<body>


<div class="topbar">

<div id="userDisplay">
Loading...
</div>

<div>

<button onclick="location.href='dashboard.html'">
Dashboard
</button>

<button onclick="toggleTheme()">
🌓
</button>

</div>

</div>



<div class="wrapper">

<h1>💵 Payout History</h1>

<div id="list"></div>

</div>



<script src="theme.js"></script>


<script>

let backend=""



function applySavedTheme(){

let saved=localStorage.getItem("siteTheme")

if(saved){

document.getElementById("themeStylesheet").href=saved

}

}



async function getBackend(){

let r=await fetch("server.txt")

backend=(await r.text()).trim()

}



async function loadUser(){

let token=localStorage.getItem("Token")

if(!token){

location.href="login.html"

return

}


let r=await fetch(backend+"/me",{

headers:{
Authorization:token
}

})


let d=await r.json()


if(d.error){

localStorage.removeItem("Token")

location.href="login.html"

return

}



if(d.permissions && d.permissions.vip){

userDisplay.innerHTML=
`Logged in as: <span class="vipName">${d.username}</span>`

}else{

userDisplay.textContent=
"Logged in as: "+d.username

}

}



async function loadPayouts(){


let token=localStorage.getItem("Token")


let r=await fetch(backend+"/payout/history",{

headers:{
Authorization:token
}

})


let d=await r.json()


list.innerHTML=""


if(!d.history || d.history.length===0){


list.innerHTML=
`
<div class="empty">

No payouts yet

</div>
`

return

}



d.history.forEach(p=>{


let div=document.createElement("div")


div.className="card"


div.innerHTML=

`

<div class="amount">

${p.amount} ${p.currency}

</div>


<div class="reason">

${p.reason}

</div>


<div class="time">

${p.time}

</div>


`


list.appendChild(div)


})


}



async function init(){

applySavedTheme()

await getBackend()

await loadUser()

await loadPayouts()

}


init()


</script>


</body>
</html>
