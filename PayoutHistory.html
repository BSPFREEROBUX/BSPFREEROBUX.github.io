<!DOCTYPE html>
<html>
<head>
<title>CHAOS LAB</title>

<style>
body{
margin:0;
width:100vw;
height:100vh;
overflow:hidden;
background:#090909;
font-family:Arial;
color:white;
user-select:none;
}

#scene{
position:absolute;
width:100%;
height:100%;
transition:.3s;
}

#hud{
position:fixed;
top:10px;
left:10px;
z-index:9999;
background:#0009;
padding:12px;
border-radius:10px;
}

.card{
position:absolute;
padding:15px;
border-radius:20px;
background:#222;
box-shadow:0 0 20px white;
animation:float 3s infinite alternate;
}

.bubble{
position:absolute;
border-radius:50%;
animation:grow 2s forwards;
}

.fake{
position:absolute;
background:#eee;
color:#111;
width:260px;
padding:15px;
border-radius:10px;
}

.rain{
position:absolute;
font-size:30px;
animation:fall 5s linear forwards;
}

.star{
position:absolute;
font-size:40px;
animation:spin 2s linear infinite;
}

.eye{
position:absolute;
font-size:60px;
}

.snake{
position:absolute;
height:10px;
background:white;
border-radius:10px;
}

.portal{
position:absolute;
width:120px;
height:120px;
border-radius:50%;
border:15px solid purple;
animation:spin 1s linear infinite;
}

.wave{
position:absolute;
width:200px;
height:200px;
border:5px solid cyan;
border-radius:50%;
animation:grow 2s forwards;
}

@keyframes float{
100%{transform:translateY(-50px)}
}

@keyframes fall{
100%{top:110vh}
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

@keyframes grow{
100%{
transform:scale(4);
opacity:0;
}
}

</style>
</head>

<body>

<div id="scene"></div>

<div id="hud">
CHAOS LEVEL:
<span id="score">0</span>
</div>

<script>

let chaos=0

let things=[
"💀","🤡","🗿","🔥","🥔",
"👽","🚀","🐸","🦆","💣"
]

function r(a,b){
return Math.random()*(b-a)+a
}

function color(){
return `rgb(${r(0,255)},${r(0,255)},${r(0,255)})`
}


function randomText(){
let x=document.createElement("div")
x.className="card"
x.innerHTML=[
"potato mode",
"duck invasion",
"AI toaster",
"banana system",
"reality error"
][Math.floor(r(0,5))]
x.style.left=r(0,innerWidth)+"px"
x.style.top=r(0,innerHeight)+"px"
scene.append(x)
setTimeout(()=>x.remove(),4000)
}


function emojiRain(){
let x=document.createElement("div")
x.className="rain"
x.innerHTML=things[Math.floor(r(0,things.length))]
x.style.left=r(0,innerWidth)+"px"
x.style.top="-50px"
scene.append(x)
setTimeout(()=>x.remove(),5000)
}


function bubble(){
let x=document.createElement("div")
x.className="bubble"
x.style.background=color()
x.style.width="50px"
x.style.height="50px"
x.style.left=r(0,innerWidth)+"px"
x.style.top=r(0,innerHeight)+"px"
scene.append(x)
setTimeout(()=>x.remove(),2000)
}


function fakeWindow(){
let x=document.createElement("div")
x.className="fake"
x.innerHTML="System confused 🤔"
x.style.left=r(0,innerWidth)+"px"
x.style.top=r(0,innerHeight)+"px"
scene.append(x)
setTimeout(()=>x.remove(),3000)
}


function screenEffect(){
let effects=[
"blur(3px)",
"contrast(3)",
"hue-rotate(180deg)",
"invert(1)",
"grayscale(1)",
"saturate(5)"
]

scene.style.filter=
effects[Math.floor(r(0,effects.length))]

setTimeout(()=>{
scene.style.filter=""
},600)
}


function shake(){
scene.style.transform=
`translate(${r(-20,20)}px,${r(-20,20)}px)`

setTimeout(()=>{
scene.style.transform=""
},200)
}


function rotateWorld(){
scene.style.transform=
`rotate(${r(-10,10)}deg)`

setTimeout(()=>{
scene.style.transform=""
},600)
}


function flash(){
document.body.style.background=color()

setTimeout(()=>{
document.body.style.background="#090909"
},300)
}


function eye(){
let x=document.createElement("div")
x.className="eye"
x.innerHTML="👁"
x.style.left=r(0,innerWidth)+"px"
x.style.top=r(0,innerHeight)+"px"
scene.append(x)
setTimeout(()=>x.remove(),3000)
}


function snake(){
let x=document.createElement("div")
x.className="snake"
x.style.width=r(100,500)+"px"
x.style.left=r(0,innerWidth)+"px"
x.style.top=r(0,innerHeight)+"px"
scene.append(x)
setTimeout(()=>x.remove(),3000)
}


function portal(){
let x=document.createElement("div")
x.className="portal"
x.style.left=r(0,innerWidth)+"px"
x.style.top=r(0,innerHeight)+"px"
scene.append(x)
setTimeout(()=>x.remove(),4000)
}


function wave(){
let x=document.createElement("div")
x.className="wave"
x.style.left=r(0,innerWidth)+"px"
x.style.top=r(0,innerHeight)+"px"
scene.append(x)
setTimeout(()=>x.remove(),2000)
}


function gravity(){
document.querySelectorAll(".card").forEach(x=>{
x.style.top=innerHeight+"px"
})
}


function resizeStuff(){
document.body.style.scale=r(.9,1.1)

setTimeout(()=>{
document.body.style.scale=1
},500)
}


function titleSpam(){
document.title=[
"HELP",
"REALITY BROKEN",
"POTATO OS",
"ERROR"
][Math.floor(r(0,4))]
}


function mirror(){
scene.style.scale="-1 1"

setTimeout(()=>{
scene.style.scale="1"
},800)
}


function cursorBomb(e){
for(let i=0;i<10;i++){
bubble()
}
}


let events=[
randomText,
emojiRain,
bubble,
fakeWindow,
screenEffect,
shake,
rotateWorld,
flash,
eye,
snake,
portal,
wave,
gravity,
resizeStuff,
titleSpam,
mirror
]


setInterval(()=>{

for(let i=0;i<3;i++){

events[Math.floor(r(0,events.length))]()

}

chaos++
score.innerHTML=chaos

},500)


document.onclick=e=>{

for(let i=0;i<20;i++){
events[Math.floor(r(0,events.length))]()
}

}


document.onmousemove=cursorBomb


</script>

</body>
</html>
