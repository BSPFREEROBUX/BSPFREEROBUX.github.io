<!DOCTYPE html>
<html>
<head>
<title>CHAOS EVOLUTION</title>
<style>
body{
margin:0;
width:100vw;
height:100vh;
overflow:hidden;
background:#050505;
font-family:Arial;
color:white;
user-select:none;
}

#world{
position:absolute;
width:100%;
height:100%;
transition:.2s;
}

#hud{
position:fixed;
top:10px;
left:10px;
z-index:99999;
background:#000a;
padding:15px;
border-radius:15px;
font-size:18px;
}

.obj{
position:absolute;
padding:15px;
border-radius:20px;
background:#222;
box-shadow:0 0 20px white;
animation:float 2s infinite alternate;
}

.rain{
position:absolute;
font-size:40px;
animation:fall 5s linear forwards;
}

.portal{
position:absolute;
width:150px;
height:150px;
border-radius:50%;
border:20px solid purple;
animation:spin 1s linear infinite;
}

.wave{
position:absolute;
width:50px;
height:50px;
border-radius:50%;
border:5px solid white;
animation:boom 2s forwards;
}

.glitch{
animation:glitch .1s infinite;
}

@keyframes float{
100%{transform:translateY(-80px) rotate(20deg)}
}

@keyframes fall{
100%{top:120vh}
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

@keyframes boom{
100%{
scale:8;
opacity:0;
}
}

@keyframes glitch{
0%{transform:translate(5px,0)}
50%{transform:translate(-5px,5px)}
100%{transform:translate(0)}
}
</style>
</head>

<body>

<div id="world"></div>

<div id="hud">
CHAOS LEVEL:
<span id="level">0</span>
<br>
PHASE:
<span id="phase">NORMAL</span>
</div>


<script>

let chaos=0


let sounds=[
"https://www.myinstants.com/media/sounds/vine-boom.mp3",
"https://www.myinstants.com/media/sounds/windows-xp-error.mp3",
"https://www.myinstants.com/media/sounds/bruh.mp3"
]


function playSound(){

let a=new Audio(
sounds[Math.floor(Math.random()*sounds.length)]
)

a.volume=.3

a.play().catch(()=>{})

}


let emojis=[
"💀","🔥","🥔","👽","🤡",
"🐸","💣","🚀","🦆"
]


let texts=[
"REALITY ERROR",
"POTATO AI ONLINE",
"DUCK HACKING",
"SYSTEM MELTING",
"GRAVITY FAILED",
"TIME BROKEN",
"CHAOS.EXE"
]


function r(a,b){
return Math.random()*(b-a)+a
}


function color(){

return `rgb(${r(0,255)},${r(0,255)},${r(0,255)})`

}


function spawn(){

let x=document.createElement("div")

x.className="obj"

x.innerHTML=
texts[Math.floor(r(0,texts.length))]

x.style.left=r(0,innerWidth)+"px"
x.style.top=r(0,innerHeight)+"px"

x.style.background=color()

world.append(x)

setTimeout(()=>x.remove(),4000)

}


function rain(){

let x=document.createElement("div")

x.className="rain"

x.innerHTML=
emojis[Math.floor(r(0,emojis.length))]

x.style.left=r(0,innerWidth)+"px"

world.append(x)

setTimeout(()=>x.remove(),5000)

}


function shake(){

world.style.transform=
`translate(${r(-chaos/3,chaos/3)}px,${r(-chaos/3,chaos/3)}px)`

setTimeout(()=>world.style.transform="",200)

}


function distort(){

let effects=[
`blur(${chaos/30}px)`,
`hue-rotate(${chaos*10}deg)`,
`contrast(${1+chaos/20})`,
`saturate(${chaos/5})`,
"invert(1)"
]

world.style.filter=
effects[Math.floor(r(0,effects.length))]

setTimeout(()=>{
world.style.filter=""
},600)

}


function portal(){

let x=document.createElement("div")

x.className="portal"

x.style.left=r(0,innerWidth)+"px"
x.style.top=r(0,innerHeight)+"px"

world.append(x)

setTimeout(()=>x.remove(),4000)

}


function wave(){

let x=document.createElement("div")

x.className="wave"

x.style.left=r(0,innerWidth)+"px"
x.style.top=r(0,innerHeight)+"px"

world.append(x)

setTimeout(()=>x.remove(),2000)

}


function gravity(){

document.querySelectorAll(".obj").forEach(x=>{

x.style.top=innerHeight+"px"

})

}


function flip(){

world.style.scale="-1 1"

setTimeout(()=>world.style.scale="1",1000)

}


function rotate(){

world.style.rotate=r(-30,30)+"deg"

setTimeout(()=>world.style.rotate="0deg",800)

}


function flash(){

document.body.style.background=color()

setTimeout(()=>{
document.body.style.background="#050505"
},200)

}


function glitch(){

world.classList.add("glitch")

setTimeout(()=>{
world.classList.remove("glitch")
},1000)

}


function clone(){

let c=world.cloneNode(true)

c.style.opacity=.3

document.body.append(c)

setTimeout(()=>c.remove(),1000)

}


function phaseCheck(){

if(chaos<30){
phase.innerHTML="NORMAL"
}

else if(chaos<80){
phase.innerHTML="WEIRD"
}

else if(chaos<150){
phase.innerHTML="BROKEN"
}

else{
phase.innerHTML="REALITY COLLAPSE"
}

}


let effects=[
spawn,
rain,
shake,
distort,
portal,
wave,
gravity,
flip,
rotate,
flash,
glitch,
clone,
playSound
]


setInterval(()=>{

chaos++

level.innerHTML=chaos

phaseCheck()


let amount=1+Math.floor(chaos/25)

for(let i=0;i<amount;i++){

effects[
Math.floor(r(0,effects.length))
]()

}

},700)


document.onclick=()=>{

chaos+=10

playSound()

for(let i=0;i<20;i++){

effects[
Math.floor(r(0,effects.length))
]()

}

}


document.onmousemove=()=>{

if(chaos>50){

wave()

}

}


</script>

</body>
</html>
