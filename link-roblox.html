<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Link Roblox</title>
<style>
body{
margin:0;
background:#0f0f10;
color:white;
font-family:system-ui;
display:flex;
align-items:center;
justify-content:center;
height:100dvh;
}
.card{
background:#1a1a1b;
padding:30px;
border-radius:12px;
width:350px;
text-align:center;
}
input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
background:#0f0f10;
color:white;
}
button{
margin-top:15px;
padding:10px;
width:100%;
border:none;
border-radius:8px;
background:#5865f2;
color:white;
cursor:pointer;
}
button:hover{
background:#6d78ff;
}
.code{
margin-top:15px;
padding:10px;
background:#0f0f10;
border-radius:8px;
font-weight:bold;
}
.status{
margin-top:10px;
font-size:14px;
opacity:.8;
}
.success{color:#2ecc71;}
.error{color:#e74c3c;}
</style>
</head>
<body>

<div class="card">

<h2>Link Roblox Account</h2>

<div>Put this in your Roblox bio:</div>

<div id="codeBox" class="code"></div>

<input id="username" placeholder="Roblox Username">

<button onclick="verify()">Verify</button>

<div id="status" class="status"></div>

</div>

<script>

const params = new URLSearchParams(location.search)
const token = params.get("token")

document.getElementById("codeBox").textContent = token

async function verify(){

const username = document.getElementById("username").value.trim()
const status = document.getElementById("status")

if(!username){
status.textContent = "Enter a username"
status.className="status error"
return
}

status.textContent = "Verifying..."
status.className="status"

try{

const res = await fetch("/link-roblox",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({token,username})
})

const data = await res.json()

if(data.success){
status.textContent = "Linked successfully"
status.className="status success"
}else{
if(data.error==="invalid") status.textContent="Invalid link"
else if(data.error==="expired") status.textContent="Link expired"
else if(data.error==="nouser") status.textContent="Roblox user not found"
else if(data.error==="nobio") status.textContent="Put the code in your Roblox bio"
else if(data.error==="nodiscordlink") status.textContent="Discord not linked to site"
else status.textContent="Failed"
status.className="status error"
}

}catch(e){
status.textContent = "Server error"
status.className="status error"
}

}

</script>

</body>
</html>
