<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zyphor Store</title>

<script src="https://checkout.komerza.com/embed/embed.iife.js" defer></script>

<style>

body{
margin:0;
background:#0f1117;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.bg{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at top left,#5865f233,transparent 30%),
radial-gradient(circle at bottom right,#00b0ff22,transparent 30%);
z-index:0;
}

.store{
position:relative;
z-index:1;
width:420px;
background:#171c25;
border:1px solid #2d3445;
border-radius:24px;
padding:35px;
box-shadow:0 0 60px rgba(0,0,0,.45);
}

.logo{
font-size:38px;
font-weight:bold;
margin-bottom:10px;
}

.sub{
opacity:.7;
margin-bottom:30px;
}

.card{
background:#202734;
border-radius:18px;
padding:28px;
}

.rank{
font-size:30px;
font-weight:bold;
}

.desc{
margin-top:12px;
opacity:.8;
line-height:1.6;
}

.features{
margin-top:20px;
display:flex;
flex-direction:column;
gap:10px;
opacity:.9;
}

.feature{
background:#161b24;
padding:12px;
border-radius:10px;
}

.price{
margin-top:25px;
font-size:45px;
font-weight:bold;
}

.buy-btn{
width:100%;
margin-top:25px;
padding:16px;
border:none;
border-radius:14px;
background:#5865f2;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.buy-btn:hover{
transform:scale(1.02);
opacity:.92;
}

.buy-btn:disabled{
opacity:.5;
cursor:not-allowed;
transform:none;
}

.status{
margin-top:18px;
text-align:center;
opacity:.8;
font-size:14px;
min-height:20px;
line-height:1.5;
word-break:break-word;
}

.debug{
margin-top:15px;
background:#11151d;
padding:12px;
border-radius:10px;
font-size:12px;
font-family:monospace;
max-height:160px;
overflow:auto;
white-space:pre-wrap;
opacity:.85;
}

</style>
</head>
<body>

<div class="bg"></div>

<div class="store">

<div class="logo">
Zyphor
</div>

<div class="sub">
Official Store
</div>

<div class="card">

<div class="rank">
VIP Rank
</div>

<div class="desc">
Permanent VIP permissions linked directly to your Zyphor account.
Can only be purchased once.
</div>

<div class="features">

<div class="feature">
✓ VIP permissions
</div>

<div class="feature">
✓ Permanent access
</div>

<div class="feature">
✓ Instant automatic delivery
</div>

</div>

<div class="price">
$3
</div>

<button
id="buyBtn"
class="buy-btn"
disabled
>
Buy VIP
</button>

<div class="status" id="status"></div>

<div class="debug" id="debug"></div>

</div>

</div>

<script>

let BACKEND=""

function debug(msg){

console.log(msg)

document.getElementById("debug").innerText +=
msg + "\n"

}

async function loadBackend(){

debug("Loading backend...")

const txt=await fetch("/server.txt").then(r=>r.text())

BACKEND=txt.trim()

debug("Backend: "+BACKEND)

}

async function checkLogin(){

debug("Checking login...")

const token=localStorage.getItem("Token")

if(!token){

debug("No token found")

location.href="/login.html"

return null

}

debug("Token found")

const me=await fetch(
BACKEND+"/me",
{
headers:{
Authorization:token
}
}
).then(r=>r.json())

debug("Me response: "+JSON.stringify(me))

if(me.error){

debug("Login invalid")

localStorage.removeItem("Token")

location.href="/login.html"

return null

}

return me

}

async function trackPage(page){

const token=localStorage.getItem("Token")

if(!token) return

debug("Tracking page: "+page)

await fetch(BACKEND+"/track/page",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({page})
})

}

async function waitForKomerza(){

debug("Waiting for Komerza embed...")

let tries=0

while(
typeof window.Komerza === "undefined" &&
tries < 100
){

tries++

await new Promise(r=>setTimeout(r,100))

}

if(typeof window.Komerza === "undefined"){

debug("Komerza embed failed to load")

return false

}

debug("Komerza embed loaded")

return true

}

async function init(){

const status=document.getElementById("status")
const buyBtn=document.getElementById("buyBtn")

await loadBackend()

await trackPage(
location.pathname.split("/").pop() + location.search
)

const me=await checkLogin()

if(!me) return

status.innerText="Logged in as "+me.username

if(me.permissions && me.permissions.vip){

status.innerText="You already own VIP."

buyBtn.disabled=true

debug("User already owns VIP")

return

}

const loaded=await waitForKomerza()

if(!loaded){

status.innerText="Checkout failed to load."

return

}

buyBtn.disabled=false

debug("Buy button enabled")

buyBtn.onclick=()=>{

debug("Opening Komerza checkout...")

status.innerText="Opening checkout..."

try{

window.Komerza.open({
items:[
{
productId:"e4ec9c04-e3a4-4bd5-be7d-41b4ce82c90c",
variantId:"1ac7a839-ff08-4aed-8eb7-b6ff898d738b",
quantity:1
}
],
theme:"dark",
email:me.email || "",
metadata:{
username:me.username
}
})

debug("Komerza.open called successfully")

}catch(err){

console.error(err)

debug("Checkout error: "+err.message)

status.innerText="Failed to open checkout."

}

}

}

document.addEventListener("DOMContentLoaded",()=>{

debug("DOM loaded")

if(window.Komerza){

debug("Calling Komerza.init()")

window.Komerza.init()

}

})

init()

</script>

</body>
</html>
