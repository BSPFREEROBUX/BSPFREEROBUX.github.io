<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zyphor Store</title>

<script src="https://checkout.komerza.com/embed/embed.iife.js" defer></script>

<style>

body{
margin:0;
background:#0f1117;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.bg{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at top left,#5865f233,transparent 30%),
radial-gradient(circle at bottom right,#00b0ff22,transparent 30%);
z-index:0;
}

.store{
position:relative;
z-index:1;
width:420px;
background:#171c25;
border:1px solid #2d3445;
border-radius:24px;
padding:35px;
box-shadow:0 0 60px rgba(0,0,0,.45);
}

.logo{
font-size:38px;
font-weight:bold;
margin-bottom:10px;
}

.sub{
opacity:.7;
margin-bottom:30px;
}

.card{
background:#202734;
border-radius:18px;
padding:28px;
}

.rank{
font-size:30px;
font-weight:bold;
}

.desc{
margin-top:12px;
opacity:.8;
line-height:1.6;
}

.features{
margin-top:20px;
display:flex;
flex-direction:column;
gap:10px;
opacity:.9;
}

.feature{
background:#161b24;
padding:12px;
border-radius:10px;
}

.price{
margin-top:25px;
font-size:45px;
font-weight:bold;
}

.buy-btn{
width:100%;
margin-top:25px;
padding:16px;
border:none;
border-radius:14px;
background:#5865f2;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.buy-btn:hover{
transform:scale(1.02);
opacity:.92;
}

.buy-btn:disabled{
opacity:.5;
cursor:not-allowed;
transform:none;
}

.status{
margin-top:18px;
text-align:center;
opacity:.8;
font-size:14px;
min-height:20px;
line-height:1.5;
}

.link-btn{
width:100%;
margin-top:15px;
padding:14px;
border:none;
border-radius:12px;
background:#2d3445;
color:white;
font-size:15px;
cursor:pointer;
display:none;
}

</style>
</head>
<body>

<div class="bg"></div>

<div class="store">

<div class="logo">
Zyphor
</div>

<div class="sub">
Official Store
</div>

<div class="card">

<div class="rank">
VIP Rank
</div>

<div class="desc">
Permanent VIP permissions linked directly to your Zyphor account.
Can only be purchased once.
</div>

<div class="features">

<div class="feature">
✓ VIP permissions
</div>

<div class="feature">
✓ Permanent access
</div>

<div class="feature">
✓ Instant automatic delivery
</div>

</div>

<div class="price">
$3
</div>

<button
id="buyBtn"
class="buy-btn"
data-kmrza-product-id="e4ec9c04-e3a4-4bd5-be7d-41b4ce82c90c"
data-kmrza-variant-id="1ac7a839-ff08-4aed-8eb7-b6ff898d738b"
data-kmrza-quantity="1"
data-kmrza-theme="auto"
>
Buy VIP
</button>

<button
id="emailBtn"
class="link-btn"
onclick="location.href='/account.html'"
>
Link Email
</button>

<div class="status" id="status"></div>

</div>

</div>

<script>

let BACKEND=""

async function loadBackend(){

const txt=await fetch("/server.txt").then(r=>r.text())

BACKEND=txt.trim()

}

async function checkLogin(){

const token=localStorage.getItem("Token")

if(!token){

location.href="/login.html"

return null

}

const me=await fetch(
BACKEND+"/me",
{
headers:{
Authorization:token
}
}
).then(r=>r.json())

if(me.error){

localStorage.removeItem("token")

location.href="/login.html"

return null

}

return me

}

async function init(){

const status=document.getElementById("status")
const buyBtn=document.getElementById("buyBtn")
const emailBtn=document.getElementById("emailBtn")

await loadBackend()

const me=await checkLogin()

if(!me) return

status.innerText="Logged in as "+me.username

if(me.permissions && me.permissions.vip){

status.innerText="You already own VIP."

buyBtn.disabled=true

return

}

if(!me.email){

status.innerText="You must link an email before purchasing VIP."

buyBtn.disabled=true

emailBtn.style.display="block"

return

}

buyBtn.addEventListener("click",()=>{

status.innerText="Opening checkout..."

})

}

init()

</script>

</body>
</html>
