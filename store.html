<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zyphor Store</title>

<script src="https://checkout.komerza.com/embed/embed.iife.js" defer></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Inter,Arial,sans-serif;
background:#07090d;
color:white;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#5865f240,transparent 30%),
radial-gradient(circle at bottom right,#00b0ff25,transparent 35%),
linear-gradient(180deg,#0b0f16,#07090d);
overflow:hidden;
}

.glow1{
position:absolute;
width:500px;
height:500px;
background:#5865f220;
filter:blur(120px);
border-radius:50%;
top:-100px;
left:-100px;
}

.glow2{
position:absolute;
width:450px;
height:450px;
background:#00b0ff18;
filter:blur(120px);
border-radius:50%;
bottom:-150px;
right:-100px;
}

.store{
position:relative;
z-index:5;
width:460px;
background:rgba(18,22,30,.95);
border:1px solid rgba(255,255,255,.06);
backdrop-filter:blur(20px);
border-radius:30px;
padding:34px;
box-shadow:
0 20px 80px rgba(0,0,0,.55),
0 0 0 1px rgba(255,255,255,.03) inset;
}

.top{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:28px;
}

.brand{
display:flex;
align-items:center;
gap:14px;
}

.logo{
width:52px;
height:52px;
border-radius:16px;
background:linear-gradient(135deg,#5865f2,#6d7dff);
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:bold;
box-shadow:0 10px 35px rgba(88,101,242,.35);
}

.brand-text{
display:flex;
flex-direction:column;
}

.brand-name{
font-size:24px;
font-weight:800;
}

.brand-sub{
font-size:13px;
opacity:.6;
margin-top:2px;
}

.card{
background:linear-gradient(180deg,#161b24,#10141b);
border:1px solid rgba(255,255,255,.05);
border-radius:24px;
padding:28px;
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
top:-120px;
right:-120px;
width:260px;
height:260px;
background:#5865f215;
border-radius:50%;
filter:blur(10px);
}

.rank{
font-size:38px;
font-weight:900;
letter-spacing:.5px;
}

.desc{
margin-top:12px;
line-height:1.7;
opacity:.78;
font-size:15px;
}

.features{
margin-top:24px;
display:flex;
flex-direction:column;
gap:12px;
}

.feature{
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.04);
padding:14px;
border-radius:14px;
font-size:14px;
display:flex;
align-items:center;
gap:10px;
}

.check{
width:24px;
height:24px;
border-radius:50%;
background:#5865f2;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
font-weight:bold;
flex-shrink:0;
}

.price-wrap{
margin-top:30px;
display:flex;
align-items:flex-end;
gap:8px;
}

.price{
font-size:54px;
font-weight:900;
line-height:1;
}

.currency{
opacity:.65;
font-size:18px;
margin-bottom:6px;
}

.buy-btn{
width:100%;
margin-top:28px;
padding:18px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#5865f2,#7282ff);
color:white;
font-size:18px;
font-weight:800;
cursor:pointer;
transition:.2s;
box-shadow:0 15px 35px rgba(88,101,242,.35);
}

.buy-btn:hover{
transform:translateY(-2px);
}

.buy-btn:active{
transform:scale(.98);
}

.buy-btn:disabled{
opacity:.5;
cursor:not-allowed;
transform:none;
box-shadow:none;
}

.status{
margin-top:18px;
min-height:22px;
text-align:center;
font-size:14px;
opacity:.78;
word-break:break-word;
}

.footer{
margin-top:24px;
text-align:center;
font-size:12px;
opacity:.45;
}

</style>
</head>
<body>

<div class="bg">
<div class="glow1"></div>
<div class="glow2"></div>
</div>

<div class="store">

<div class="top">

<div class="brand">

<div class="logo">
Z
</div>

<div class="brand-text">

<div class="brand-name">
Zyphor
</div>

<div class="brand-sub">
Official VIP Store
</div>

</div>

</div>

</div>

<div class="card">

<div class="rank">
VIP
</div>

<div class="desc">
Unlock permanent VIP permissions directly linked to your Zyphor account with instant automated delivery.
</div>

<div class="features">

<div class="feature">
<div class="check">✓</div>
<div>Permanent VIP permissions</div>
</div>

<div class="feature">
<div class="check">✓</div>
<div>Automatic instant delivery</div>
</div>

<div class="feature">
<div class="check">✓</div>
<div>One-time purchase only</div>
</div>

<div class="feature">
<div class="check">✓</div>
<div>Works directly with your account</div>
</div>

</div>

<div class="price-wrap">
<div class="price">$3</div>
<div class="currency">USD</div>
</div>

<button
id="buyBtn"
class="buy-btn"
>
Buy VIP
</button>

<div class="status" id="status">
Loading...
</div>

</div>

<div class="footer">
Powered by Zyphor
</div>

</div>

<script>

let BACKEND=""

function debug(msg){

console.log(msg)

document.getElementById("status").innerText=msg

}

async function loadBackend(){

const txt=await fetch("/server.txt").then(r=>r.text())

BACKEND=txt.trim()

debug("Backend loaded")

}

async function trackPage(page){

const token=localStorage.getItem("Token")

if(!token) return

try{

await fetch(BACKEND+"/track/page",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({page})
})

}catch(err){

console.error(err)

}

}

async function checkLogin(){

const token=localStorage.getItem("Token")

if(!token){

location.href="/login.html"

return null

}

const me=await fetch(
BACKEND+"/me",
{
headers:{
Authorization:token
}
}
).then(r=>r.json())

if(me.error){

localStorage.removeItem("Token")

location.href="/login.html"

return null

}

return me

}

async function waitForKomerza(){

let tries=0

while(
typeof window.Komerza === "undefined" &&
tries < 100
){

tries++

await new Promise(r=>setTimeout(r,100))

}

return typeof window.Komerza !== "undefined"

}

async function init(){

await loadBackend()

await trackPage("store")

const me=await checkLogin()

if(!me) return

const buyBtn=document.getElementById("buyBtn")

debug("Logged in as "+me.username)

if(me.permissions?.vip){

buyBtn.disabled=true
buyBtn.innerText="Already VIP"

debug("You already own VIP")

return

}

const loaded=await waitForKomerza()

if(!loaded){

debug("Komerza failed to load")

return

}

debug("Store ready")

buyBtn.onclick=()=>{

debug("Opening checkout...")

try{

window.Komerza.open({
theme:"dark",
items:[
{
productId:"e4ec9c04-e3a4-4bd5-be7d-41b4ce82c90c",
variantId:"1ac7a839-ff08-4aed-8eb7-b6ff898d738b",
quantity:1
}
],
metadata:{
username:me.username
}
})

}catch(err){

console.error(err)

debug("Checkout failed")

}

}

}

window.addEventListener("DOMContentLoaded",init)

</script>

</body>
</html>
