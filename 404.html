<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page Not Found</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .box {
      max-width: 500px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    p {
      opacity: 0.8;
      margin-bottom: 20px;
    }
    a {
      text-decoration: none;
      background: #3b82f6;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      transition: 0.2s;
    }
    a:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>This page doesn’t exist.</p>
    <a href="/dashboard.html">Go back home</a>
  </div>
</body>
</html>
