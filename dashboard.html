<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link id="themeStylesheet" rel="stylesheet" href="styles.css">
<style>
*{
box-sizing:border-box;
}

html,body{
margin:0;
font-family:Arial,sans-serif;
background:#0e0e0e;
color:#fff;
overflow-x:hidden;
}

body.light{
background:#f2f2f2;
color:#111;
}

.mouseGlow{
position:fixed;
width:300px;
height:300px;
border-radius:50%;
pointer-events:none;
z-index:0;
background:radial-gradient(circle, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.04) 35%, rgba(0,0,0,0) 70%);
transform:translate(-50%,-50%);
mix-blend-mode:screen;
filter:blur(25px);
transition:transform .03s linear;
}

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:clamp(8px,1.5vw,15px);
background:#121212;
z-index:1000;
flex-wrap:wrap;
}

body.light .topbar{
background:#ffffff;
}

.icons{
display:flex;
flex-wrap:wrap;
gap:clamp(4px,1vw,10px);
}

.icons span{
cursor:pointer;
font-size:clamp(11px,1.2vw,14px);
padding:clamp(5px,1vw,8px) clamp(8px,1.5vw,12px);
border-radius:8px;
background:#1e1e1e;
}

body.light .icons span{
background:#e6e6e6;
}

.wrapper{
max-width:1200px;
margin:auto;
padding:clamp(10px,2vw,20px);
margin-top:clamp(90px,10vh,130px);
}

.vipName{
position:relative;
display:inline-block;
padding-top:18px;
color:#ffd54a;
font-weight:bold;
}

.vipName::before{
content:"";
position:absolute;
top:-2px;
left:50%;
width:2px;
height:18px;
background:linear-gradient(to bottom,#d6d6d6,#888);
transform:translateX(-50%);
z-index:1;
}

.vipName::after{
content:"";
position:absolute;
left:50%;
top:-18px;
width:18px;
height:14px;
background:#ffd700;
transform:
translateX(-50%)
rotate(-8deg);
clip-path:polygon(
0% 100%,
0% 45%,
18% 0%,
35% 40%,
50% 8%,
65% 40%,
82% 0%,
100% 45%,
100% 100%
);
border:2px solid #ffea8a;
box-shadow:
0 0 10px #ffd70088,
0 2px 8px rgba(0,0,0,.35);
transform-origin:top center;
animation:vipSwing 2.8s ease-in-out infinite;
z-index:2;
}

@keyframes vipSwing{

0%{
transform:
translateX(-50%)
rotate(-8deg);
}

50%{
transform:
translateX(-50%)
rotate(8deg);
}

100%{
transform:
translateX(-50%)
rotate(-8deg);
}

}
.main-flex{
display:flex;
gap:clamp(10px,2vw,20px);
align-items:flex-start;
flex-wrap:wrap;
}

.left{
flex:1 1 600px;
min-width:0;
}

.right{
flex:1 1 280px;
max-width:350px;
width:100%;
}

.stats-container{
display:flex;
gap:clamp(10px,2vw,20px);
margin-bottom:clamp(20px,3vw,30px);
flex-wrap:wrap;
}

.stat-box{
background:#1e1e1e;
padding:clamp(12px,2vw,20px);
border-radius:12px;
flex:1 1 250px;
text-align:center;
font-size:clamp(14px,1.5vw,16px);
}

body.light .stat-box{
background:#ffffff;
color:#111;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.stat-inner{
background:#2a2a2a;
margin-top:10px;
padding:clamp(10px,2vw,15px);
border-radius:8px;
font-size:clamp(18px,2.5vw,24px);
}

body.light .stat-inner{
background:#e6e6e6;
}

.stat-btn{
margin-top:10px;
padding:clamp(8px,1.5vw,12px);
border:none;
border-radius:8px;
cursor:pointer;
background:#4cafef;
color:white;
font-weight:bold;
width:100%;
font-size:clamp(13px,1.4vw,15px);
}

.cl-nav{
display:flex;
justify-content:space-between;
gap:10px;
margin-top:14px;
}

.cl-btn{
flex:1;
border:none;
background:#2a2a2a;
color:white;
padding:12px;
border-radius:10px;
font-weight:600;
transition:.15s;
}

.cl-btn:hover{
background:#3a3a3a;
transform:translateY(-1px);
}

body.light .cl-btn{
background:#e6e6e6;
color:#111;
}

body.light .cl-btn:hover{
background:#d8d8d8;
}

.quest-card{
background:#1e1e1e;
padding:clamp(12px,2vw,16px);
border-radius:10px;
margin-bottom:clamp(10px,2vw,15px);
word-wrap:break-word;
font-size:clamp(13px,1.4vw,15px);
}

body.light .quest-card{
background:#ffffff;
color:#111;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

#supportPopup div{
max-width:90%;
}

button{
border-radius:8px;
padding:clamp(6px,1.2vw,10px) clamp(10px,2vw,14px);
cursor:pointer;
font-size:clamp(12px,1.3vw,14px);
}
</style>
</head>


  
<body>

<div id="notificationBox" style="
display:none;
position:fixed;
top:70px;
right:20px;
width:350px;
max-height:400px;
overflow:auto;
background:#1e1e1e;
border-radius:10px;
padding:10px;
z-index:9999;
">
<div id="notificationList"></div>
</div>
  
<div id="settingsBox" style="display:none;position:fixed;top:60px;right:20px;background:#1e1e1e;padding:15px;border-radius:10px;z-index:999">

<input id="emailInput" placeholder="Enter email">
<button onclick="sendCode()">Send Code</button>

<input id="codeInput" placeholder="Enter code">
<button onclick="verifyCode()">Verify</button>

<button onclick="toggle2FA()">Toggle 2FA</button>

<hr style="margin:10px 0">

<select id="timezoneSelect">
<option value="UTC">UTC</option>
<option value="Europe/Copenhagen">Denmark</option>
<option value="Europe/Stockholm">Sweden</option>
<option value="Asia/Almaty">Kazakhstan</option>
<option value="America/New_York">New York</option>
<option value="America/Chicago">Chicago</option>
<option value="America/Los_Angeles">Los Angeles</option>
<option value="Europe/London">London</option>
<option value="Asia/Tokyo">Tokyo</option>
<option value="Australia/Sydney">Sydney</option>
<option value="Asia/Kolkata">India</option>
</select>
  
<button onclick="saveTimezone()">Save GMT</button>

<hr style="margin:10px 0">

<div id="vipThemeBox" style="display:none">

<div style="margin-bottom:8px;font-weight:bold">
VIP Theme
</div>

<select id="vipThemeSelect">
<option value="styles.css">
Default Theme
</option>

<option value="Vip1style.css">
Modern VIP Theme
</option>
</select>

<button
onclick="saveVipTheme()"
style="margin-top:8px;width:100%"
>
Load Theme
</button>

</div>

</div>
<div class="topbar">
<div id="userDisplay"></div>
<div class="icons">
<span id="notificationBell" onclick="toggleNotifications()">
🔔
<span id="notificationBadge" style="
display:none;
background:red;
color:white;
border-radius:999px;
padding:2px 6px;
font-size:11px;
margin-left:4px;
">0</span>
</span>
<span onclick="location.href='dms.html'">Dms✉️</span>
<span onclick="location.href='download.html'">📲 Download App</span>
<span onclick="location.href='history.html'">📜 Login History</span>
<span onclick="location.href='Cloud.html'">🗃️Image Cloud</span>
<span onclick="location.href='balance.html'">💰 Wallet</span>
<span onclick="goProfile()">👤 Profile</span>
<span onclick="openSupportPopup()">🛠 Support</span>
<span onclick="toggleSettings()">⚙ Settings</span>
<span onclick="logout()">🚪 Logout</span>
<span onclick="toggleTheme()">🌓</span>
</div>
</div>

<div class="wrapper">
<div class="main-flex">

<div class="left">

<div id="banScreen" style="display:none">
<h2>You Are Banned</h2>
<p id="banReason"></p>
<p>Time Remaining: <span id="banTimer"></span></p>
</div>

<div id="mainContent">

<h3>Your Discord Link Code</h3>
<div class="quest-card" id="linkCodeBox">Loading...</div>

</div>

</div>

<div class="right">

<div class="quest-card" style="max-height:clamp(300px,50vh,500px);display:flex;flex-direction:column">
<h3>Changelog</h3>

<div id="cl_box" style="flex:1;overflow:auto;margin-top:10px"></div>

<div class="cl-nav">
<button class="cl-btn" onclick="nextCL()">← Previous</button>
<button class="cl-btn" onclick="prevCL()">Next →</button>
</div>

</div>

</div>

</div>

</div>

<div id="supportPopup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;z-index:1000;">
<div style="background:#1e1e1e;padding:25px;border-radius:10px;text-align:center;min-width:280px">

<h2>Support Method</h2>

<div style="margin-top:20px">

<button onclick="openDiscordSupport()" style="border:none;background:none;cursor:pointer;margin-right:20px">
<img src="discord.png" style="width:100px">
</button>

<button onclick="openWebsiteSupport()" style="border:none;background:none;cursor:pointer;margin-right:20px">
<img src="Web.png" style="width:100px">
</button>

<button onclick="openEmailSupport()" style="border:none;background:none;cursor:pointer">
<img src="email.png" style="width:100px">
</button>

</div>

<div style="margin-top:20px">
<button onclick="closeSupportPopup()">Close</button>
</div>

</div>
</div>

<script src="theme.js"></script>

<script>
let backend = null
let banInterval = null

const pageFlipSound = new Audio("Sounds/PageFlip.mp3")
const logoutSound = new Audio("Sounds/LogOut.mp3")
const clickSound = new Audio("Sounds/Click.mp3")
const notificationSound = new Audio("Sounds/Notification.mp3")
notificationSound.preload = "auto"
notificationSound.load()

clickSound.volume = 0.5
notificationSound.volume = 1
pageFlipSound.volume = 0.6
logoutSound.volume = 0.7

async function getBackend(){
const r = await fetch("server.txt")
return (await r.text()).trim()
}

async function safeJson(res){
const text = await res.text()
try { return JSON.parse(text) }
catch { return null }
}

async function animateValue(el, end){
let start = 0
let duration = 1500
let startTime = null
function update(timestamp){
if(!startTime) startTime = timestamp
let progress = timestamp - startTime
let value = Math.floor((progress/duration)*end)
if(value > end) value = end
el.textContent = value.toLocaleString()
if(progress < duration){
requestAnimationFrame(update)
}
}
requestAnimationFrame(update)
}

async function trackPage(page){
const token=localStorage.getItem("Token")
if(!token) return

await fetch(backend+"/track/page",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({page})
})
}

function applySavedTheme(){

const saved=localStorage.getItem("siteTheme")

if(saved){

document.getElementById("themeStylesheet").href=saved

}

}

function saveVipTheme(){

const selected=
document.getElementById("vipThemeSelect").value

localStorage.setItem(
"siteTheme",
selected
)

document.getElementById("themeStylesheet").href=
selected

}

function saveTimezone(){
const tz=document.getElementById("timezoneSelect").value
localStorage.setItem("userTimezone",tz)
alert("Timezone saved")
}

window.addEventListener("load",()=>{
const saved=localStorage.getItem("userTimezone")
if(saved){
document.getElementById("timezoneSelect").value=saved
}
})

let changelogs=[]
let clIndex=0

async function loadChangelogs(){
const r=await fetch(backend+"/changelogs")
changelogs=await r.json()

clIndex=0
renderCL()
}

let lastUnread = 0

function toggleNotifications(){

const box=document.getElementById("notificationBox")

box.style.display=
box.style.display==="block"
? "none"
: "block"

}

async function loadNotifications(){

const token=localStorage.getItem("Token")
if(!token) return

let notifications=[]
let unread=0

try{

const r=await fetch(backend+"/notifications",{
headers:{Authorization:token}
})

const data=await r.json()

if(Array.isArray(data.notifications)){
notifications.push(...data.notifications.map(n=>({
type:"support",
message:n.message,
ticketId:n.ticketId
})))
}

unread+=data.unread||0

}catch{}

try{

const r=await fetch(backend+"/dms/state",{
headers:{Authorization:token}
})

const data=await r.json()

if(Array.isArray(data.incomingRequests)){

data.incomingRequests.forEach(req=>{
notifications.push({
type:"friend",
message:`Friend request from ${req.from}`
})
})

unread+=data.incomingRequests.length
}

if(Array.isArray(data.chats)){

data.chats.forEach(chat=>{

if(chat.unread>0){

notifications.push({
type:"dm",
message:`${chat.unread} unread message${chat.unread===1?"":"s"} from ${chat.with}`
})

unread+=chat.unread

}

})

}

}catch{}

const badge=document.getElementById("notificationBadge")

if(unread>0){
badge.style.display="inline-block"
badge.textContent=unread
}else{
badge.style.display="none"
}

if(unread>lastUnread){
notificationSound.currentTime=0
notificationSound.play().catch(()=>{})
}

lastUnread=unread

document.getElementById("notificationList").innerHTML=
notifications.map(n=>`
<div
style="
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
"
onclick="
${n.type==='support'
?`location.href='Support.html#${n.ticketId}'`
:`location.href='DMS.html'`}
"
>
${n.message}
</div>
`).join("") || "<div style='padding:10px'>No notifications</div>"
}
  
function convertTime(time,fromTZ){
const d=new Date(time)
return d.toLocaleString(undefined,{
timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone
})
}

function renderCL(){
const box=document.getElementById("cl_box")

if(!changelogs.length){
box.innerHTML="No changelogs"
return
}

const cl=changelogs[clIndex]

box.innerHTML=`
<h4>${cl.title} (${cl.version})</h4>
<div class="meta">${convertTime(cl.time,cl.timezone)}</div>
<p style="white-space:pre-wrap">${cl.text}</p>
`
}

function prevCL(){
if(clIndex>0){
pageFlipSound.currentTime=0
pageFlipSound.play()

clIndex--
renderCL()
}
}

function nextCL(){
if(clIndex<changelogs.length-1){
pageFlipSound.currentTime=0
pageFlipSound.play()

clIndex++
renderCL()
}
}


async function init(){
applySavedTheme()
backend = await getBackend()
await trackPage("dashboard.html")

await loadNotifications()

setInterval(
loadNotifications,
5000
)


const token = localStorage.getItem("Token")
if(!token) return location.href = "login.html"

try{
const r = await fetch(backend + "/me", { headers: { Authorization: token } })
const data = await safeJson(r)

if(!data || data.error){
localStorage.removeItem("Token")
return location.href = "login.html"
}

if(data.banned){
showBan(data.reason, data.remaining)
return
}

if(data.permissions && data.permissions.vip){
document.getElementById("vipThemeBox").style.display="block"

userDisplay.innerHTML=
`Logged in as: <span class="vipName">${data.username}</span>`

}else{

userDisplay.textContent=
"Logged in as: " + data.username

}

if(data.linkedDiscord){
const discordName = data.linkedDiscord.username || "Unknown User"
linkCodeBox.innerHTML = `<b>Discord Linked</b><br>Account: ${discordName}<br>ID: ${data.linkedDiscord.id}`
}else if(data.linkCode){
linkCodeBox.innerHTML = `<b>Your Link Code</b><br>${data.linkCode}<br><small>Use this with /linkdiscord in Discord</small>`
}else{
linkCodeBox.innerHTML = "<b>No link code found</b>"
}
await loadChangelogs()
}catch(err){}
}

let settingsOpen=false

function toggleSettings(){
settingsOpen=!settingsOpen
document.getElementById("settingsBox").style.display=settingsOpen?"block":"none"
}

async function sendCode(){

const email=document.getElementById("emailInput").value.trim()

if(!email){
alert("Enter email")
return
}

const save=await fetch(backend+"/account/add-email",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:localStorage.getItem("Token")
},
body:JSON.stringify({
email
})
})

const saveData=await save.json()

if(saveData.error){

if(saveData.error==="emailused")
return alert("Email already used")

if(saveData.error==="invalidemail")
return alert("Invalid email")

if(saveData.error==="emailsendfailed")
return alert("Failed to send email")

return alert(saveData.error)

}

alert("Verification code sent to "+email)

}

async function verifyCode(){

const r=await fetch(backend+"/account/verify-email",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:localStorage.getItem("Token")
},
body:JSON.stringify({
code:document.getElementById("codeInput").value
})
})

const d=await r.json()

if(d.success){

alert("Verified")

}else{

if(d.error==="expired")
return alert("Code expired")

if(d.error==="wrongcode")
return alert("Wrong code")

if(d.error==="nocode")
return alert("No pending verification")

alert("Invalid or expired code")

}

}

async function toggle2FA(){

const r=await fetch(backend+"/2fa/toggle",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:localStorage.getItem("Token")
},
body:JSON.stringify({
enabled:true
})
})

const d=await r.json()

if(d.error){

if(d.error==="noemail")
return alert("Add and verify email first")

alert(d.error)

}else{

alert("2FA Enabled")

}

}

function showBan(reason, remaining){
mainContent.style.display = "none"
banScreen.style.display = "block"
banReason.textContent = "Reason: " + reason
startCountdown(remaining)
}

function parseRemaining(str){
const parts = str.split(" ")
let total = 0
parts.forEach(p=>{
if(p.endsWith("D")) total += parseInt(p)*86400
if(p.endsWith("H")) total += parseInt(p)*3600
if(p.endsWith("M") && !p.includes("S")) total += parseInt(p)*60
if(p.endsWith("S")) total += parseInt(p)
})
return total
}

function startCountdown(str){
let seconds = parseRemaining(str)
updateTimer(seconds)

banInterval = setInterval(()=>{
seconds--
if(seconds <= 0){
clearInterval(banInterval)
location.reload()
}
updateTimer(seconds)
},1000)
}

function updateTimer(seconds){
const d=Math.floor(seconds/86400); seconds%=86400
const h=Math.floor(seconds/3600); seconds%=3600
const m=Math.floor(seconds/60); seconds%=60
banTimer.textContent=`${d}D ${h}H ${m}M ${seconds}S`
}



function openSupportPopup(){
document.getElementById("supportPopup").style.display="flex"
}

function closeSupportPopup(){
document.getElementById("supportPopup").style.display="none"
}

function openDiscordSupport(){
window.open("https://discord.com/channels/1435017648751513713/1442140583220215949","_blank")
}

function openWebsiteSupport(){
location.href="Support.html"
}

function openEmailSupport(){
window.location.href = "mailto:Zyphor@zyphor.cc"
}

const mouseGlow=document.getElementById("mouseGlow")

document.addEventListener("mousemove",e=>{
mouseGlow.style.left=e.clientX+"px"
mouseGlow.style.top=e.clientY+"px"
})

document.addEventListener("click",e=>{
const isButton=e.target.closest("button")

if(!isButton){
clickSound.currentTime=0
clickSound.play()
}
})
  
function logout(){
logoutSound.currentTime=0
logoutSound.play()

setTimeout(()=>{
localStorage.removeItem("Token")
location.href = "login.html"
},250)
}

init()
</script>
