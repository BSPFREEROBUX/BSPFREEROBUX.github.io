<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="styles.css">
<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0e0e0e;
color:#fff;
}

body.light{
background:#f2f2f2;
color:#111;
}

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
background:#121212;
z-index:1000;
flex-wrap:wrap;
}

body.light .topbar{
background:#ffffff;
}

.icons span{
margin:5px;
cursor:pointer;
font-size:14px;
}

.wrapper{
max-width:1100px;
margin:auto;
padding:15px;
}

.stats-container{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:30px;
flex-wrap:wrap;
}

.stat-box{
background:#1e1e1e;
padding:20px;
border-radius:12px;
width:100%;
max-width:300px;
text-align:center;
font-size:16px;
box-sizing:border-box;
}

body.light .stat-box{
background:#ffffff;
color:#111;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.stat-inner{
background:#2a2a2a;
margin-top:10px;
padding:15px;
border-radius:8px;
font-size:22px;
}

body.light .stat-inner{
background:#e6e6e6;
}

.stat-btn{
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#4cafef;
color:white;
font-weight:bold;
width:100%;
}

.quest-card{
background:#1e1e1e;
padding:15px;
border-radius:10px;
margin-bottom:15px;
word-wrap:break-word;
}

body.light .quest-card{
background:#ffffff;
color:#111;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

#supportPopup div{
max-width:90%;
}

button{
border-radius:8px;
padding:8px 12px;
cursor:pointer;
}
</style>
</head>


  
<body>


<div id="settingsBox" style="display:none;position:fixed;top:60px;right:20px;background:#1e1e1e;padding:15px;border-radius:10px;z-index:999">
<input id="emailInput" placeholder="Enter email">
<button onclick="sendCode()">Send Code</button>
<input id="codeInput" placeholder="Enter code">
<button onclick="verifyCode()">Verify</button>
<button onclick="toggle2FA()">Toggle 2FA</button>
</div>
  
<div class="topbar">
<div id="userDisplay"></div>
<div class="icons">
<span onclick="location.href='history.html'">📜 History</span>
<span onclick="location.href='balance.html'">💰 Wallet</span>
<span onclick="goProfile()">👤 Profile</span>
<span onclick="openSupportPopup()">🛠 Support</span>
<span onclick="toggleSettings()">⚙ Settings</span>
<span onclick="logout()">🚪 Logout</span>
<span onclick="toggleTheme()">🌓</span>
</div>
</div>

<div class="wrapper" style="margin-top:90px">

<div style="display:flex;gap:20px;align-items:flex-start">

<div style="flex:1">

<div class="stats-container">
<div class="stat-box">
Total Free Robux Orders Complete
<div class="stat-inner" id="ordersCount">0</div>
</div>

<div class="stat-box">
View Proof
<button class="stat-btn" onclick="location.href='Proof.html'">View</button>
</div>

<div class="stat-box">
Total Robux Given Out
<div class="stat-inner" id="robuxCount">0</div>
</div>
</div>

<div id="banScreen" style="display:none">
<h2>You Are Banned</h2>
<p id="banReason"></p>
<p>Time Remaining: <span id="banTimer"></span></p>
</div>

<div id="mainContent">

<h3>Your Discord Link Code</h3>
<div class="quest-card" id="linkCodeBox">Loading...</div>

<h2 style="margin-top:30px">Available Quests</h2>
<div id="available"></div>

<h2 style="margin-top:30px">Completed Quests</h2>
<div id="completed"></div>

</div>

</div>

<div style="width:300px">

<div class="quest-card" style="height:500px;display:flex;flex-direction:column">
<h3>Changelog</h3>

<div id="cl_box" style="flex:1;overflow:auto;margin-top:10px"></div>

<div style="display:flex;justify-content:space-between;margin-top:10px">
<button onclick="prevCL()">⬅</button>
<button onclick="nextCL()">➡</button>
</div>

</div>

</div>

</div>

</div>

<div id="supportPopup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;z-index:1000;">
<div style="background:#1e1e1e;padding:25px;border-radius:10px;text-align:center;min-width:280px">

<h2>Support Method</h2>

<div style="margin-top:20px">

<button onclick="openDiscordSupport()" style="border:none;background:none;cursor:pointer;margin-right:20px">
<img src="discord.png" style="width:100px">
</button>

<button onclick="openWebsiteSupport()" style="border:none;background:none;cursor:pointer;margin-right:20px">
<img src="Web.png" style="width:100px">
</button>

<button onclick="openEmailSupport()" style="border:none;background:none;cursor:pointer">
<img src="email.png" style="width:100px">
</button>

</div>

<div style="margin-top:20px">
<button onclick="closeSupportPopup()">Close</button>
</div>

</div>
</div>

<script src="theme.js"></script>

<script>
let backend = null
let banInterval = null

async function getBackend(){
const r = await fetch("server.txt")
return (await r.text()).trim()
}

async function safeJson(res){
const text = await res.text()
try { return JSON.parse(text) }
catch { return null }
}

async function animateValue(el, end){
let start = 0
let duration = 1500
let startTime = null
function update(timestamp){
if(!startTime) startTime = timestamp
let progress = timestamp - startTime
let value = Math.floor((progress/duration)*end)
if(value > end) value = end
el.textContent = value.toLocaleString()
if(progress < duration){
requestAnimationFrame(update)
}
}
requestAnimationFrame(update)
}

async function loadStats(){
try{
const robuxRes = await fetch("TotalRobuxGivenOut.txt")
const robuxValue = parseInt((await robuxRes.text()).trim()) || 0
animateValue(document.getElementById("robuxCount"), robuxValue)

const ordersRes = await fetch("TotalFreeRobuxOrdersComplete.txt")
const ordersValue = parseInt((await ordersRes.text()).trim()) || 0
animateValue(document.getElementById("ordersCount"), ordersValue)
}catch(e){}
}

let changelogs=[]
let clIndex=0

async function loadChangelogs(){
const r=await fetch(backend+"/changelogs")
changelogs=await r.json()

clIndex=0
renderCL()
}

function convertTime(time,fromTZ){
const d=new Date(time)
return d.toLocaleString(undefined,{
timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone
})
}

function renderCL(){
const box=document.getElementById("cl_box")

if(!changelogs.length){
box.innerHTML="No changelogs"
return
}

const cl=changelogs[clIndex]

box.innerHTML=`
<h4>${cl.title} (${cl.version})</h4>
<div class="meta">${convertTime(cl.time,cl.timezone)}</div>
<p style="white-space:pre-wrap">${cl.text}</p>
`
}

function prevCL(){
if(clIndex<changelogs.length-1){
clIndex++
renderCL()
}
}

function nextCL(){
if(clIndex>0){
clIndex--
renderCL()
}
}

async function init(){
backend = await getBackend()
loadStats()


const token = localStorage.getItem("Token")
if(!token) return location.href = "login.html"

try{
const r = await fetch(backend + "/me", { headers: { Authorization: token } })
const data = await safeJson(r)

if(!data || data.error){
localStorage.removeItem("Token")
return location.href = "login.html"
}

if(data.banned){
showBan(data.reason, data.remaining)
return
}

userDisplay.textContent = "Logged in as: " + data.username

if(data.linkedDiscord){
const discordName = data.linkedDiscord.username || "Unknown User"
linkCodeBox.innerHTML = `<b>Discord Linked</b><br>Account: ${discordName}<br>ID: ${data.linkedDiscord.id}`
}else if(data.linkCode){
linkCodeBox.innerHTML = `<b>Your Link Code</b><br>${data.linkCode}<br><small>Use this with /linkdiscord in Discord</small>`
}else{
linkCodeBox.innerHTML = "<b>No link code found</b>"
}
await loadChangelogs()
await loadQuests()
}catch(err){}
}

async function loadQuests(){
const token = localStorage.getItem("Token")
if(!token) return

try{
const r = await fetch(backend + "/quests", {
method: "POST",
headers: { "Content-Type": "application/json", "Authorization": token }
})
const data = await safeJson(r)
if(!data || data.error) return

renderQuests(data.available || [], "available", false)
renderQuests(data.completed || [], "completed", true)
}catch(err){}
}

function goProfile(){
location.href="profile.html"
}

let settingsOpen=false

function toggleSettings(){
settingsOpen=!settingsOpen
document.getElementById("settingsBox").style.display=settingsOpen?"block":"none"
}

async function sendCode(){
await fetch(backend+"/2fa/send",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:localStorage.getItem("Token")
},
body:JSON.stringify({
email:document.getElementById("emailInput").value
})
})
alert("Code sent")
}

async function verifyCode(){
await fetch(backend+"/2fa/verify",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:localStorage.getItem("Token")
},
body:JSON.stringify({
code:document.getElementById("codeInput").value
})
})
alert("Verified")
}

async function toggle2FA(){
await fetch(backend+"/2fa/toggle",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:localStorage.getItem("Token")
},
body:JSON.stringify({
enabled:true
})
})
alert("2FA Enabled")
}

function renderQuests(list, containerId, completed){
const container = document.getElementById(containerId)
container.innerHTML = ""

if(!Array.isArray(list) || list.length === 0){
container.innerHTML = "<p>No quests.</p>"
return
}

list.forEach(q=>{
const div = document.createElement("div")
div.className = "quest-card"
div.innerHTML = `<h4>${q.title}</h4><p>${q.description}</p><p><b>Reward:</b> ${q.reward.amount} ${q.reward.currency}</p>${completed ? "<span>Completed</span>" : ""}`
container.appendChild(div)
})
}

function showBan(reason, remaining){
mainContent.style.display = "none"
banScreen.style.display = "block"
banReason.textContent = "Reason: " + reason
startCountdown(remaining)
}

function parseRemaining(str){
const parts = str.split(" ")
let total = 0
parts.forEach(p=>{
if(p.endsWith("D")) total += parseInt(p)*86400
if(p.endsWith("H")) total += parseInt(p)*3600
if(p.endsWith("M") && !p.includes("S")) total += parseInt(p)*60
if(p.endsWith("S")) total += parseInt(p)
})
return total
}

function startCountdown(str){
let seconds = parseRemaining(str)
updateTimer(seconds)

banInterval = setInterval(()=>{
seconds--
if(seconds <= 0){
clearInterval(banInterval)
location.reload()
}
updateTimer(seconds)
},1000)
}

function updateTimer(seconds){
const d=Math.floor(seconds/86400); seconds%=86400
const h=Math.floor(seconds/3600); seconds%=3600
const m=Math.floor(seconds/60); seconds%=60
banTimer.textContent=`${d}D ${h}H ${m}M ${seconds}S`
}

function openSupportPopup(){
document.getElementById("supportPopup").style.display="flex"
}

function closeSupportPopup(){
document.getElementById("supportPopup").style.display="none"
}

function openDiscordSupport(){
window.open("https://discord.com/channels/1435017648751513713/1442140583220215949","_blank")
}

function openWebsiteSupport(){
location.href="Support.html"
}

function openEmailSupport(){
window.location.href = "mailto:Zyphor@zyphor.cc"
}

function logout(){
localStorage.removeItem("Token")
location.href = "login.html"
}

init()
</script>

</body>
</html>
