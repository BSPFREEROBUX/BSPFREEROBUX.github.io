<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="styles.css">
<style>
.tosbox{
width:100%;
height:220px;
overflow-y:auto;
border:1px solid rgba(255,255,255,0.15);
border-radius:10px;
padding:12px;
margin-top:14px;
background:rgba(0,0,0,0.25);
font-size:13px;
line-height:1.5;
white-space:pre-wrap;
box-sizing:border-box;
}

.tosagree{
display:flex;
align-items:center;
gap:8px;
margin-top:12px;
font-size:14px;
opacity:.6;
pointer-events:none;
}

.tosagree.enabled{
opacity:1;
pointer-events:auto;
}
.tosbox h2{
margin:0 0 12px;
font-size:22px;
}

.tosbox h3{
margin:16px 0 8px;
font-size:16px;
}

.tosbox p{
margin:6px 0;
white-space:normal;
}

.tosbox ul{
margin:8px 0;
padding-left:20px;
}

.tosbox li{
margin:4px 0;
}

.tosbox{
text-align:left;
white-space:normal;
}

.tosagree input{
width:16px;
height:16px;
}

.wrapper{
display:flex;
flex-direction:column;
gap:10px;
}
</style>
</head>
<body>
<div class="toggle" onclick="toggleTheme()">Toggle</div>

<div class="wrapper">
<h2>Sign Up</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<div id="tosbox" class="tosbox">Loading Terms of Service...</div>

<label id="tosagree" class="tosagree">
<input type="checkbox" id="agree">
<span>I have read and agree to the Terms of Service</span>
</label>

<button onclick="signup()">Sign Up</button>

<a href="login.html">Login instead</a>
</div>

<script src="theme.js"></script>

<script>
let tosRead = false

async function getBackend(){
  const r = await fetch("server.txt")
  return (await r.text()).trim()
}

async function loadTos(){
  try{
    const r = await fetch("TOS.json")
    const data = await r.json()

    let html = ""

    html += `<h2 style="margin-top:0">${data.hero.title}</h2>`
    html += `<p>${data.hero.description}</p>`

    for(const section of data.sections){
      html += `<h3 style="margin-top:18px">${section.title}</h3>`

      if(section.content){
        for(const line of section.content){
          html += `<p>${line}</p>`
        }
      }

      if(section.list){
        html += "<ul>"
        for(const item of section.list){
          html += `<li>${item}</li>`
        }
        html += "</ul>"
      }
    }

    tosbox.innerHTML = html
  }catch{
    tosbox.textContent = "Failed to load Terms of Service."
  }
}

async function safeJson(res){
  const text = await res.text()
  try{
    return JSON.parse(text)
  }catch{
    console.error("Invalid JSON:", text)
    alert("Server error")
    return null
  }
}

tosbox.addEventListener("scroll",()=>{
  const nearBottom = tosbox.scrollTop + tosbox.clientHeight >= tosbox.scrollHeight - 10

  if(nearBottom && !tosRead){
    tosRead = true
    tosagree.classList.add("enabled")
  }
})

document.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    signup()
  }
})

async function signup(){
  if(!tosRead){
    alert("You must scroll through the Terms of Service first")
    return
  }

  if(!agree.checked){
    alert("You must agree to the Terms of Service")
    return
  }

  try{
    const base = await getBackend()

    const r = await fetch(base + "/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        username: username.value,
        password: password.value,
        agreedToTos: true
      })
    })

    const d = await safeJson(r)
    if(!d) return

    if(d.success){
      alert("Account created")
      location.href = "login.html"
    }
    else if(d.error === "exists"){
      alert("Username already exists")
    }
    else{
      alert("Signup failed")
    }

  }catch(err){
    console.error(err)
    alert("Network error")
  }
}

loadTos()
</script>
</body>
</html>
