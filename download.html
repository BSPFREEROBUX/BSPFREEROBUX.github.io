<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Download Zyphor</title>

<style>

body{
margin:0;
background:#0f0f10;
color:white;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:#18181b;
border:1px solid #2a2a2a;
border-radius:16px;
padding:30px;
max-width:850px;
width:100%;
}

.topBtns{
display:flex;
gap:10px;
margin-bottom:20px;
}

button{
font-family:inherit;
}

.backBtn{
background:#222226;
border:1px solid #333;
color:white;
border-radius:10px;
padding:12px 18px;
cursor:pointer;
font-weight:bold;
}

.backBtn:hover{
border-color:#5865F2;
}

.platforms{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.platform{
background:#222226;
border:1px solid #333;
border-radius:14px;
padding:25px;
width:220px;
text-align:center;
cursor:pointer;
transition:.2s;
}

.platform:hover{
border-color:#5865F2;
transform:translateY(-3px);
}

.icon{
font-size:60px;
}

.downloadPage{
display:none;
}

.versionBtn{
width:100%;
background:#222226;
border:1px solid #333;
color:white;
padding:16px;
border-radius:12px;
margin-top:12px;
text-align:left;
cursor:pointer;
}

.versionBtn:hover{
border-color:#5865F2;
}

.latest{
color:#70ff83;
font-size:13px;
font-weight:bold;
}

.meta{
font-size:14px;
opacity:.75;
margin-top:5px;
}

.notice{
display:none;
background:#222226;
border-left:4px solid #5865F2;
padding:18px;
border-radius:10px;
margin-top:20px;
}

.status{
margin-top:15px;
opacity:.75;
}

</style>

</head>

<body>


<div id="select" class="card">

<div class="topBtns">
<button class="backBtn" onclick="location.href='dashboard.html'">
← Dashboard
</button>
</div>

<h1>Select Your Platform</h1>

<p>Select what Zyphor version you want.</p>


<div class="platforms">

<div class="platform" onclick="showPlatform('windows')">

<div class="icon">💻</div>

<h2>Windows</h2>

<p>Desktop App</p>

</div>


<div class="platform" onclick="showPlatform('android')">

<div class="icon">🤖</div>

<h2>Android</h2>

<p>Mobile App</p>

</div>

</div>

</div>





<div id="page" class="card downloadPage">


<div class="topBtns">

<button class="backBtn" onclick="backSelect()">
← Platforms
</button>

<button class="backBtn" onclick="location.href='dashboard.html'">
Dashboard
</button>

</div>


<h1 id="title"></h1>

<p id="desc"></p>


<div id="versions"></div>


<div id="status" class="status">
Preparing...
</div>



<div id="notice" class="notice">

<h3>Zyphor Android V1.0.2</h3>

<p>
First official native Android Studio release by 
<b>Team Vaprix</b>.
Includes native notifications and mobile support.
</p>

</div>


</div>




<script>


async function getBase(){

try{

return (await fetch("server.txt")
.then(r=>r.text()))
.trim()

}catch(e){

return ""

}

}




async function showPlatform(type){


select.style.display="none"

page.style.display="block"

versions.innerHTML=""

notice.style.display="none"

status.textContent="Preparing..."


const base=await getBase()



function add(v){


let btn=document.createElement("button")


btn.className="versionBtn"


btn.innerHTML=`

<div style="font-size:18px;font-weight:bold">

${v.name}

${v.latest ? "<span class='latest'> Latest</span>" : ""}

</div>


<div class="meta">

${v.size}

</div>


<div class="meta">

${v.date}

</div>

`


btn.onclick=function(){

window.open(v.url,"_blank")

}


versions.appendChild(btn)


}




let list=[]



if(type==="windows"){


title.innerText="Download Zyphor Windows"

desc.innerText="Choose a Windows version."


list=[

{
name:"Zyphor 1.0.2",
size:"92.2 MiB",
date:"Released: Jun 2 2026 • 16:01 CPH",
latest:true,
url:base+"/uploads/Zyphor_Setup_1.0.2.exe"
},

{
name:"Zyphor 1.0.1",
size:"92.2 MiB",
date:"Released: Jun 2 2026 • 15:51 CPH",
latest:false,
url:base+"/uploads/Zyphor_Setup_1.0.1.exe"
},

{
name:"Zyphor 1.0.0",
size:"92.2 MiB",
date:"Released: Jun 2 2026 • 15:40 CPH",
latest:false,
url:base+"/uploads/Zyphor_Setup_1.0.0.exe"
}

]


}



if(type==="android"){


title.innerText="Download Zyphor Android"

desc.innerText="Choose an Android version."


list=[

{
name:"Zyphor V1.0.3",
size:"14.32 MiB",
date:"Released: Jul 3 2026 • 18:55 CPH • Official Android Studio Release",
latest:true,
url:base+"/uploads/ZyphorV1.0.3VS1.12.3.apk"
},

{
name:"Zyphor V1.0.2",
size:"14.91 MiB",
date:"Released: Jul 3 2026 • 18:36 CPH • Official Android Studio Release",
latest:false,
url:base+"/uploads/ZyphorV1.0.2VS1.12.3.apk"
},

{
name:"Zyphor V1.0.1",
size:"93.21 MiB",
date:"Released: Jul 2 2026 • 19:06 CPH",
latest:false,
url:base+"/uploads/ZyphorV1.0.1VS1.12.3.apk"
},

{
name:"Zyphor V1.0.0",
size:"93.21 MiB",
date:"Released: Jul 2 2026 • 18:00 CPH",
latest:false,
url:base+"/uploads/ZyphorV1.0.0SV1.12.3.apk"
}

]


notice.style.display="block"


}



list.forEach(add)


status.innerText="Ready to download."


}




function backSelect(){


page.style.display="none"

select.style.display="block"

versions.innerHTML=""

notice.style.display="none"

status.innerText="Preparing..."


}


</script>


</body>
</html>
