<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Download Zyphor</title>

<style>
body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f0f10;
font-family:Arial,sans-serif;
color:white;
padding:20px;
}

.card{
background:#18181b;
padding:30px;
border-radius:16px;
text-align:center;
max-width:500px;
width:100%;
border:1px solid #2a2a2a;
}

h1{
margin-top:0;
margin-bottom:10px;
}

p{
opacity:.8;
margin-bottom:25px;
}

.downloadBtn{
display:inline-block;
padding:14px 28px;
background:#5865F2;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
transition:.2s;
cursor:pointer;
}

.downloadBtn:hover{
transform:scale(1.03);
}

.status{
margin-top:15px;
font-size:14px;
opacity:.7;
}
</style>
</head>
<body>

<div class="card">
<h1>Download Zyphor</h1>
<p>Install the official Zyphor Desktop App for Windows.</p>

<a id="downloadBtn" class="downloadBtn">
Download for Windows
</a>

<div id="status" class="status">
Preparing download...
</div>
</div>

<script>
let downloadUrl=""

async function setupDownload(){

try{

const backend=await fetch("server.txt")
.then(r=>r.text())

downloadUrl=
backend.trim()+"/uploads/Zyphor%20Setup%201.0.0.exe"

document.getElementById("status").textContent=
"Ready to download"

}catch{

document.getElementById("status").textContent=
"Download unavailable"

}

}

document.getElementById("downloadBtn").addEventListener("click",()=>{

if(!downloadUrl) return

window.location.href=downloadUrl

})

setupDownload()
</script>

</body>
</html>
