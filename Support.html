<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Support</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
background:#0f0f10;
color:#e5e5e5;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,sans-serif;
overflow:hidden;
}

.imageDropdown{
display:none;
position:absolute;
right:0;
top:28px;
background:#1e1e1e;
border:1px solid #444;
border-radius:6px;
padding:6px 10px;
}

.imageDropdown.show{
display:block;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 16px;
background:#151516;
border-bottom:1px solid #2a2a2a;
}

.icons{
display:flex;
gap:16px;
}

.icons span{
cursor:pointer;
opacity:.85;
}

.icons span:hover{
opacity:1;
}

.ticketControls{
display:flex;
align-items:center;
gap:10px;
}

.ticketControls button{
background:#2a2a2a;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.ticketControls button:hover{
background:#3a3a3a;
}

.supportLayout{
flex:1;
display:flex;
height:100%;
overflow:hidden;
}

.ticketList{
width:260px;
background:#141414;
border-right:1px solid #2a2a2a;
overflow-y:auto;
padding:14px;
}

.sidebarUser{
font-size:13px;
opacity:.7;
margin-bottom:12px;
}

.ticketItem{
padding:12px;
border-radius:8px;
background:#1a1a1b;
margin-bottom:8px;
cursor:pointer;
border:1px solid transparent;
}

.ticketItem:hover{
background:#222;
border-color:#333;
}

.ticketStatusOpen{
color:#2ecc71;
font-size:11px;
}

.ticketStatusClosed{
color:#e74c3c;
font-size:11px;
}

.ticketOwner{
font-size:11px;
opacity:.6;
}

.ticketList button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:#2a2a2a;
color:white;
cursor:pointer;
}

.ticketChat{
flex:1;
display:flex;
flex-direction:column;
height:100%;
}

#ticketHeader{
padding:14px 18px;
border-bottom:1px solid #2a2a2a;
background:#151516;
}

.chatMessages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
background:#1a1a1b;
padding:10px 12px;
border-radius:8px;
max-width:700px;
border:1px solid #2a2a2a;
}

.message b{
font-size:13px;
}

.message small{
font-size:11px;
opacity:.5;
margin-left:6px;
}

.message div{
margin-top:4px;
font-size:14px;
}

.imageWrapper{
position:relative;
display:inline-block;
margin-top:6px;
}

.chatImage{
max-width:420px;
border-radius:8px;
border:1px solid #333;
}

.imageMenu{
position:absolute;
top:6px;
right:6px;
}

.imageMenu button{
background:rgba(0,0,0,0.6);
border:none;
color:white;
padding:4px 8px;
border-radius:6px;
cursor:pointer;
}

.chatInput{
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-top:1px solid #2a2a2a;
background:#151516;
}

.attachBtn{
width:36px;
height:36px;
border-radius:50%;
border:none;
background:#2a2a2a;
color:white;
font-size:18px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.attachBtn:hover{
background:#3a3a3a;
}

#messageBox{
flex:1;
padding:10px 14px;
border-radius:20px;
border:1px solid #333;
background:#0f0f10;
color:white;
font-size:14px;
outline:none;
}

.sendBtn{
width:36px;
height:36px;
border-radius:50%;
border:none;
background:#5865f2;
color:white;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
}

.sendBtn:hover{
background:#6d78ff;
}

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-track{
background:#0f0f10;
}

::-webkit-scrollbar-thumb{
background:#2a2a2a;
border-radius:10px;
}

::-webkit-scrollbar-thumb:hover{
background:#3a3a3a;
}

</style>
</head>
<body>

<div class="topbar">

<div class="icons">
<span onclick="location.href='dashboard.html'">Dashboard</span>
<span onclick="logout()">Logout</span>
</div>

<div class="ticketControls">

<label class="toggle">
<input type="checkbox" id="anonToggle">
Anonymous
</label>

<button onclick="lockTicket()">Lock</button>
<button onclick="unlockTicket()">Unlock</button>

</div>

</div>
<div class="supportLayout">

<div class="ticketList">

<div class="sidebarUser" id="userDisplay"></div>

<h3>Your Tickets</h3>
<div id="myTickets"></div>

<h3 id="staffTitle" style="display:none;margin-top:20px">All Tickets</h3>
<div id="allTickets"></div>

<button style="margin-top:10px;width:100%" onclick="createTicket()">New Ticket</button>

</div>

<div class="ticketChat">

<div id="ticketHeader">
Select a ticket
</div>

<div class="chatMessages" id="chatMessages"></div>

<div class="resizeBar" id="resizeBar"></div>

<div class="chatInput" id="chatInput">

<button class="attachBtn" onclick="fileInput.click()">+</button>
<input type="file" id="fileInput" style="display:none">

<input id="messageBox" placeholder="Message">

<button class="sendBtn" onclick="sendMessage()">✈</button>

</div>

</div>

</div>

</div>

<script src="theme.js"></script>

<script>

  const messageBox = document.getElementById("messageBox")
const fileInput = document.getElementById("fileInput")
const anonToggle = document.getElementById("anonToggle")

function toggleMenu(btn){
const menu = btn.nextElementSibling
menu.classList.toggle("show")
}

let backend=null
let token=null
let user=null
let activeTicket=null

async function getBackend(){
const r=await fetch("server.txt")
return (await r.text()).trim()
}

async function safeJson(res){
const t=await res.text()
try{return JSON.parse(t)}catch{return null}
}

function hasSupport(){
return user.permissions.support || user.permissions.admin
}

function hasAdmin(){
return user.permissions.admin
}

async function init(){

backend=await getBackend()

token=localStorage.getItem("authToken")
if(!token) location.href="login.html"

const r=await fetch(backend+"/me",{headers:{Authorization:token}})
user=await safeJson(r)

if(!user||user.error) location.href="login.html"

userDisplay.textContent="Logged in as: "+user.username

if(hasSupport())
document.getElementById("staffTitle").style.display="block"

if(hasAdmin())
anonToggle.style.display = "inline"

loadTickets()

setInterval(()=>{
loadTickets()
if(activeTicket) refreshActiveTicket()
},2000)

}

async function loadTickets(){

const r=await fetch(backend+"/support/list",{headers:{Authorization:token}})
const data=await safeJson(r)

renderTicketList(data.mine,"myTickets")

if(hasSupport())
renderTicketList(data.all,"allTickets")

}

function renderTicketList(list,containerId){

const container=document.getElementById(containerId)
container.innerHTML=""

list.sort((a,b)=>{
if(a.status==="open" && b.status==="closed") return -1
if(a.status==="closed" && b.status==="open") return 1
return new Date(b.createdAt)-new Date(a.createdAt)
})

list.forEach(t=>{

if(!hasSupport() && t.status==="closed") return

const div=document.createElement("div")
div.className="ticketItem"

const status=t.status==="open"
? `<span class="ticketStatusOpen">OPEN</span>`
: `<span class="ticketStatusClosed">CLOSED</span>`

let owner=""
if(containerId==="allTickets")
owner=`<div class="ticketOwner">Created by: ${t.owner}</div>`

div.innerHTML=`
<b>${t.title}</b><br>
${status}
${owner}
`

div.onclick=()=>openTicket(t)

container.appendChild(div)

})

}

function openTicket(ticket){

activeTicket=ticket

const status=ticket.status==="open"
? '<span style="color:#2ecc71">OPEN</span>'
: '<span style="color:#e74c3c">CLOSED</span>'

const lock=ticket.locked?" 🔒":" 🔓"

ticketHeader.innerHTML=`<b>${ticket.title}</b><br>${status}${lock}`

chatInput.style.display="flex"

renderMessages(ticket)

}

function renderMessages(ticket){

const box=document.getElementById("chatMessages")

const nearBottom =
box.scrollHeight - box.scrollTop - box.clientHeight < 120

box.innerHTML=""

ticket.messages.forEach(m=>{

let attach=""

if(m.attachment)
attach=`
<div class="imageWrapper">
<img src="${backend}/uploads/${m.attachment.path}" class="chatImage">
<div class="imageMenu">
<button onclick="toggleMenu(this)">⋮</button>
<div class="imageDropdown">
<a href="${backend}/uploads/${m.attachment.path}" download="${m.attachment.name || 'image.png'}">Download</a>
</div>
</div>
</div>
`

box.innerHTML+=`
<div class="message">
<b>${m.author}</b>
<small>${new Date(m.time).toLocaleString()}</small>
${m.text ? `<div>${m.text}</div>` : ""}
${attach}
</div>
`

})

if(nearBottom)
box.scrollTop=box.scrollHeight

}

async function refreshActiveTicket(){

const r = await fetch(backend+"/support/list",{headers:{Authorization:token}})
const data = await safeJson(r)

let all=[...(data.mine||[]),...(data.all||[])]

const updated = all.find(t=>t.id===activeTicket.id)

if(!updated) return

activeTicket = updated
renderMessages(updated)

}

async function sendMessage(){

if(!activeTicket) return

const msg=messageBox.value
const file=fileInput.files[0]
const anon=anonToggle.checked

const form=new FormData()

form.append("ticketId",activeTicket.id)
form.append("message",msg)

if(file) form.append("file",file)
if(anon) form.append("anonymous",true)

await fetch(backend+"/support/message",{
method:"POST",
headers:{Authorization:token},
body:form
})

messageBox.value=""
fileInput.value=""

refreshActiveTicket()

}

async function downloadImage(url){

const res = await fetch(url)
const blob = await res.blob()

const img = await createImageBitmap(blob)

const canvas = document.createElement("canvas")
canvas.width = img.width
canvas.height = img.height

const ctx = canvas.getContext("2d")
ctx.drawImage(img,0,0)

canvas.toBlob((pngBlob)=>{

const a = document.createElement("a")
a.href = URL.createObjectURL(pngBlob)
a.download = "image.png"
a.click()

}, "image/png")

}

async function closeTicket(){

await fetch(backend+"/support/close",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({ticketId:activeTicket.id})
})

loadTickets()

}

async function lockTicket(){

await fetch(backend+"/support/lock",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({ticketId:activeTicket.id})
})

loadTickets()

}

async function unlockTicket(){

await fetch(backend+"/support/unlock",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({ticketId:activeTicket.id})
})

loadTickets()

}

async function createTicket(){

const title=prompt("Ticket Title")
if(!title) return

const reason=prompt("Reason")

await fetch(backend+"/support/create",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({title,reason})
})

loadTickets()

}

function logout(){
localStorage.removeItem("authToken")
location.href="login.html"
}

const resizeBar=document.getElementById("resizeBar")
const chatInput=document.getElementById("chatInput")

let resizing=false

resizeBar.addEventListener("mousedown",()=>{
resizing=true
})

document.addEventListener("mousemove",(e)=>{
if(!resizing) return
const newHeight=window.innerHeight - e.clientY
chatInput.style.height=newHeight+"px"
})

document.addEventListener("mouseup",()=>{
resizing=false
})

init()

</script>

</body>
</html>
