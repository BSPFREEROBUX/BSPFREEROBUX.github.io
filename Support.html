<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Support</title>
<link rel="stylesheet" href="styles.css">

<style>

.supportLayout{
display:flex;
height:calc(100vh - 80px);
}

.ticketList{
width:260px;
border-right:1px solid #444;
overflow-y:auto;
padding:10px;
}

.ticketItem{
padding:10px;
border-radius:6px;
cursor:pointer;
margin-bottom:6px;
}

.ticketItem:hover{
background:rgba(255,255,255,0.05);
}

.ticketStatusOpen{
color:#2ecc71;
font-size:12px;
}

.ticketStatusClosed{
color:#e74c3c;
font-size:12px;
}

.ticketChat{
flex:1;
display:flex;
flex-direction:column;
}

.chatMessages{
flex:1;
overflow-y:auto;
padding:20px;
}

.chatInput{
border-top:1px solid #444;
padding:10px;
}

.message{
margin-bottom:14px;
}

</style>
</head>

<body>

<div class="topbar">
<div id="userDisplay"></div>
<div class="icons">
<span onclick="location.href='dashboard.html'">Dashboard</span>
<span onclick="toggleTheme()">🌓</span>
<span onclick="logout()">Logout</span>
</div>
</div>

<div class="supportLayout">

<div class="ticketList">

<h3>Your Tickets</h3>
<div id="myTickets"></div>

<h3 id="staffTitle" style="display:none;margin-top:20px">All Tickets</h3>
<div id="allTickets"></div>

<button style="margin-top:10px;width:100%" onclick="createTicket()">New Ticket</button>

</div>

<div class="ticketChat">

<div id="ticketHeader" style="padding:15px;border-bottom:1px solid #444">
Select a ticket
</div>

<div class="chatMessages" id="chatMessages"></div>

<div class="chatInput" id="chatInput" style="display:none">

<input id="messageBox" placeholder="Message..." style="width:50%">
<input type="file" id="fileInput">

<label id="anonBox" style="display:none">
<input type="checkbox" id="anonToggle"> Anonymous
</label>

<button onclick="sendMessage()">Send</button>
<button onclick="closeTicket()" id="closeBtn">Close Ticket</button>

<button onclick="lockTicket()" id="lockBtn" style="display:none">Lock</button>
<button onclick="unlockTicket()" id="unlockBtn" style="display:none">Unlock</button>

</div>

</div>

</div>

<script src="theme.js"></script>

<script>

let backend=null
let token=null
let user=null
let activeTicket=null

async function getBackend(){
const r=await fetch("server.txt")
return (await r.text()).trim()
}

async function safeJson(res){
const t=await res.text()
try{return JSON.parse(t)}catch{return null}
}

function hasSupport(){
return user.permissions.support || user.permissions.admin
}

function hasAdmin(){
return user.permissions.admin
}

async function init(){

backend=await getBackend()

token=localStorage.getItem("authToken")
if(!token) location.href="login.html"

const r=await fetch(backend+"/me",{headers:{Authorization:token}})
user=await safeJson(r)

if(!user || user.error) location.href="login.html"

userDisplay.textContent="Logged in as: "+user.username

if(hasSupport())
document.getElementById("staffTitle").style.display="block"

if(hasAdmin())
document.getElementById("anonBox").style.display="inline"

loadTickets()

setInterval(()=>{
loadTickets()
if(activeTicket) refreshActiveTicket()
},2000)

}

async function loadTickets(){

const r=await fetch(backend+"/support/list",{headers:{Authorization:token}})
const data=await safeJson(r)

renderTicketList(data.mine,"myTickets")

if(hasSupport())
renderTicketList(data.all,"allTickets")

}

function renderTicketList(list,containerId){

const container=document.getElementById(containerId)
container.innerHTML=""

list.sort((a,b)=>{

if(a.status==="open" && b.status==="closed") return -1
if(a.status==="closed" && b.status==="open") return 1

return new Date(b.createdAt)-new Date(a.createdAt)

})

list.forEach(t=>{

if(!hasSupport() && t.status==="closed") return

const div=document.createElement("div")
div.className="ticketItem"

const status=t.status==="open"
? `<span class="ticketStatusOpen">OPEN</span>`
: `<span class="ticketStatusClosed">CLOSED</span>`

div.innerHTML=`${t.title}<br>${status}`

div.onclick=()=>openTicket(t)

container.appendChild(div)

})

}

function openTicket(ticket){

activeTicket=ticket

ticketHeader.innerHTML=`${ticket.title}`

chatInput.style.display="block"

renderMessages(ticket)

updateButtons(ticket)

}

function updateButtons(ticket){

if(ticket.locked && !hasSupport())
closeBtn.style.display="none"
else
closeBtn.style.display="inline"

if(hasSupport()){
lockBtn.style.display="inline"
unlockBtn.style.display="inline"
}else{
lockBtn.style.display="none"
unlockBtn.style.display="none"
}

}

function renderMessages(ticket){

const box=document.getElementById("chatMessages")
box.innerHTML=""

ticket.messages.forEach(m=>{

let attach=""

if(m.attachment)
attach=`<br><a href="${backend}/uploads/${m.attachment.path}" target="_blank">${m.attachment.name}</a>`

box.innerHTML+=`
<div class="message">
<b>${m.author}</b>
<small>${new Date(m.time).toLocaleString()}</small>
<br>${m.text || ""}
${attach}
</div>
`

})

box.scrollTop=box.scrollHeight

}

async function refreshActiveTicket(){

const r=await fetch(backend+"/support/list",{headers:{Authorization:token}})
const data=await safeJson(r)

let all=[...(data.mine||[]),...(data.all||[])]

const updated=all.find(t=>t.id===activeTicket.id)

if(!updated) return

activeTicket=updated
renderMessages(updated)
updateButtons(updated)

}

async function sendMessage(){

if(!activeTicket) return

const msg=messageBox.value
const file=fileInput.files[0]
const anon=anonToggle.checked

const form=new FormData()

form.append("ticketId",activeTicket.id)
form.append("message",msg)

if(file) form.append("file",file)
if(anon) form.append("anonymous",true)

await fetch(backend+"/support/message",{
method:"POST",
headers:{Authorization:token},
body:form
})

messageBox.value=""
fileInput.value=""

refreshActiveTicket()

}

async function closeTicket(){

await fetch(backend+"/support/close",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({ticketId:activeTicket.id})
})

loadTickets()

}

async function lockTicket(){

await fetch(backend+"/support/lock",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({ticketId:activeTicket.id})
})

loadTickets()

}

async function unlockTicket(){

await fetch(backend+"/support/unlock",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({ticketId:activeTicket.id})
})

loadTickets()

}

async function createTicket(){

const title=prompt("Ticket Title")
if(!title) return

const reason=prompt("Reason")

await fetch(backend+"/support/create",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({title,reason})
})

loadTickets()

}

function logout(){
localStorage.removeItem("authToken")
location.href="login.html"
}

init()

</script>

</body>
</html>
