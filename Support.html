<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Support</title>
<style>
body{
margin:0;
height:100dvh;
display:flex;
flex-direction:column;
background:#0f0f10;
color:#e5e5e5;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,sans-serif;
overflow:hidden;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 16px;
background:#151516;
border-bottom:1px solid #2a2a2a;
flex-shrink:0;
}

.icons{
display:flex;
gap:16px;
}

.icons span{
cursor:pointer;
opacity:.85;
user-select:none;
}

.icons span:hover{
opacity:1;
}

.ticketControls{
display:flex;
align-items:center;
gap:10px;
}

.ticketControls button{
background:#2a2a2a;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.ticketControls button:hover{
background:#3a3a3a;
}

.supportLayout{
flex:1;
display:flex;
min-height:0;
overflow:hidden;
}

.ticketList{
width:260px;
background:#141414;
border-right:1px solid #2a2a2a;
overflow-y:auto;
padding:14px;
flex-shrink:0;
}

.sidebarUser{
font-size:13px;
opacity:.7;
margin-bottom:12px;
}

.ticketItem{
padding:12px;
border-radius:8px;
background:#1a1a1b;
margin-bottom:8px;
cursor:pointer;
border:1px solid transparent;
}

.ticketItem:hover{
background:#222;
border-color:#333;
}

.ticketStatusOpen{
color:#2ecc71;
font-size:11px;
font-weight:700;
letter-spacing:.3px;
}

.ticketStatusClosed{
color:#e74c3c;
font-size:11px;
font-weight:700;
letter-spacing:.3px;
}

.ticketOwner{
font-size:11px;
opacity:.6;
margin-top:4px;
}

.ticketList button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:#2a2a2a;
color:white;
cursor:pointer;
}

.ticketList button:hover{
background:#3a3a3a;
}

.ticketChat{
flex:1;
display:flex;
flex-direction:column;
min-width:0;
min-height:0;
overflow:hidden;
}

#ticketHeader{
padding:14px 18px;
border-bottom:1px solid #2a2a2a;
background:#151516;
flex-shrink:0;
}

.chatMessages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
background:#1a1a1b;
padding:10px 12px;
border-radius:8px;
max-width:700px;
border:1px solid #2a2a2a;
word-break:break-word;
}

.message b{
font-size:13px;
}

.message small{
font-size:11px;
opacity:.5;
margin-left:6px;
}

.message div{
margin-top:4px;
font-size:14px;
white-space:pre-wrap;
}

.attachmentWrap{
margin-top:8px;
display:flex;
flex-direction:column;
gap:8px;
max-width:100%;
}

.mediaCard{
display:flex;
flex-direction:column;
gap:8px;
padding:10px;
border:1px solid #2a2a2a;
border-radius:10px;
background:#121214;
max-width:100%;
}

.mediaPreview{
width:100%;
max-width:100%;
border-radius:8px;
border:1px solid #333;
background:#000;
}

.chatImage{
max-width:100%;
max-height:300px;
object-fit:contain;
}

.chatVideo{
max-width:100%;
max-height:360px;
}

.fileCard{
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
padding:10px 12px;
border:1px solid #2a2a2a;
border-radius:10px;
background:#121214;
max-width:100%;
}

.fileInfo{
display:flex;
flex-direction:column;
gap:2px;
min-width:0;
}

.fileName{
font-size:13px;
font-weight:600;
word-break:break-word;
}

.fileType{
font-size:11px;
opacity:.65;
}

.attachmentActions{
display:flex;
align-items:center;
gap:8px;
flex-wrap:wrap;
}

.attachmentLink{
display:inline-flex;
align-items:center;
justify-content:center;
padding:6px 10px;
border-radius:8px;
background:#2a2a2a;
color:#7ab7ff;
text-decoration:none;
font-size:12px;
font-weight:600;
}

.attachmentLink:hover{
background:#3a3a3a;
}

.previewBar{
display:flex;
gap:8px;
padding:6px 10px;
border-top:1px solid #2a2a2a;
background:#111;
overflow-x:auto;
flex-shrink:0;
}

.previewItem{
position:relative;
width:60px;
height:60px;
flex-shrink:0;
}

.previewItem img,
.previewItem video{
width:100%;
height:100%;
object-fit:cover;
border-radius:6px;
border:1px solid #333;
background:#000;
}

.previewItem button{
position:absolute;
top:-6px;
right:-6px;
width:18px;
height:18px;
border:none;
border-radius:50%;
background:#e74c3c;
color:white;
font-size:12px;
cursor:pointer;
line-height:18px;
padding:0;
}

.chatInput{
display:flex;
align-items:flex-end;
gap:10px;
padding:10px;
border-top:1px solid #2a2a2a;
background:#151516;
flex-shrink:0;
}

.attachBtn{
width:36px;
height:36px;
border-radius:50%;
border:none;
background:#2a2a2a;
color:white;
font-size:18px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.attachBtn:hover{
background:#3a3a3a;
}

#messageBox{
flex:1;
min-height:40px;
max-height:150px;
padding:10px 14px;
border-radius:20px;
border:1px solid #333;
background:#0f0f10;
color:white;
font-size:14px;
outline:none;
min-width:0;
resize:none;
overflow-y:auto;
line-height:1.4;
white-space:pre-wrap;
}

.messageLink{
color:#7ab7ff;
text-decoration:underline;
font-weight:600;
}

.messageLink:hover{
color:#a9d0ff;
}

.sendBtn{
width:36px;
height:36px;
border-radius:50%;
border:none;
background:#5865f2;
color:white;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
}

.sendBtn:hover{
background:#6d78ff;
}

::-webkit-scrollbar{
width:8px;
height:8px;
}

::-webkit-scrollbar-track{
background:#0f0f10;
}

::-webkit-scrollbar-thumb{
background:#2a2a2a;
border-radius:10px;
}

::-webkit-scrollbar-thumb:hover{
background:#3a3a3a;
}

@media (max-width: 768px){
.supportLayout{
flex-direction:column;
}

.ticketList{
width:100%;
height:35%;
}

.ticketChat{
height:65%;
}
}
</style>
</head>
<body>

<div class="topbar">
<div class="icons">
<span onclick="location.href='dashboard.html'">Dashboard</span>
<span onclick="logout()">Logout</span>
</div>

<div class="ticketControls">
<label>
<input type="checkbox" id="anonToggle">
Anonymous
</label>
<button onclick="closeTicket()">Close</button>
<button onclick="lockTicket()">Lock</button>
<button onclick="unlockTicket()">Unlock</button>
</div>
</div>

<div class="supportLayout">
<div class="ticketList">
<div class="sidebarUser" id="userDisplay"></div>
<h3>Your Tickets</h3>
<div id="myTickets"></div>
<h3 id="staffTitle" style="display:none;margin-top:20px">All Tickets</h3>
<div id="allTickets"></div>
<button onclick="createTicket()">New Ticket</button>
</div>

<div class="ticketChat">
<div id="ticketHeader">Select a ticket</div>
<div class="chatMessages" id="chatMessages"></div>
<div id="scheduleBox" style="padding:10px;border-top:1px solid #2a2a2a;display:none">
<select id="dateSelect"></select>
<select id="timeSelect"></select>
<button onclick="bookTime()">Book</button>
</div>
<div class="previewBar" id="previewBar"></div>
<div class="chatInput">
<button class="attachBtn" onclick="fileInput.click()">+</button>
<input type="file" id="fileInput" style="display:none" accept="image/*,video/*,.mp4,.mov,.webm,.m4v,.avi,.mkv,.ogg,.gif,.png,.jpg,.jpeg,.webp,.bmp,.svg">
<textarea id="messageBox" placeholder="Message"></textarea>
<button class="sendBtn" onclick="sendMessage()">✈</button>
</div>
</div>
</div>

<script src="theme.js"></script>
<script>
const messageBox=document.getElementById("messageBox")
messageBox.addEventListener("keydown",e=>{
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault()
sendMessage()
}
})
const fileInput=document.getElementById("fileInput")
const anonToggle=document.getElementById("anonToggle")
const previewBar=document.getElementById("previewBar")
const chatMessages=document.getElementById("chatMessages")
const ticketHeader=document.getElementById("ticketHeader")
const userDisplay=document.getElementById("userDisplay")
const staffTitle=document.getElementById("staffTitle")

let backend=null
let token=null
let user=null
let activeTicket=null
let selectedFile=null
let selectedFileUrl=null
let activeTicketSignature=""
let loadingTickets=false
let loadingActive=false

function escapeHTML(value){
return String(value ?? "").replace(/[&<>"']/g,m=>({
"&":"&amp;",
"<":"&lt;",
">":"&gt;",
"\"":"&quot;",
"'":"&#39;"
}[m]))
}

function formatMessage(text){
const escaped=escapeHTML(text)

return escaped.replace(
/((https?:\/\/|www\.)[^\s<]+)/gi,
url=>{
let href=url

if(!href.startsWith("http")){
href="https://"+href
}

return `<a href="${href}" class="messageLink" target="_blank" onclick="return confirm('Are you sure you want to open this link?')">${url}</a>`
}
)
}

async function trackPage(page){
const token=localStorage.getItem("Token")
if(!token) return

await fetch(backend+"/track/page",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({page})
})
}

function getExt(name){
const clean=String(name||"").split("?")[0].toLowerCase()
const i=clean.lastIndexOf(".")
return i===-1 ? "" : clean.slice(i+1)
}

async function checkApproval(ticket){
return ticket.messages.some(m=>String(m.text||"").toLowerCase().trim()==="approve")
}

async function loadScheduleUI(ticket){
const box = document.getElementById("scheduleBox")

box.style.display = "none"

if(!await checkApproval(ticket)) return

box.style.display = "block"

const dateSelect=document.getElementById("dateSelect")
dateSelect.innerHTML=""

for(let i=0;i<7;i++){
const d=new Date()
d.setDate(d.getDate()+i)
const val=d.toISOString().split("T")[0]
const opt=document.createElement("option")
opt.value=val
opt.textContent=val
dateSelect.appendChild(opt)
}

loadTimes()
}

async function loadTimes(){
const date=document.getElementById("dateSelect").value

const r=await fetch(backend+"/schedule/available?date="+date,{
headers:{Authorization:token}
})
const data=await r.json()

const timeSelect=document.getElementById("timeSelect")
timeSelect.innerHTML=""

const now = new Date()

data.slots.forEach(s=>{

const startDate = new Date(date + "T" + s.start + ":00")
const endDate = new Date(date + "T" + s.end + ":00")

let label = `${date} ${s.start} - ${s.end} Denmark Time (GMT+2)`

const opt=document.createElement("option")
opt.value=JSON.stringify(s)



if(endDate < now){
opt.disabled = true
opt.style.color = "#e74c3c"
label += " (Expired)"
}

if(data.booked && data.booked.find(b=>b.start===s.start && b.end===s.end)){
opt.disabled = true
opt.style.color = "#e74c3c"
label += " (Already Booked)"
}

opt.textContent = label
timeSelect.appendChild(opt)
})
}

document.getElementById("dateSelect").addEventListener("change",loadTimes)

async function bookTime(){
const date=document.getElementById("dateSelect").value
const slot=JSON.parse(document.getElementById("timeSelect").value)

await fetch(backend+"/schedule/book",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({
ticketId:activeTicket.id,
date,
start:slot.start,
end:slot.end
})
})

alert(
"Booked successfully.\n\n" +
"All times are shown in Denmark Copenhagen time (GMT+2).\n\n" +
"Convert your timezone here:\n" +
"https://greenwichmeantime.com/gmt-converter/"
)
}

function isImageFile(att){
const name=getFileName(att?.path || att?.name || "")
const mime=String(att?.mime || att?.type || "").toLowerCase()
const ext=getExt(name)
return mime.startsWith("image/") || ["png","jpg","jpeg","gif","webp","bmp","svg"].includes(ext)
}

function isVideoFile(att){
const name=getFileName(att?.path || att?.name || "")
const mime=String(att?.mime || att?.type || "").toLowerCase()
const ext=getExt(name)
return mime.startsWith("video/") || ["mp4","mov","webm","m4v","avi","mkv","ogg"].includes(ext)
}

function getFileName(path){
if(!path) return "file"
const parts=String(path).split("/")
return parts[parts.length-1] || "file"
}

function revokeSelectedUrl(){
if(selectedFileUrl){
URL.revokeObjectURL(selectedFileUrl)
selectedFileUrl=null
}
}

fileInput.addEventListener("change",()=>{
const file=fileInput.files[0]
if(!file) return
selectedFile=file
revokeSelectedUrl()
selectedFileUrl=URL.createObjectURL(file)
renderPreview()
})

function renderPreview(){
previewBar.innerHTML=""
if(!selectedFile) return
const item=document.createElement("div")
item.className="previewItem"
if(isVideoFile(selectedFile)){
const video=document.createElement("video")
video.src=selectedFileUrl
video.muted=true
video.playsInline=true
item.appendChild(video)
}else{
const img=document.createElement("img")
img.src=selectedFileUrl
item.appendChild(img)
}
const btn=document.createElement("button")
btn.type="button"
btn.textContent="×"
btn.onclick=removePreview
item.appendChild(btn)
previewBar.appendChild(item)
}

function removePreview(){
selectedFile=null
fileInput.value=""
previewBar.innerHTML=""
revokeSelectedUrl()
}

async function getBackend(){
const r=await fetch("server.txt")
return (await r.text()).trim()
}

async function safeJson(res){
const t=await res.text()
try{return JSON.parse(t)}catch{return null}
}

function hasSupport(){
return !!(user && (user.permissions.support || user.permissions.admin))
}

function hasAdmin(){
return !!(user && user.permissions.admin)
}

function buildTicketSignature(ticket){
if(!ticket) return ""
const parts=[
ticket.id,
ticket.title,
ticket.status,
ticket.locked ? "1" : "0",
ticket.updatedAt || "",
ticket.createdAt || ""
]
for(const m of (ticket.messages || [])){
const a=m.attachment || {}
parts.push([
m.id || "",
m.author || "",
m.time || "",
m.text || "",
a.path || "",
a.mime || a.type || ""
].join("|"))
}
return parts.join("§")
}

async function init(){
backend=await getBackend()
token=localStorage.getItem("Token")
if(!token) location.href="login.html"
await trackPage(location.pathname.split("/").pop() + location.hash)

const r=await fetch(backend+"/me",{headers:{Authorization:token}})
user=await safeJson(r)

if(!user||user.error) location.href="login.html"

userDisplay.textContent="Logged in as: "+user.username

if(hasSupport()) staffTitle.style.display="block"
if(hasAdmin()) anonToggle.style.display="inline"

await loadTickets()
handleHashOpen()

setInterval(()=>{
loadTickets()
},2000)

setInterval(()=>{
if(activeTicket) refreshActiveTicket()
},250)
}

async function loadTickets(){
if(loadingTickets) return
loadingTickets=true
try{
const r=await fetch(backend+"/support/list",{headers:{Authorization:token}})
const data=await safeJson(r) || {mine:[],all:[]}
renderTicketList(Array.isArray(data.mine)?data.mine:[],"myTickets")
if(hasSupport()) renderTicketList(Array.isArray(data.all)?data.all:[],"allTickets")
handleHashOpen(data)
}catch(e){}
loadingTickets=false
}

function renderTicketList(list,containerId){
const container=document.getElementById(containerId)
container.innerHTML=""
list.sort((a,b)=>{
if(a.status !== b.status){
return a.status === "open" ? -1 : 1
}
return new Date(b.createdAt) - new Date(a.createdAt)
})
list.forEach(t=>{
const div=document.createElement("div")
div.className="ticketItem"
const status=t.status==="open"
? `<span class="ticketStatusOpen">OPEN</span>`
: `<span class="ticketStatusClosed">CLOSED</span>`
let owner=""
if(containerId==="allTickets") owner=`<div class="ticketOwner">Created by: ${escapeHTML(t.owner)}</div>`
div.innerHTML=`<b>${escapeHTML(t.title)}</b><br>${status}${owner}`
div.onclick=()=>{
openTicket(t)
history.replaceState(null,"","#"+t.id)
}
container.appendChild(div)
})
}

function handleHashOpen(preloadedData){
const id=location.hash.replace("#","").trim()
if(!id) return
if(activeTicket && activeTicket.id===id) return
const data=preloadedData || {}
const all=[...(Array.isArray(data.mine)?data.mine:[]),...(Array.isArray(data.all)?data.all:[])]
const found=all.find(t=>t.id===id)
if(found) openTicket(found)
}

function openTicket(ticket){
activeTicket=ticket
activeTicketSignature=""
ticketHeader.innerHTML=`<b>${escapeHTML(ticket.title)}</b><br>${ticket.status==="open" ? '<span style="color:#2ecc71">OPEN</span>' : '<span style="color:#e74c3c">CLOSED</span>'}${ticket.locked ? " 🔒" : " 🔓"}`
renderMessages(ticket)
loadScheduleUI(ticket)
}
function renderAttachment(att){
if(!att) return ""
const path=escapeHTML(att.path || "")
const url=`${backend}/uploads/${path}`
const name=escapeHTML(getFileName(att.path || att.name || "file"))
if(isImageFile(att)){
return `<div class="attachmentWrap"><div class="mediaCard"><img src="${url}" class="mediaPreview chatImage" alt="${name}"><div class="attachmentActions"><a class="attachmentLink" href="${url}" download="${name}">Download</a></div></div></div>`
}
if(isVideoFile(att)){
return `<div class="attachmentWrap"><div class="mediaCard"><video class="mediaPreview chatVideo" controls playsinline preload="metadata" src="${url}"></video><div class="attachmentActions"><a class="attachmentLink" href="${url}" download="${name}">Download</a></div></div></div>`
}
return `<div class="attachmentWrap"><div class="fileCard"><div class="fileInfo"><div class="fileName">${name}</div><div class="fileType">Attachment</div></div><div class="attachmentActions"><a class="attachmentLink" href="${url}" download="${name}">Download</a></div></div></div>`
}

function renderMessages(ticket){
const nearBottom=chatMessages.scrollHeight-chatMessages.scrollTop-chatMessages.clientHeight<120
chatMessages.innerHTML=""
;(ticket.messages || []).forEach(m=>{
const message=document.createElement("div")
message.className="message"
const author=escapeHTML(m.author || "Unknown")
const time=escapeHTML(new Date(m.time).toLocaleString())
let text = m.text || ""

if(text.includes("Successfully booked")){
text += "\n\nConvert timezone here:\nhttps://greenwichmeantime.com/gmt-converter/"
}

text = formatMessage(text)
message.innerHTML=`<b>${author}</b><small>${time}</small>${text ? `<div>${text}</div>` : ""}${m.attachment ? renderAttachment(m.attachment) : ""}`
chatMessages.appendChild(message)
})
if(nearBottom) chatMessages.scrollTop=chatMessages.scrollHeight
}

async function refreshActiveTicket(){
if(loadingActive || !activeTicket) return
loadingActive=true
try{
const r=await fetch(backend+"/support/list",{
headers:{
Authorization:token
}
})
const data=await safeJson(r)
if(!data){
loadingActive=false
return
}
const all=[...(Array.isArray(data.mine)?data.mine:[]),...(Array.isArray(data.all)?data.all:[])]
const updated=all.find(t=>t.id===activeTicket.id)
if(!updated){
loadingActive=false
return
}
const signature=buildTicketSignature(updated)
if(signature===activeTicketSignature){
loadingActive=false
return
}
activeTicket=updated
activeTicketSignature=signature
ticketHeader.innerHTML=`<b>${escapeHTML(updated.title)}</b><br>${updated.status==="open" ? '<span style="color:#2ecc71">OPEN</span>' : '<span style="color:#e74c3c">CLOSED</span>'}${updated.locked ? " 🔒" : " 🔓"}`
renderMessages(updated)
loadScheduleUI(updated)
}catch(e){}
loadingActive=false
}
async function sendMessage(){
if(!activeTicket) return
const msg=messageBox.value
const form=new FormData()
form.append("ticketId",activeTicket.id)
form.append("message",msg)
if(selectedFile) form.append("file",selectedFile)
if(anonToggle.checked) form.append("anonymous",true)
await fetch(backend+"/support/message",{
method:"POST",
headers:{Authorization:token},
body:form
})
messageBox.value=""
removePreview()
await refreshActiveTicket()
}

async function closeTicket(){
if(!activeTicket) return
await fetch(backend+"/support/close",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({ticketId:activeTicket.id})
})
loadTickets()
}

async function lockTicket(){
if(!activeTicket) return
await fetch(backend+"/support/lock",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({ticketId:activeTicket.id})
})
loadTickets()
}

async function unlockTicket(){
if(!activeTicket) return
await fetch(backend+"/support/unlock",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({ticketId:activeTicket.id})
})
loadTickets()
}

async function createTicket(){
const title=prompt("Ticket Title")
if(!title) return
const reason=prompt("Reason")
await fetch(backend+"/support/create",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({title,reason})
})
loadTickets()
}

function logout(){
localStorage.removeItem("Token")
location.href="login.html"
}

window.addEventListener("hashchange",()=>{
if(!activeTicket){
handleHashOpen()
return
}
const id=location.hash.replace("#","").trim()
if(activeTicket.id!==id) handleHashOpen()
})

init()
</script>
</body>
</html>
