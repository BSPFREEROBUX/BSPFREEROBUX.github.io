<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Games</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0f1117;
color:white;
font-family:Arial,Helvetica,sans-serif;
min-height:100vh;
padding:12px;
overflow-x:hidden;
}

.container{
width:100%;
max-width:1500px;
margin:auto;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
flex-wrap:wrap;
gap:10px;
}

.title{
font-size:34px;
font-weight:700;
}

.user{
font-size:15px;
opacity:.8;
}

.row{
display:flex;
gap:16px;
flex-wrap:wrap;
align-items:flex-start;
}

.panel{
background:#181c25;
border:1px solid #2f3747;
border-radius:20px;
padding:18px;
flex:1;
min-width:320px;
overflow:hidden;
}

.sectionTitle{
font-size:22px;
margin-bottom:14px;
font-weight:700;
}

.games{
display:flex;
gap:10px;
margin-bottom:12px;
}

.gameBtn{
flex:1;
padding:16px;
border-radius:14px;
background:#111827;
border:2px solid transparent;
cursor:pointer;
font-weight:700;
text-align:center;
transition:.2s;
}

.gameBtn:hover{
transform:scale(1.02);
}

.gameBtn.active{
border-color:#3b82f6;
background:#172554;
}

.btn{
background:#3b82f6;
border:none;
padding:14px;
border-radius:14px;
color:white;
font-size:15px;
cursor:pointer;
width:100%;
margin-top:10px;
font-weight:700;
transition:.2s;
}

.btn:hover{
transform:scale(1.01);
opacity:.92;
}

.quitBtn{
background:#ef4444;
}

.replayBtn{
background:#10b981;
margin-top:8px;
}

input{
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:#111827;
color:white;
outline:none;
margin-top:10px;
font-size:15px;
}

.lobby{
display:none;
margin-top:18px;
}

.code{
font-size:24px;
font-weight:700;
margin-bottom:16px;
}

.players{
display:flex;
gap:14px;
flex-wrap:wrap;
}

.player{
flex:1;
min-width:240px;
background:#111827;
padding:16px;
border-radius:16px;
border:2px solid #2f3747;
transition:.2s;
position:relative;
overflow:hidden;
}

.player.redPlayer{
border-color:#ef4444;
box-shadow:0 0 25px rgba(239,68,68,.2);
}

.player.bluePlayer{
border-color:#3b82f6;
box-shadow:0 0 25px rgba(59,130,246,.2);
}

.player.activeTurn{
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{
transform:scale(1);
}
50%{
transform:scale(1.02);
}
100%{
transform:scale(1);
}
}

.player h3{
margin-bottom:10px;
font-size:20px;
}

.symbolTag{
display:inline-flex;
align-items:center;
gap:8px;
font-size:14px;
font-weight:700;
margin-bottom:10px;
}

.symbolCircle{
width:18px;
height:18px;
border-radius:999px;
}

.red{
background:#ef4444;
}

.blue{
background:#3b82f6;
}

.ready{
margin-top:10px;
font-weight:700;
}

.board{
display:grid;
gap:8px;
margin-top:20px;
justify-content:center;
width:100%;
}

.tictactoe{
grid-template-columns:repeat(3,minmax(70px,120px));
}

.connect4{
background:#2563eb;
padding:10px;
border-radius:18px;
grid-template-columns:repeat(7,minmax(38px,80px));
width:100%;
max-width:700px;
margin:auto;
}

.cell{
background:white;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
cursor:pointer;
user-select:none;
aspect-ratio:1/1;
width:100%;
font-size:clamp(24px,5vw,46px);
color:#111827;
transition:.15s;
}

.cell:hover{
transform:scale(1.04);
}

.selected{
outline:5px solid #facc15;
}

.connect4 .cell{
border-radius:999px;
background:#dbeafe;
position:relative;
overflow:hidden;
}

.connect4 .cell.redPiece::after{
content:"";
position:absolute;
inset:8%;
background:#ef4444;
border-radius:999px;
}

.connect4 .cell.bluePiece::after{
content:"";
position:absolute;
inset:8%;
background:#3b82f6;
border-radius:999px;
}

.info{
margin-top:18px;
font-size:18px;
font-weight:700;
padding:14px;
border-radius:14px;
background:#111827;
text-align:center;
}

.yourTurn{
background:#14532d;
color:#bbf7d0;
animation:turnPulse 1s infinite;
}

@keyframes turnPulse{
0%{
transform:scale(1);
}
50%{
transform:scale(1.015);
}
100%{
transform:scale(1);
}
}

.winner{
margin-top:18px;
font-size:28px;
font-weight:700;
text-align:center;
}

.history{
margin-top:20px;
max-height:700px;
overflow:auto;
}

.historyItem{
padding:14px;
background:#0f1724;
border-radius:14px;
margin-bottom:12px;
border:1px solid #2f3747;
line-height:1.7;
}

.historyItem b{
font-size:18px;
}

@media(max-width:900px){

.row{
flex-direction:column;
}

.panel{
min-width:100%;
}

.players{
flex-direction:column;
}

.connect4{
grid-template-columns:repeat(7,1fr);
max-width:100%;
padding:6px;
gap:5px;
}

.tictactoe{
grid-template-columns:repeat(3,1fr);
}

.cell{
font-size:clamp(18px,8vw,42px);
}
}
</style>
</head>

<body>

<div class="container">

<div class="top">
<div>
<div class="title">Games</div>
<div class="user" id="me"></div>
</div>
</div>

<div class="row">

<div class="panel">

<div class="sectionTitle">
Create Lobby
</div>

<div class="games">
<div class="gameBtn active" data-game="tictactoe">
Tic Tac Toe
</div>

<div class="gameBtn" data-game="connect4">
Connect 4
</div>
</div>

<button class="btn" id="createLobby">
Create Lobby
</button>

<input type="text" id="joinCode" placeholder="Lobby Code">

<button class="btn" id="joinLobby">
Join Lobby
</button>

<div class="lobby" id="lobby">

<div class="code">
Lobby Code:
<span id="code"></span>
</div>

<div class="players">

<div class="player redPlayer" id="hostCard">

<div class="symbolTag">
<div class="symbolCircle red"></div>
RED
</div>

<h3 id="hostName"></h3>

<div id="hostStats"></div>

<div class="ready" id="hostReady"></div>

</div>

<div class="player bluePlayer" id="guestCard">

<div class="symbolTag">
<div class="symbolCircle blue"></div>
BLUE
</div>

<h3 id="guestName"></h3>

<div id="guestStats"></div>

<div class="ready" id="guestReady"></div>

</div>

</div>

<button class="btn" id="readyBtn">
Ready
</button>

<button class="btn quitBtn" id="quitBtn">
Quit Lobby
</button>

<div class="info" id="turnText"></div>

<div class="board tictactoe" id="board"></div>

<div class="winner" id="winner"></div>

</div>

</div>

<div class="panel">

<div class="sectionTitle">
Match History
</div>

<div class="history" id="history"></div>

</div>

</div>

</div>

<script>
let API=""
let token=localStorage.getItem("token")
let currentLobby=null
let selectedGame="tictactoe"
let myUsername=""
let polling=null
let selectedPiece=null
let currentLobbyData=null

if(!token){
location.href="/login.html"
}

async function loadAPI(){

try{

const txt=await fetch("./server.txt?"+Date.now())
.then(r=>r.text())

API=txt.trim()

}catch{

API=location.origin
}
}

async function api(path,options={}){

const headers=options.headers || {}

headers.Authorization=token

if(!headers["Content-Type"] && options.method){
headers["Content-Type"]="application/json"
}

const res=await fetch(API+path,{
...options,
headers
})

const text=await res.text()

try{
return JSON.parse(text)
}catch{
return {error:"invalidjson"}
}
}

async function start(){

await loadAPI()

const meData=await api("/me")

if(meData.error){

location.href="/login.html"

return
}

myUsername=meData.username

document.getElementById("me").innerText=
"Logged in as "+meData.username

loadHistory()
}

start()

document.querySelectorAll(".gameBtn").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".gameBtn").forEach(x=>{
x.classList.remove("active")
})

btn.classList.add("active")

selectedGame=btn.dataset.game
}
})

document.getElementById("createLobby").onclick=async()=>{

const data=await api("/games/create",{
method:"POST",
body:JSON.stringify({
game:selectedGame
})
})

if(data.success){

currentLobby=data.code

document.getElementById("lobby").style.display="block"

document.getElementById("winner").innerText=""

startPolling()
}
}

document.getElementById("joinLobby").onclick=async()=>{

const code=document.getElementById("joinCode").value.trim()

if(!code) return

const data=await api("/games/join",{
method:"POST",
body:JSON.stringify({
code
})
})

if(data.success){

currentLobby=code

document.getElementById("lobby").style.display="block"

document.getElementById("winner").innerText=""

startPolling()
}
}

document.getElementById("readyBtn").onclick=async()=>{

await api("/games/ready",{
method:"POST",
body:JSON.stringify({
code:currentLobby
})
})
}

document.getElementById("quitBtn").onclick=async()=>{

await api("/games/quit",{
method:"POST",
body:JSON.stringify({
code:currentLobby
})
})

clearInterval(polling)

document.getElementById("lobby").style.display="none"

currentLobby=null
}

function startPolling(){

if(polling){
clearInterval(polling)
}

updateLobby()

polling=setInterval(updateLobby,1000)
}

async function updateLobby(){

if(!currentLobby) return

const data=await api(
"/games/lobby?code="+currentLobby
)

if(data.error) return

currentLobbyData=data

document.getElementById("code").innerText=data.code

document.getElementById("hostName").innerText=data.host || "Waiting..."
document.getElementById("guestName").innerText=data.guest || "Waiting..."

document.getElementById("hostReady").innerText=
data.hostReady ? "READY" : "NOT READY"

document.getElementById("guestReady").innerText=
data.guestReady ? "READY" : "NOT READY"

if(data.hostStats){

document.getElementById("hostStats").innerHTML=
"Win Streak: "+data.hostStats.winStreak+"<br>"+
"Games Played: "+data.hostStats.gamesPlayed+"<br>"+
"Wins: "+data.hostStats.wins
}

if(data.guestStats){

document.getElementById("guestStats").innerHTML=
"Win Streak: "+data.guestStats.winStreak+"<br>"+
"Games Played: "+data.guestStats.gamesPlayed+"<br>"+
"Wins: "+data.guestStats.wins
}

document.getElementById("hostCard").classList.remove("activeTurn")
document.getElementById("guestCard").classList.remove("activeTurn")

if(data.turn==="X"){
document.getElementById("hostCard").classList.add("activeTurn")
}else{
document.getElementById("guestCard").classList.add("activeTurn")
}

const myTurn=
(data.turn==="X" && myUsername===data.host) ||
(data.turn==="O" && myUsername===data.guest)

const turnText=document.getElementById("turnText")

turnText.className="info"

if(myTurn){

turnText.classList.add("yourTurn")

turnText.innerText="YOUR TURN"

}else{

turnText.innerText=
data.started
? "Turn: "+(data.turn==="X" ? data.host : data.guest)
: "Waiting for players..."
}

renderBoard(data)

if(data.winner){

if(data.winner==="draw"){

document.getElementById("winner").innerText="DRAW"

}else{

document.getElementById("winner").innerText=
(data.winner==="X"
? data.host
: data.guest)+" WON"
}
}
}

function mySymbol(data){

if(myUsername===data.host){
return "X"
}

if(myUsername===data.guest){
return "O"
}

return null
}

function renderBoard(data){

const board=document.getElementById("board")

board.innerHTML=""

board.className=
"board "+(
data.game==="connect4"
? "connect4"
: "tictactoe"
)

if(data.game==="tictactoe"){

data.board.forEach((cell,index)=>{

const div=document.createElement("div")

div.className="cell"

div.innerText=cell || ""

if(selectedPiece===index){
div.classList.add("selected")
}

div.onclick=()=>{

if(cell){

if(cell===mySymbol(data)){

selectedPiece=index

renderBoard(data)
}

return
}

move(index,null,selectedPiece)

selectedPiece=null
}

board.appendChild(div)
})

}else{

for(let r=0;r<data.board.length;r++){

for(let c=0;c<data.board[r].length;c++){

const div=document.createElement("div")

div.className="cell"

if(data.board[r][c]==="X"){
div.classList.add("redPiece")
}

if(data.board[r][c]==="O"){
div.classList.add("bluePiece")
}

div.onclick=()=>move(null,c)

board.appendChild(div)
}
}
}
}

async function move(index,column,fromIndex=null){

await api("/games/move",{
method:"POST",
body:JSON.stringify({
code:currentLobby,
index,
column,
fromIndex
})
})
}

async function loadHistory(){

const data=await api("/games/history")

if(!data.games) return

const history=document.getElementById("history")

history.innerHTML=""

data.games
.sort((a,b)=>
new Date(b.endedAt)-new Date(a.endedAt)
)
.forEach(game=>{

const winnerName=
game.winner==="X"
? game.host
: game.winner==="O"
? game.guest
: "Draw"

const div=document.createElement("div")

div.className="historyItem"

div.innerHTML=
"<b>"+game.game.toUpperCase()+"</b><br>"+
game.host+" vs "+game.guest+"<br>"+
"Winner: "+winnerName+"<br>"+
"Moves: "+game.moves.length+"<br>"+
new Date(game.endedAt).toLocaleString()+
"<br><button class='btn replayBtn' onclick='watchReplay(\""+game.id+"\")'>Replay</button>"

history.appendChild(div)
})
}

async function watchReplay(id){

const data=await api("/games/replay/"+id)

if(data.error) return

document.getElementById("lobby").style.display="block"

document.getElementById("winner").innerText="REPLAY"

document.getElementById("hostName").innerText=data.host
document.getElementById("guestName").innerText=data.guest

const fake={
game:data.game,
board:data.game==="connect4"
? Array.from({length:6},()=>Array(7).fill(null))
: Array(9).fill(null)
}

renderBoard(fake)

let moveIndex=0

const replayInterval=setInterval(()=>{

if(moveIndex>=data.moves.length){

clearInterval(replayInterval)

return
}

const move=data.moves[moveIndex]

if(data.game==="tictactoe"){

if(move.fromIndex!==null){
fake.board[move.fromIndex]=null
}

fake.board[move.index]=move.symbol

}else{

fake.board[move.row][move.column]=move.symbol
}

renderBoard(fake)

moveIndex++

},700)
}
</script>

</body>
</html>
