<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Analytics</title>
<style>
body{
margin:0;
font-family:system-ui;
background:#0e0e0e;
color:#fff;
padding:20px;
}

.card{
background:#1a1a1b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input{
padding:10px;
border-radius:8px;
border:none;
margin-right:10px;
background:#111;
color:#fff;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#2a2a2a;
color:#fff;
cursor:pointer;
}

button.active{
background:#4caf50;
}

.entry{
background:#141414;
padding:10px;
border-radius:8px;
margin-top:10px;
}

canvas{
width:100%;
height:350px;
background:#111;
border-radius:10px;
margin-top:10px;
}

.rangeBtns{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:10px;
}

.tooltip{
position:absolute;
pointer-events:none;
background:#000;
color:#fff;
padding:6px 8px;
border-radius:6px;
font-size:12px;
border:1px solid #333;
white-space:nowrap;
z-index:10;
}
</style>
</head>
<body>

<div class="card">
<h2>Total Visits</h2>

<div class="rangeBtns">
<button onclick="setRange(event,'today')">Today</button>
<button onclick="setRange(event,'yesterday')">Yesterday</button>
<button onclick="setRange(event,'week')">Week</button>
<button onclick="setRange(event,'month')">Month</button>
<button onclick="setRange(event,'year')">Year</button>
<button onclick="setRange(event,'all')" class="active">All</button>
</div>

<div id="totalStats"></div>
<div style="position:relative">
<canvas id="graph"></canvas>
<div id="tooltip" class="tooltip" style="display:none"></div>
</div>
</div>

<script>
let backend=null
let allData={}
let currentRange="all"
let points=[]

async function init(){
backend=(await fetch("server.txt").then(r=>r.text())).trim()
await loadAll()
}
init()

async function safeFetch(url){
const r=await fetch(url,{headers:{Authorization:localStorage.getItem("Token")}})
const t=await r.text()
try{return JSON.parse(t)}catch{return null}
}

async function loadAll(){
const data=await safeFetch(backend+"/admin/all-page-history")
if(!data) return
allData=data
renderTotals()
renderGraph()
}

function setRange(e,r){
currentRange=r
document.querySelectorAll("button").forEach(b=>b.classList.remove("active"))
e.target.classList.add("active")
renderTotals()
renderGraph()
}

function filterRange(){
const now=new Date()
let start=null,end=null

if(currentRange==="today"){
start=new Date(now.getFullYear(),now.getMonth(),now.getDate())
}
else if(currentRange==="yesterday"){
start=new Date(now.getFullYear(),now.getMonth(),now.getDate()-1)
end=new Date(now.getFullYear(),now.getMonth(),now.getDate())
}
else if(currentRange==="week"){
start=new Date(now-7*86400000)
}
else if(currentRange==="month"){
start=new Date(now.getFullYear(),now.getMonth()-1,now.getDate())
}
else if(currentRange==="year"){
start=new Date(now.getFullYear()-1,now.getMonth(),now.getDate())
}

return [start,end]
}

function renderTotals(){
const [start,end]=filterRange()
let total=0

for(const u in allData){
allData[u].forEach(e=>{
const t=new Date(e.time)
if((!start||t>=start)&&(!end||t<end)) total++
})
}

document.getElementById("totalStats").innerHTML="<b>Total Visits:</b> "+total
}

function renderGraph(){
const canvas=document.getElementById("graph")
const ctx=canvas.getContext("2d")
const tooltip=document.getElementById("tooltip")

const w=canvas.width=canvas.offsetWidth
const h=canvas.height=350
const padding=40

ctx.clearRect(0,0,w,h)

const [start,end]=filterRange()
const map={}

for(const u in allData){
allData[u].forEach(e=>{
const d=new Date(e.time)
if((!start||d>=start)&&(!end||d<end)){
const key=d.getTime()
map[key]=(map[key]||0)+1
}
})
}

const keys=Object.keys(map).map(Number).sort((a,b)=>a-b)
const values=keys.map(k=>map[k])

if(!values.length) return

const max=Math.max(...values)
const stepX=(w-padding*2)/(values.length-1||1)

points=[]

ctx.strokeStyle="#222"
ctx.fillStyle="#888"
ctx.font="12px system-ui"

for(let i=0;i<=5;i++){
const y=h-padding-(i/5)*(h-padding*2)
ctx.beginPath()
ctx.moveTo(padding,y)
ctx.lineTo(w-padding,y)
ctx.stroke()
ctx.fillText(Math.round(max*(i/5)),5,y+4)
}

ctx.beginPath()
values.forEach((v,i)=>{
const x=padding+i*stepX
const y=h-padding-(v/max)*(h-padding*2)
points.push({x,y,v,time:keys[i]})
if(i===0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)
})

ctx.strokeStyle="#4caf50"
ctx.lineWidth=2
ctx.stroke()

const gradient=ctx.createLinearGradient(0,0,0,h)
gradient.addColorStop(0,"rgba(76,175,80,0.4)")
gradient.addColorStop(1,"rgba(76,175,80,0)")

ctx.lineTo(w-padding,h-padding)
ctx.lineTo(padding,h-padding)
ctx.closePath()
ctx.fillStyle=gradient
ctx.fill()

canvas.onmousemove=e=>{
const rect=canvas.getBoundingClientRect()
const mx=e.clientX-rect.left

let closest=null
let dist=Infinity

points.forEach(p=>{
const d=Math.abs(p.x-mx)
if(d<dist){dist=d;closest=p}
})

if(!closest) return

renderGraph()

ctx.beginPath()
ctx.arc(closest.x,closest.y,5,0,Math.PI*2)
ctx.fillStyle="#fff"
ctx.fill()

const date=new Date(closest.time)

tooltip.style.display="block"
tooltip.style.left=(closest.x+10)+"px"
tooltip.style.top=(closest.y-30)+"px"
tooltip.innerHTML=
date.toLocaleString()+"<br>"+closest.v+" visits"
}

canvas.onmouseleave=()=>{
tooltip.style.display="none"
renderGraph()
}
}
</script>

</body>
</html>
