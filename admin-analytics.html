<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Analytics</title>
<style>
body{
margin:0;
font-family:system-ui;
background:#0e0e0e;
color:#fff;
padding:20px;
}

.card{
background:#1a1a1b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input{
padding:10px;
border-radius:8px;
border:none;
margin-right:10px;
background:#111;
color:#fff;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#4caf50;
color:#fff;
cursor:pointer;
}

.entry{
background:#141414;
padding:10px;
border-radius:8px;
margin-top:10px;
}

canvas{
width:100%;
height:300px;
background:#111;
border-radius:10px;
margin-top:10px;
}
</style>
</head>
<body>

<div class="card">
<h2>User History</h2>
<input id="user" placeholder="Username">
<button onclick="loadUser()">Search</button>
<div id="userStats"></div>
<div id="userList"></div>
</div>

<div class="card">
<h2>Total Visits</h2>
<div id="totalStats"></div>
<canvas id="graph"></canvas>
</div>

<script>
let backend=null
let allData={}

async function init(){
backend=(await fetch("server.txt").then(r=>r.text())).trim()
await loadAll()
}
init()

async function safeFetch(url){
const r=await fetch(url,{
headers:{Authorization:localStorage.getItem("Token")}
})

const text=await r.text()

try{
return JSON.parse(text)
}catch{
console.error("Invalid JSON:",text)
return null
}
}

async function loadAll(){
const data=await safeFetch(backend+"/admin/all-page-history")
if(!data) return

allData=data

renderTotals()
renderGraph()
}

async function loadUser(){
const username=document.getElementById("user").value.trim()
const list=document.getElementById("userList")
const stats=document.getElementById("userStats")

list.innerHTML=""
stats.innerHTML=""

if(!username){
stats.innerHTML="<b>Type a username</b>"
return
}

const data=await safeFetch(backend+"/admin/page-history?username="+encodeURIComponent(username))
if(!data) return

stats.innerHTML="<b>Total Visits:</b> "+data.length

data.slice().reverse().forEach(e=>{
const div=document.createElement("div")
div.className="entry"
div.innerHTML=`
${e.page}<br>
<small>${new Date(e.time).toLocaleString()}</small>
`
list.appendChild(div)
})
}

function renderTotals(){
let total=0

for(const u in allData){
total+=allData[u].length
}

document.getElementById("totalStats").innerHTML="<b>Total Visits (All Users):</b> "+total
}

function renderGraph(){
const canvas=document.getElementById("graph")
const ctx=canvas.getContext("2d")

const now=Date.now()
const hours=24
const map={}

for(let i=0;i<hours;i++){
const d=new Date(now - i*3600000)
const key=d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate()+"-"+d.getHours()
map[key]=0
}

for(const u in allData){
allData[u].forEach(e=>{
const d=new Date(e.time)
const key=d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate()+"-"+d.getHours()
if(map[key]!==undefined){
map[key]++
}
})
}

const keys=Object.keys(map).sort((a,b)=>{
const pa=a.split("-").map(Number)
const pb=b.split("-").map(Number)
return new Date(pa[0],pa[1],pa[2],pa[3]) - new Date(pb[0],pb[1],pb[2],pb[3])
})

const values=keys.map(k=>map[k])

const w=canvas.width=canvas.offsetWidth
const h=canvas.height=300

ctx.clearRect(0,0,w,h)

if(values.length===0) return

const max=Math.max(...values,1)
const stepX=w/(values.length-1||1)

// grid lines + labels
ctx.strokeStyle="#222"
ctx.fillStyle="#888"
ctx.font="12px system-ui"

const steps=5
for(let i=0;i<=steps;i++){
const y=h-(i/steps)*h
ctx.beginPath()
ctx.moveTo(0,y)
ctx.lineTo(w,y)
ctx.stroke()
ctx.fillText(Math.round((max/steps)*i),5,y-2)
}

// line
ctx.beginPath()
values.forEach((v,i)=>{
const x=i*stepX
const y=h-(v/max)*h
if(i===0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)
})
ctx.strokeStyle="#4caf50"
ctx.lineWidth=2
ctx.stroke()

// hover
canvas.onmousemove=(e)=>{
const rect=canvas.getBoundingClientRect()
const x=e.clientX-rect.left

const i=Math.round(x/stepX)
if(i<0 || i>=values.length) return

const v=values[i]
const key=keys[i].split("-")
const date=new Date(key[0],key[1],key[2],key[3])

renderGraph()

const px=i*stepX
const py=h-(v/max)*h

ctx.beginPath()
ctx.arc(px,py,4,0,Math.PI*2)
ctx.fillStyle="#fff"
ctx.fill()

ctx.fillStyle="#fff"
ctx.fillText(
date.getHours()+":00 - "+v+" visits",
px+10,
py-10
)
}

canvas.onmouseleave=()=>{
renderGraph()
}
}
</script>

</body>
</html>
