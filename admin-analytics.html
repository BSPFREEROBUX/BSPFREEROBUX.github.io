<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Analytics</title>
<style>
body{
margin:0;
font-family:system-ui;
background:#0e0e0e;
color:#fff;
padding:20px;
}

.card{
background:#1a1a1b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input{
padding:10px;
border-radius:8px;
border:none;
margin-right:10px;
background:#111;
color:#fff;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#4caf50;
color:#fff;
cursor:pointer;
}

.entry{
background:#141414;
padding:10px;
border-radius:8px;
margin-top:10px;
}

canvas{
width:100%;
height:300px;
background:#111;
border-radius:10px;
margin-top:10px;
}

.rangeBtns{
margin-bottom:10px;
display:flex;
flex-wrap:wrap;
gap:8px;
}

.rangeBtns button{
background:#2a2a2a;
}

.rangeBtns button.active{
background:#4caf50;
}
</style>
</head>
<body>

<div class="card">
<h2>User History</h2>
<input id="user" placeholder="Username">
<button onclick="loadUser()">Search</button>
<div id="userStats"></div>
<div id="userList"></div>
</div>

<div class="card">
<h2>Total Visits</h2>

<div class="rangeBtns">
<button onclick="setRange('today')">Today</button>
<button onclick="setRange('yesterday')">Yesterday</button>
<button onclick="setRange('week')">Week</button>
<button onclick="setRange('month')">Month</button>
<button onclick="setRange('year')">Year</button>
<button onclick="setRange('all')">All</button>
</div>

<div id="totalStats"></div>
<canvas id="graph"></canvas>
</div>

<script>
let backend=null
let allData={}
let currentRange="today"

async function init(){
backend=(await fetch("server.txt").then(r=>r.text())).trim()
await loadAll()
}
init()

async function safeFetch(url){
const r=await fetch(url,{
headers:{Authorization:localStorage.getItem("Token")}
})
const text=await r.text()
try{return JSON.parse(text)}catch{return null}
}

async function loadAll(){
const data=await safeFetch(backend+"/admin/all-page-history")
if(!data) return
allData=data
renderTotals()
renderGraph()
}

function setRange(r){
currentRange=r
document.querySelectorAll(".rangeBtns button").forEach(b=>b.classList.remove("active"))
event.target.classList.add("active")
renderTotals()
renderGraph()
}

async function loadUser(){
const username=document.getElementById("user").value.trim()
const list=document.getElementById("userList")
const stats=document.getElementById("userStats")

list.innerHTML=""
stats.innerHTML=""

if(!username){
stats.innerHTML="<b>Type a username</b>"
return
}

const data=await safeFetch(backend+"/admin/page-history?username="+encodeURIComponent(username))
if(!data) return

stats.innerHTML="<b>Total Visits:</b> "+data.length

data.slice().reverse().forEach(e=>{
const div=document.createElement("div")
div.className="entry"
div.innerHTML=`
${e.page}<br>
<small>${new Date(e.time).toLocaleString()}</small>
`
list.appendChild(div)
})
}

function filterByRange(){
const now=new Date()
let start=null

if(currentRange==="today"){
start=new Date(now.getFullYear(),now.getMonth(),now.getDate())
}
else if(currentRange==="yesterday"){
start=new Date(now.getFullYear(),now.getMonth(),now.getDate()-1)
const end=new Date(now.getFullYear(),now.getMonth(),now.getDate())
return [start,end]
}
else if(currentRange==="week"){
start=new Date(now-7*86400000)
}
else if(currentRange==="month"){
start=new Date(now.getFullYear(),now.getMonth()-1,now.getDate())
}
else if(currentRange==="year"){
start=new Date(now.getFullYear()-1,now.getMonth(),now.getDate())
}
else{
return [null,null]
}

return [start,null]
}

function renderTotals(){
const [start,end]=filterByRange()
let total=0

for(const u in allData){
allData[u].forEach(e=>{
const t=new Date(e.time)
if((!start || t>=start) && (!end || t<end)){
total++
}
})
}

document.getElementById("totalStats").innerHTML="<b>Total Visits:</b> "+total
}

function renderGraph(){
const canvas=document.getElementById("graph")
const ctx=canvas.getContext("2d")

const [start,end]=filterByRange()
const map={}

for(const u in allData){
allData[u].forEach(e=>{
const d=new Date(e.time)
if((!start || d>=start) && (!end || d<end)){
const key=d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate()+"-"+d.getHours()
if(!map[key]) map[key]=0
map[key]++
}
})
}

const keys=Object.keys(map).sort((a,b)=>{
const pa=a.split("-").map(Number)
const pb=b.split("-").map(Number)
return new Date(pa[0],pa[1],pa[2],pa[3]) - new Date(pb[0],pb[1],pb[2],pb[3])
})

const values=keys.map(k=>map[k])

const w=canvas.width=canvas.offsetWidth
const h=canvas.height=300

ctx.clearRect(0,0,w,h)

if(values.length===0) return

const max=Math.max(...values,1)
const stepX=w/(values.length-1||1)

ctx.strokeStyle="#4caf50"
ctx.lineWidth=2
ctx.beginPath()

values.forEach((v,i)=>{
const x=i*stepX
const y=h-(v/max)*h
if(i===0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)
})

ctx.stroke()
}
</script>

</body>
</html>
