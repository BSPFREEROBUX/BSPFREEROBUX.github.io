<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Analytics</title>
<style>
body{
margin:0;
font-family:system-ui;
background:#0e0e0e;
color:#fff;
padding:20px;
}

.card{
background:#1a1a1b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input{
padding:10px;
border-radius:8px;
border:none;
margin-right:10px;
background:#111;
color:#fff;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#4caf50;
color:#fff;
cursor:pointer;
}

.entry{
background:#141414;
padding:10px;
border-radius:8px;
margin-top:10px;
}

canvas{
width:100%;
height:300px;
background:#111;
border-radius:10px;
margin-top:10px;
}
</style>
</head>
<body>

<div class="card">
<h2>User History</h2>
<input id="user" placeholder="Username">
<button onclick="loadUser()">Search</button>
<div id="userStats"></div>
<div id="userList"></div>
</div>

<div class="card">
<h2>Total Visits</h2>
<div id="totalStats"></div>
<canvas id="graph"></canvas>
</div>

<script>
let backend=null
let allData={}

async function init(){
backend=(await fetch("server.txt").then(r=>r.text())).trim()
await loadAll()
}
init()

async function safeFetch(url){
const r=await fetch(url,{
headers:{Authorization:localStorage.getItem("Token")}
})

const text=await r.text()

try{
return JSON.parse(text)
}catch{
console.error("Invalid JSON:",text)
return null
}
}

async function loadAll(){
const data=await safeFetch(backend+"/admin/all-page-history")
if(!data) return

allData=data

renderTotals()
renderGraph()
}

async function loadUser(){
const username=document.getElementById("user").value.trim()
const list=document.getElementById("userList")
const stats=document.getElementById("userStats")

list.innerHTML=""
stats.innerHTML=""

if(!username){
stats.innerHTML="<b>Type a username</b>"
return
}

const data=await safeFetch(backend+"/admin/page-history?username="+encodeURIComponent(username))
if(!data) return

stats.innerHTML="<b>Total Visits:</b> "+data.length

data.slice().reverse().forEach(e=>{
const div=document.createElement("div")
div.className="entry"
div.innerHTML=`
${e.page}<br>
<small>${new Date(e.time).toLocaleString()}</small>
`
list.appendChild(div)
})
}

function renderTotals(){
let total=0

for(const u in allData){
total+=allData[u].length
}

document.getElementById("totalStats").innerHTML="<b>Total Visits (All Users):</b> "+total
}

function renderGraph(){
const canvas=document.getElementById("graph")
const ctx=canvas.getContext("2d")

const map={}

for(const u in allData){
allData[u].forEach(e=>{
const d=new Date(e.time).toISOString().split("T")[0]
map[d]=(map[d]||0)+1
})
}

const dates=Object.keys(map).sort()
const values=dates.map(d=>map[d])

const w=canvas.width=canvas.offsetWidth
const h=canvas.height=300

ctx.clearRect(0,0,w,h)

if(values.length===0) return

const max=Math.max(...values)

const stepX=w/(values.length-1||1)

ctx.beginPath()

values.forEach((v,i)=>{
const x=i*stepX
const y=h-(v/max)*h
if(i===0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)
})

ctx.strokeStyle="#4caf50"
ctx.lineWidth=2
ctx.stroke()
}
</script>

</body>
</html>
