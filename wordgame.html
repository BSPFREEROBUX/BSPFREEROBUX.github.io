<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Game</title>
<style>
body{margin:0;font-family:Arial;background:#0e0e0e;color:#fff}
.wrapper{max-width:900px;margin:auto;padding:20px}
.card{background:#1e1e1e;padding:15px;border-radius:12px;margin-bottom:15px}
input,textarea{width:100%;padding:10px;border-radius:8px;border:none;margin-bottom:10px;box-sizing:border-box}
button{padding:10px;border:none;border-radius:8px;background:#4cafef;color:#fff;cursor:pointer}
button:disabled{opacity:.6;cursor:not-allowed}
.room{display:flex;justify-content:space-between;align-items:center;background:#2a2a2a;padding:10px;border-radius:10px;margin-bottom:10px;gap:10px}
.score-item{display:flex;justify-content:space-between;background:#2a2a2a;padding:8px;border-radius:8px;margin-top:5px}
#letters{display:flex;gap:8px;justify-content:center;margin:10px 0;flex-wrap:wrap}
.letter-box{background:#2a2a2a;padding:12px 16px;border-radius:8px;font-size:22px}
#timer{text-align:center;font-size:20px;margin-bottom:10px}
#hint{display:none;text-align:center;margin-top:10px;color:#4cafef}
#status{text-align:center;margin-top:8px;color:#aaa}
</style>
</head>
<body>

<div class="wrapper">

<div class="card">
<h2>Create Room</h2>
<input id="roomName" placeholder="Room name">
<input id="roomPass" placeholder="Password (optional)">
<input id="roundTime" type="number" value="30">
<input id="roundCount" type="number" value="3">
<button onclick="createRoom()">Create</button>
</div>

<div class="card">
<h2>Rooms</h2>
<div id="rooms"></div>
</div>

<div class="card">
<h2>Current Room</h2>
<div id="currentRoom">None</div>
<button id="startBtn" onclick="startGame()" style="display:none">Start</button>
<button onclick="leaveRoom()">Leave</button>
<div id="scoreboard"></div>
</div>

<div class="card" id="gameBox" style="display:none">
<h2>Round</h2>
<div id="letters"></div>
<div id="timer"></div>
<textarea id="words" placeholder="1 word per line" autocomplete="off" spellcheck="false"></textarea>
<div id="hint"></div>
<div id="status"></div>
</div>

</div>

<script>
let backend = ""
let token = localStorage.getItem("Token") || ""
let currentRoom = null
let username = ""
let lastRooms = []
let activeRoundKey = ""
let roundEndsAt = null
let currentLetters = ""
let refreshBusy = false
let submitting = false
let hintVisible = false
let timerLoop = null
let roomPollLoop = null
let roomListLoop = null

function el(id){
return document.getElementById(id)
}

function value(id){
const node = el(id)
return node ? node.value : ""
}

function parseJSONSafe(text){
try{
return JSON.parse(text)
}catch{
return null
}
}

function toInt(v, fallback){
const n = parseInt(v,10)
return Number.isFinite(n) ? n : fallback
}

function normalizeWords(raw){
return raw
.split("\n")
.map(x => x.trim().toLowerCase())
.filter(Boolean)
}

function countLetters(text){
const map = {}
for(const c of String(text).toLowerCase()){
map[c] = (map[c] || 0) + 1
}
return map
}

function validWordFrontend(word, letters){
const pool = countLetters(letters)
for(const c of word){
if(!pool[c]) return false
pool[c]--
}
return true
}

function getLongestTypedWord(words, letters){
let best = ""
for(const w of words){
if(!validWordFrontend(w, letters)) continue
if(w.length > best.length) best = w
}
return best
}

function getHintWord(letters){
const words = [
"aviation","question","equation","frequency","sequence","fiction","action",
"creation","reaction","fraction","vocation","location","ration","cation"
]
let best = ""
for(const w of words){
if(validWordFrontend(w, letters) && w.length > best.length) best = w
}
return best || "No word"
}

function getRoundKey(data){
return String(
data.roundId ??
data.round ??
data.turn ??
data.gameId ??
data.letters ??
data.startedAt ??
data.startTime ??
data.endTime ??
""
)
}

function parseTimestamp(value){
if(value === null || value === undefined || value === "") return null
if(typeof value === "number") return value < 1e12 ? value * 1000 : value
if(typeof value === "string"){
const n = Number(value)
if(Number.isFinite(n)) return n < 1e12 ? n * 1000 : n
const d = Date.parse(value)
if(Number.isFinite(d)) return d
}
return null
}

function getTimeLeftFromData(data){
const direct =
data.timeLeft ??
data.remaining ??
data.remainingTime ??
data.secondsLeft ??
data.left ??
null

const directNum = Number(direct)
if(Number.isFinite(directNum)) return Math.max(0, directNum)

const endsAt =
parseTimestamp(data.endsAt ?? data.endTime ?? data.roundEndsAt ?? data.finishAt ?? null)
if(endsAt !== null){
return Math.max(0, Math.ceil((endsAt - Date.now()) / 1000))
}

const startedAt =
parseTimestamp(data.startedAt ?? data.startTime ?? data.roundStartedAt ?? data.beganAt ?? null)

const duration =
Number(data.time ?? data.duration ?? data.roundTime ?? data.seconds ?? null)

if(startedAt !== null && Number.isFinite(duration)){
return Math.max(0, Math.ceil(((startedAt + duration * 1000) - Date.now()) / 1000))
}

if(Number.isFinite(duration)) return Math.max(0, Math.ceil(duration))

return null
}

function setStatus(text){
const node = el("status")
if(node) node.innerText = text || ""
}

function renderLetters(letters){
const container = el("letters")
if(!container) return
container.innerHTML = ""
String(letters || "").split("").forEach(l => {
const div = document.createElement("div")
div.className = "letter-box"
div.innerText = l
container.appendChild(div)
})
}

function renderScoreboard(data){
const box = el("scoreboard")
if(!box) return
box.innerHTML = ""

if(data.lastResults){
box.innerHTML += "<b>Last Round</b>"
for(const p in data.lastResults){
const r = data.lastResults[p]
box.innerHTML += `<div class="score-item"><div>${p}</div><div>${r.word || "-"} (${r.points})</div></div>`
}
}

if(data.scores){
box.innerHTML += "<br><b>Total</b>"
for(const p in data.scores){
box.innerHTML += `<div class="score-item"><div>${p}</div><div>${data.scores[p]}</div></div>`
}
}

if(data.winner){
box.innerHTML += `<br><b>Winner: ${data.winner.name} (${data.winner.points})</b>`
}
}

function updateTimerDisplay(){
if(!currentRoom || !roundEndsAt) return
const timerNode = el("timer")
if(!timerNode) return
const remaining = Math.max(0, Math.ceil((roundEndsAt - Date.now()) / 1000))
timerNode.innerText = remaining + "s"
if(remaining <= 0){
if(!submitting){
submitWords(true)
}
}
}

function showRound(data){
const gameBox = el("gameBox")
const wordsBox = el("words")
const hintBox = el("hint")
const timerNode = el("timer")
if(gameBox) gameBox.style.display = "block"

const roundKey = getRoundKey(data)
const isNewRound = roundKey !== activeRoundKey

activeRoundKey = roundKey
currentLetters = String(data.letters || currentLetters || "")

if(isNewRound){
submitting = false
roundEndsAt = null
if(wordsBox){
wordsBox.value = ""
wordsBox.disabled = false
}
renderLetters(currentLetters)
if(hintBox){
if(username === "BossSquirtle" || username === "Somin"){
hintBox.style.display = hintVisible ? "block" : "none"
hintBox.innerText = "Best: " + getHintWord(currentLetters)
}else{
hintBox.style.display = "none"
hintBox.innerText = ""
}
}
}

const timeLeft = getTimeLeftFromData(data)
if(timeLeft !== null){
roundEndsAt = Date.now() + timeLeft * 1000
}

if(timerNode){
timerNode.innerText = Math.max(0, timeLeft !== null ? timeLeft : 0) + "s"
}

updateTimerDisplay()
}

async function init(){
try{
backend = (await fetch("server.txt",{cache:"no-store"}).then(r => r.text())).trim()
}catch{
setStatus("Server address missing")
return
}

try{
const me = await fetch(backend + "/me",{headers:{Authorization:token},cache:"no-store"})
const meData = await me.json()
username = meData.username || ""
}catch{
username = ""
}

await loadRooms()
await refreshRoom()

if(roomListLoop) clearInterval(roomListLoop)
if(roomPollLoop) clearInterval(roomPollLoop)
if(timerLoop) clearInterval(timerLoop)

roomListLoop = setInterval(loadRooms,3000)
roomPollLoop = setInterval(refreshRoom,300)
timerLoop = setInterval(updateTimerDisplay,100)
}
init()

document.addEventListener("keydown",(e)=>{
if(e.key.toLowerCase() === "m"){
if(username === "BossSquirtle" || username === "Somin"){
hintVisible = !hintVisible
const hintBox = el("hint")
if(hintBox){
hintBox.style.display = hintVisible ? "block" : "none"
}
}
}
})

async function fetchRooms(){
const r = await fetch(backend + "/rooms",{cache:"no-store"})
const data = await r.json()
return Array.isArray(data) ? data : []
}

async function loadRooms(){
try{
lastRooms = await fetchRooms()
const box = el("rooms")
if(!box) return
box.innerHTML = ""

lastRooms.forEach(room => {
const div = document.createElement("div")
div.className = "room"
div.innerHTML = `
<div>${room.name} (${room.players.length})</div>
<button onclick="joinRoom('${room.id}',${room.hasPassword ? "true" : "false"})">Join</button>
`
box.appendChild(div)
})
}catch{
const box = el("rooms")
if(box) box.innerHTML = "<div>Unable to load rooms</div>"
}
}

async function createRoom(){
const name = value("roomName").trim()
const pass = value("roomPass")
const time = toInt(value("roundTime"),30)
const rounds = toInt(value("roundCount"),3)

try{
const res = await fetch(backend + "/create-room",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({
name,
pass,
time,
rounds
})
})

const data = await res.json().catch(()=>null)
await loadRooms()

let roomId = data && (data.roomId || data.id || data.room?.id || data.room?.roomId)
if(!roomId && name){
const matches = lastRooms.filter(r => r.name === name)
if(matches.length === 1) roomId = matches[0].id
}

if(roomId){
await joinRoom(roomId, !!pass, pass)
}
}catch{
setStatus("Could not create room")
}
}

async function joinRoom(id, hasPass, overridePassword){
let password = overridePassword || ""
if(hasPass && !password){
password = prompt("Password") || ""
}

try{
const res = await fetch(backend + "/join-room",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({
roomId:id,
password
})
})

if(!res.ok){
setStatus("Join failed")
return
}

currentRoom = id
activeRoundKey = ""
roundEndsAt = null
currentLetters = ""
submitting = false

const gameBox = el("gameBox")
if(gameBox) gameBox.style.display = "none"

await refreshRoom(true)
await loadRooms()
}catch{
setStatus("Join failed")
}
}

function leaveRoom(){
currentRoom = null
activeRoundKey = ""
roundEndsAt = null
currentLetters = ""
submitting = false
const gameBox = el("gameBox")
const currentRoomNode = el("currentRoom")
const scoreboard = el("scoreboard")
const timerNode = el("timer")
const lettersNode = el("letters")
const wordsBox = el("words")
const hintBox = el("hint")
const startBtn = el("startBtn")
if(gameBox) gameBox.style.display = "none"
if(currentRoomNode) currentRoomNode.innerText = "None"
if(scoreboard) scoreboard.innerHTML = ""
if(timerNode) timerNode.innerText = ""
if(lettersNode) lettersNode.innerHTML = ""
if(wordsBox) wordsBox.value = ""
if(hintBox){
hintBox.style.display = "none"
hintBox.innerText = ""
}
if(startBtn) startBtn.style.display = "none"
}

async function startGame(){
if(!currentRoom) return
try{
await fetch(backend + "/start-room",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({roomId:currentRoom})
})
}catch{
setStatus("Could not start game")
}
}

async function refreshRoom(force){
if(!currentRoom) return
if(refreshBusy && !force) return
refreshBusy = true

try{
const r = await fetch(backend + "/room/" + currentRoom,{
headers:{Authorization:token},
cache:"no-store"
})

if(!r.ok) return

const data = await r.json()
if(!data) return

const currentRoomNode = el("currentRoom")
const startBtn = el("startBtn")
if(currentRoomNode) currentRoomNode.innerText = data.name || "Room"

if(data.players && !data.started){
if(startBtn) startBtn.style.display = data.players.length >= 2 ? "block" : "none"
}else{
if(startBtn) startBtn.style.display = "none"
}

renderScoreboard(data)

if(data.started){
showRound(data)
}else{
const gameBox = el("gameBox")
if(gameBox) gameBox.style.display = "none"
activeRoundKey = ""
roundEndsAt = null
currentLetters = ""
submitting = false
setStatus("")
}
}catch{
}catch{
}finally{
refreshBusy = false
}
}

async function submitWords(force){
if(submitting) return
if(!currentRoom) return

const wordsBox = el("words")
const words = normalizeWords(wordsBox ? wordsBox.value : "")
const longestWord = getLongestTypedWord(words, currentLetters)

submitting = true
if(wordsBox) wordsBox.disabled = true
setStatus("Submitting")

try{
await fetch(backend + "/submit",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({
roomId:currentRoom,
words,
longestWord,
submittedAt:Date.now()
})
})
setStatus("Submitted")
}catch{
submitting = false
if(wordsBox) wordsBox.disabled = false
setStatus("Submit failed")
}
}

setInterval(updateTimerDisplay,100)
</script>

</body>
</html>
