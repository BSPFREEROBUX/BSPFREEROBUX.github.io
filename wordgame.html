<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Game</title>
<style>
body{margin:0;font-family:Arial;background:#0e0e0e;color:#fff}
.wrapper{max-width:900px;margin:auto;padding:20px}
.card{background:#1e1e1e;padding:15px;border-radius:12px;margin-bottom:15px}
input,textarea{width:100%;padding:10px;border-radius:8px;border:none;margin-bottom:10px}
button{padding:10px;border:none;border-radius:8px;background:#4cafef;color:#fff;cursor:pointer}
.room{display:flex;justify-content:space-between;align-items:center;background:#2a2a2a;padding:10px;border-radius:10px;margin-bottom:10px}
.score-item{display:flex;justify-content:space-between;background:#2a2a2a;padding:8px;border-radius:8px;margin-top:5px}
#letters{font-size:30px;text-align:center;margin:10px 0}
#timer{text-align:center;font-size:20px;margin-bottom:10px}
</style>
</head>
<body>

<div class="wrapper">

<div class="card">
<h2>Create Room</h2>
<input id="roomName" placeholder="Room name">
<input id="roomPass" placeholder="Password (optional)">
<input id="roundTime" type="number" value="30">
<input id="roundCount" type="number" value="3">
<button onclick="createRoom()">Create</button>
</div>

<div class="card">
<h2>Rooms</h2>
<div id="rooms"></div>
</div>

<div class="card">
<h2>Current Room</h2>
<div id="currentRoom">None</div>
<button id="startBtn" onclick="startGame()" style="display:none">Start</button>
<button onclick="leaveRoom()">Leave</button>
<div id="scoreboard"></div>
</div>

<div class="card" id="gameBox" style="display:none">
<h2>Round</h2>
<div id="letters"></div>
<div id="timer"></div>
<textarea id="words" placeholder="1 word per line"></textarea>
<button onclick="submitWords()">Submit</button>
</div>

</div>

<script>
let backend=""
let token=localStorage.getItem("Token")
let currentRoom=null
let roundTimer=null
let lastLetters=""

async function init(){
backend=(await fetch("server.txt").then(r=>r.text())).trim()
loadRooms()
setInterval(loadRooms,3000)
setInterval(refreshRoom,1000)
}
init()

async function loadRooms(){
const r=await fetch(backend+"/rooms")
const data=await r.json()

const box=document.getElementById("rooms")
box.innerHTML=""

data.forEach(room=>{
const div=document.createElement("div")
div.className="room"
div.innerHTML=`
<div>${room.name} (${room.players.length})</div>
<button onclick="joinRoom('${room.id}',${room.hasPassword})">Join</button>
`
box.appendChild(div)
})
}

async function createRoom(){
await fetch(backend+"/create-room",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({
name:roomName.value,
pass:roomPass.value,
time:parseInt(roundTime.value),
rounds:parseInt(roundCount.value)
})
})
loadRooms()
}

async function joinRoom(id,hasPass){
let password=""
if(hasPass) password=prompt("Password")||""

await fetch(backend+"/join-room",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({roomId:id,password})
})

currentRoom=id
currentRoomDiv.innerText="Joined"
}

function leaveRoom(){
currentRoom=null
document.getElementById("gameBox").style.display="none"
}

async function startGame(){
await fetch(backend+"/start-room",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({roomId:currentRoom})
})
}

async function refreshRoom(){
if(!currentRoom) return

const r=await fetch(backend+"/room/"+currentRoom,{
headers:{Authorization:token}
})
const data=await r.json()

if(!data) return

document.getElementById("currentRoom").innerText=data.name

if(data.players.length>=2 && !data.started){
document.getElementById("startBtn").style.display="block"
}else{
document.getElementById("startBtn").style.display="none"
}

renderScoreboard(data)

if(data.started && data.letters!==lastLetters){
lastLetters=data.letters
startRound(data)
}
}

function startRound(data){
document.getElementById("gameBox").style.display="block"
document.getElementById("letters").innerText=data.letters
document.getElementById("words").value=""

let time=data.time
document.getElementById("timer").innerText=time+"s"

clearInterval(roundTimer)

roundTimer=setInterval(()=>{
time--
if(time<0) time=0
document.getElementById("timer").innerText=time+"s"

if(time===0){
clearInterval(roundTimer)
submitWords()
}
},1000)
}

async function submitWords(){
const words=document.getElementById("words").value
.split("\n")
.map(x=>x.trim().toLowerCase())
.filter(x=>x)

await fetch(backend+"/submit",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:token
},
body:JSON.stringify({
roomId:currentRoom,
words
})
})
}

function renderScoreboard(data){
const box=document.getElementById("scoreboard")
box.innerHTML=""

if(data.lastResults){
box.innerHTML+="<b>Last Round</b>"
for(const p in data.lastResults){
const r=data.lastResults[p]
box.innerHTML+=`<div class="score-item"><div>${p}</div><div>${r.word||"-"} (${r.points})</div></div>`
}
}

if(data.scores){
box.innerHTML+="<br><b>Total</b>"
for(const p in data.scores){
box.innerHTML+=`<div class="score-item"><div>${p}</div><div>${data.scores[p]}</div></div>`
}
}

if(data.winner){
box.innerHTML+=`<br><b>Winner: ${data.winner.name} (${data.winner.points})</b>`
}
}
</script>

</body>
</html>
