<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zyphor Password Reset</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box
}

body{
background:#0d0d0d;
font-family:system-ui;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:#171717;
border:1px solid #2b2b2b;
border-radius:18px;
padding:32px;
box-shadow:0 0 30px rgba(0,0,0,.4);
}

.logo{
font-size:32px;
font-weight:700;
margin-bottom:8px;
}

.desc{
opacity:.7;
font-size:14px;
line-height:1.5;
margin-bottom:22px;
}

input{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:12px;
background:#101010;
color:white;
font-size:15px;
margin-bottom:14px;
border:1px solid #262626;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#4caf50;
color:white;
font-weight:700;
font-size:15px;
cursor:pointer;
transition:.15s;
}

button:hover{
opacity:.92;
transform:translateY(-1px);
}

.status{
margin-top:16px;
font-size:14px;
word-break:break-word;
opacity:.9;
}

.success{
color:#4caf50;
}

.error{
color:#ff5c5c;
}

.footer{
margin-top:22px;
opacity:.45;
font-size:12px;
text-align:center;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">Zyphor</div>

<div class="desc">
You have been granted a one-time password reset request.
This link may expire after a limited amount of time and can only be used once.
</div>

<input
id="password"
type="password"
placeholder="Enter new password"
>

<button onclick="changePassword()">
Change Password
</button>

<div id="status" class="status"></div>

<div class="footer">
zyphor.cc
</div>

</div>

<script>

const token=location.pathname.split("/").pop()

async function changePassword(){

const password=document.getElementById("password").value
const status=document.getElementById("status")

status.className="status"
status.innerHTML="Processing..."

try{

const r=await fetch("/password-reset/change",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
token,
password
})
})

const data=await r.json()

if(data.success){

status.className="status success"
status.innerHTML="Password changed successfully."

}else{

status.className="status error"

if(data.error==="expired"){
status.innerHTML="This reset link has expired."
}

else if(data.error==="used"){
status.innerHTML="This reset link has already been used."
}

else if(data.error==="samepassword"){
status.innerHTML="You cannot reuse your current password."
}

else if(data.error==="oldpassword"){
status.innerHTML="You cannot reuse an old password."
}

else{
status.innerHTML=data.error || "Failed to change password."
}

}

}catch{

status.className="status error"
status.innerHTML="Server error."

}

}

</script>

</body>
</html>
