<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile</title>
<link rel="stylesheet" href="styles.css">

<style>

.profileCard{
max-width:650px;
margin:auto;
padding:25px;
border-radius:10px;
background:rgba(0,0,0,0.25);
}

.profileName{
font-size:28px;
margin-bottom:10px;
}

.roleIcons{
font-size:22px;
margin-left:6px;
cursor:pointer;
}

.tooltip{
position:absolute;
padding:4px 8px;
border-radius:5px;
font-size:12px;
display:none;
pointer-events:none;
}

.staffTip{
background:#333;
color:#ccc;
}

.supportTip{
background:#ffd700;
color:#000;
}

.adminTip{
background:#3498db;
color:#fff;
}

.row{
margin-top:14px;
font-size:16px;
}

.findUser{
display:flex;
align-items:center;
gap:6px;
}

.findUser input{
padding:6px 10px;
border-radius:6px;
border:none;
width:150px;
}

.findUser button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">

<div class="findUser">
<input id="searchUser" placeholder="Find user">
<button onclick="searchProfile()">Find</button>
</div>

<div class="icons">
<span onclick="toggleTheme()">🌓</span>
<span onclick="location.href='dashboard.html'">Dashboard</span>
</div>

</div>

<div class="wrapper" style="margin-top:80px">

<div id="profileBox" class="profileCard">
Search for a user to view their profile
</div>

</div>

<div id="tooltip" class="tooltip"></div>

<script src="theme.js"></script>

<script>

let backend=null

async function getBackend(){
const r=await fetch("server.txt")
return (await r.text()).trim()
}

function getUsername(){
const params=new URLSearchParams(location.search)
return params.get("username")
}

async function safeJson(res){
const t=await res.text()
try{return JSON.parse(t)}catch{return null}
}

function showTip(text,type,x,y){

const tip=document.getElementById("tooltip")

tip.innerText=text

tip.className="tooltip"

if(type==="staff") tip.classList.add("staffTip")
if(type==="support") tip.classList.add("supportTip")
if(type==="admin") tip.classList.add("adminTip")

tip.style.left=x+10+"px"
tip.style.top=y+10+"px"
tip.style.display="block"

}

function hideTip(){
tooltip.style.display="none"
}

function createRoleIcons(p){

let icons=""

if(p.support || p.admin){
icons+=`<span class="roleIcons" onmousemove="showTip('Staff Member','staff',event.pageX,event.pageY)" onmouseleave="hideTip()">⚒️</span>`
}

if(p.support){
icons+=`<span class="roleIcons" onmousemove="showTip('Support','support',event.pageX,event.pageY)" onmouseleave="hideTip()">🎗️</span>`
}

if(p.admin){
icons+=`<span class="roleIcons" onmousemove="showTip('Administrator','admin',event.pageX,event.pageY)" onmouseleave="hideTip()">💎</span>`
}

return icons

}

function searchProfile(){
const username=document.getElementById("searchUser").value.trim()
if(!username) return
location.href="profile.html?username="+encodeURIComponent(username)
}

async function loadProfile(){

backend=await getBackend()

const username=getUsername()

if(!username){
profileBox.innerHTML="Search for a user to view their profile"
return
}

document.getElementById("searchUser").value=username

const r=await fetch(backend+"/profile?username="+encodeURIComponent(username))
const data=await safeJson(r)

if(!data || data.error){
profileBox.innerHTML="User not found"
return
}

let earningsHTML="None"

if(data.earnings){
earningsHTML=Object.entries(data.earnings)
.map(([k,v])=>`${v} ${k}`)
.join("<br>")
}

let discord="Not linked"

if(data.linked){
discord=data.linked.username || data.linked.id
}

const icons=createRoleIcons(data.permissions)

profileBox.innerHTML=`

<div class="profileName">
${data.username} ${icons}
</div>

<div class="row">
<b>Account Created:</b><br>
${new Date(data.created).toLocaleString()}
</div>

<div class="row">
<b>Discord:</b><br>
${discord}
</div>

<div class="row">
<b>Quests Completed:</b><br>
${data.questsCompleted}
</div>

<div class="row">
<b>Total Earnings:</b><br>
${earningsHTML}
</div>

`

}

document.getElementById("searchUser").addEventListener("keypress",e=>{
if(e.key==="Enter") searchProfile()
})

loadProfile()

</script>

</body>
</html>
