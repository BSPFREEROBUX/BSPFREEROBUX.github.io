<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cloud</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:#0e0e0e;
color:white;
padding:25px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.card{
background:#181818;
padding:20px;
border-radius:16px;
margin-bottom:20px;
}

button{
border:none;
padding:10px 15px;
border-radius:10px;
background:#4cafef;
color:white;
font-weight:bold;
cursor:pointer;
}

input{
width:100%;
padding:12px;
border:0;
border-radius:10px;
background:#262626;
color:white;
}

.storage{
margin-bottom:20px;
}

.bar{
height:18px;
background:#2a2a2a;
border-radius:20px;
overflow:hidden;
}

.fill{
height:100%;
background:#4cafef;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:8px;
}

.photo{
position:relative;
height:250px;
background:#222;
overflow:hidden;
border-radius:5px;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.photo:hover .overlay{
opacity:1;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.55);
display:flex;
align-items:center;
justify-content:center;
gap:10px;
opacity:0;
transition:.2s;
}

.selectFile{
width:auto;
padding:0;
margin:0;
}

.uploadBox{
display:flex;
gap:10px;
}
</style>
</head>

<body>

<div class="top">

<h1>☁ Photos</h1>

<button onclick="location.href='dashboard.html'">
Back
</button>

</div>


<div class="card">

<h2>Upload Image</h2>

<div class="uploadBox">

<input type="file" id="file" accept=".png,.jpg,.jpeg">

<button onclick="uploadFile()">
Upload
</button>

</div>

</div>

<div class="card">

<button onclick="favoriteSelected()">
⭐ Favorite
</button>

<button onclick="addTags()">
🏷 Tags
</button>

<button onclick="deleteSelected()">
🗑 Delete
</button>

</div>

<div class="card">

<input
id="search"
placeholder="Search filename, tags, albums or description..."
oninput="searchFiles()">

<br><br>

<div id="storage"></div>

<div id="files">
Loading...
</div>

</div>


<script>

let backend=null


async function getBackend(){

const r=await fetch("server.txt")

return (await r.text()).trim()

}


async function safeJson(r){

try{

return await r.json()

}catch{

return null

}

}


async function init(){

backend=await getBackend()

const token=localStorage.getItem("Token")

if(!token){

location.href="login.html"

return

}


const r=await fetch(backend+"/me",{

headers:{
Authorization:token
}

})


const d=await safeJson(r)


if(!d || d.error){

localStorage.removeItem("Token")

location.href="login.html"

return

}


loadFiles()

}

async function searchFiles(){

const query = document.getElementById("search").value.trim();

const box = document.getElementById("files");
box.className = "gallery";
box.innerHTML = "";

if(!query){
    await loadFiles();
    return;
}

const r = await fetch(
backend + "/cloud/search",
{
method:"POST",
headers:{
Authorization:localStorage.getItem("Token"),
"Content-Type":"application/json"
},
body:JSON.stringify({query})
}
);

const d = await r.json();

if(!d || !d.files){
    alert("Search failed");
    return;
}

for(const file of d.files){

    const imageRequest = await fetch(
        backend + "/cloud/download/" + encodeURIComponent(file.name),
        {
            headers:{
                Authorization:localStorage.getItem("Token")
            }
        }
    );

    const blob = await imageRequest.blob();
    const url = URL.createObjectURL(blob);

    const div = document.createElement("div");
    div.className = "photo";

    div.innerHTML = `

<input
class="selectFile"
type="checkbox"
value="${file.name}"
style="
position:absolute;
top:8px;
left:8px;
z-index:10;
">

<img src="${url}">

<div class="overlay">

<div style="
position:absolute;
top:10px;
left:10px;
right:10px;
font-size:13px;
line-height:18px;
color:white;
">

<b>${file.name}</b>

<br><br>

📁 ${file.album || "None"}

<br>

🏷 ${file.tags && file.tags.length ? file.tags.join(", ") : "None"}

<br>

📝 ${file.description || ""}

</div>

<div style="
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
">

<button onclick="downloadFile('${encodeURIComponent(file.name)}')">
Download
</button>

<button onclick="deleteFile('${file.name}')">
Delete
</button>

<button onclick="editTags('${file.name}')">
🏷 Tags
</button>

<button onclick="toggleFavorite('${file.name}', ${file.favorite})">
${file.favorite ? "⭐" : "☆"}
</button>

</div>

</div>

`;

    box.appendChild(div);

}

}

async function removeTag(name, tag){

    const r = await fetch(backend + "/cloud/tags/remove",{
        method:"POST",
        headers:{
            Authorization:localStorage.getItem("Token"),
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            files:[name],
            tags:[tag]
        })
    });

    const d = await r.json();

    if(d.error){
        alert(d.error);
        return;
    }

    loadFiles();

}


async function uploadFile(){

const input=document.getElementById("file")


if(!input.files.length){

alert("Select image")

return

}


const file=input.files[0]


if(
![
"image/png",
"image/jpeg",
"image/jpg"
].includes(file.type)
){

alert("Only PNG JPG JPEG allowed")

return

}


const fd=new FormData()

fd.append("file",file)


const xhr=new XMLHttpRequest()


xhr.open(
"POST",
backend+"/cloud/upload"
)


xhr.setRequestHeader(
"Authorization",
localStorage.getItem("Token")
)


xhr.onload = () => {
    const d = JSON.parse(xhr.responseText || "{}")

    if (!xhr.status.toString().startsWith("2") || d.error) {
        alert(d.error || "Upload failed")
        return
    }

    input.value = ""
    loadFiles()
}


xhr.send(fd)

}


async function loadFiles(){

const r=await fetch(
backend+"/cloud/list",
{
headers:{
Authorization:localStorage.getItem("Token")
}
}
)

const d=await safeJson(r)

let total=0

d.files.forEach(f=>{
total+=f.size || 0
})

const gb=(total/1024/1024/1024).toFixed(2)

const percent=Math.min(
100,
(total/(1024*1024*1024))*100
)

document.getElementById("storage").innerHTML=`

<div class="storage">

<h3>
Storage Used: ${gb} GB / 1 GB
</h3>

<div class="bar">

<div class="fill" style="width:${percent}%"></div>

</div>

</div>

`

const box=document.getElementById("files")

box.className="gallery"

box.innerHTML=""


if(!d.files.length){

box.innerHTML="No images"

return

}


let groups={}


d.files.forEach(file=>{

const day=new Date(file.uploadedAt).toLocaleDateString(
undefined,
{
weekday:"long",
year:"numeric",
month:"long",
day:"numeric"
}
)

if(!groups[day]){
groups[day]=[]
}

groups[day].push(file)

})


for(const day in groups){


const title=document.createElement("h2")

title.style.gridColumn="1/-1"

title.textContent=day

box.appendChild(title)


for(const file of groups[day]){


const imageRequest = await fetch(
    backend + "/cloud/download/" + encodeURIComponent(file.name),
    {
        headers: {
            Authorization: localStorage.getItem("Token")
        }
    }
);

const blob = await imageRequest.blob();
const url = URL.createObjectURL(blob);

const div = document.createElement("div");
div.className = "photo";

div.innerHTML = `

<input
class="selectFile"
type="checkbox"
value="${file.name}"
style="
position:absolute;
top:8px;
left:8px;
z-index:10;
">

<img src="${url}">

<div class="overlay">

<div style="
position:absolute;
top:10px;
left:10px;
right:10px;
font-size:13px;
line-height:18px;
color:white;
">

<b>${file.name}</b>

<br>

<br>

📁 ${file.album || "None"}

<br>

🏷 ${
file.tags && file.tags.length
?
file.tags.map(tag => `
<div style="display:flex;align-items:center;justify-content:space-between;margin-top:3px;">
    <span>${tag}</span>
    <button
        style="padding:2px 6px;font-size:11px;background:#d9534f;"
        onclick="event.stopPropagation();removeTag('${file.name}','${tag}')">
        ❌
    </button>
</div>
`).join("")
:
"None"
}

<br>

📝 ${file.description || ""}

</div>

<div style="
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
transform:translateX(-50%);
">

<button onclick="downloadFile('${encodeURIComponent(file.name)}')">
Download
</button>

<button onclick="deleteFile('${file.name}')">
Delete
</button>

<button onclick="editTags('${file.name}')">
🏷 Tags
</button>

<button onclick="toggleFavorite('${file.name}', ${file.favorite})">
${file.favorite ? "⭐" : "☆"}
</button>

</div>

</div>

`;

box.appendChild(div);

}

}

}

async function toggleFavorite(name, currentFavorite){

const r = await fetch(
backend + "/cloud/favorite",
{
method:"POST",
headers:{
Authorization:localStorage.getItem("Token"),
"Content-Type":"application/json"
},
body:JSON.stringify({
name,
favorite: !currentFavorite
})
}
);

const d = await r.json();

if(d.error){
alert(d.error);
return;
}

loadFiles();

}

async function editTags(name){

    const r = await fetch(
        backend + "/cloud/list",
        {
            headers:{
                Authorization:localStorage.getItem("Token")
            }
        }
    );

    const d = await r.json();

    const file = d.files.find(f => f.name === name);

    if(!file){
        alert("File not found");
        return;
    }

    let message = "Current Tags:\n\n";

    if(file.tags.length){

        file.tags.forEach((tag,i)=>{
            message += (i+1)+". "+tag+"\n";
        });

    }else{

        message += "None\n";

    }

    message += "\nType:\n";
    message += "+tag   to add\n";
    message += "-tag   to remove";

    const input = prompt(message);

    if(input===null || !input.trim())
        return;

    if(input.startsWith("+")){

        await fetch(
            backend+"/cloud/tags/add",
            {
                method:"POST",
                headers:{
                    Authorization:localStorage.getItem("Token"),
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    files:[name],
                    tags:[input.substring(1).trim()]
                })
            }
        );

    }else if(input.startsWith("-")){

        await fetch(
            backend+"/cloud/tags/remove",
            {
                method:"POST",
                headers:{
                    Authorization:localStorage.getItem("Token"),
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    files:[name],
                    tags:[input.substring(1).trim()]
                })
            }
        );

    }else{

        alert("Use +tag or -tag");

    }

    loadFiles();

}
function getSelectedFiles(){

return [...document.querySelectorAll(".selectFile:checked")]
.map(x=>x.value)

}

async function deleteSelected(){

const files=getSelectedFiles()

for(const name of files){

await deleteFile(name)

}

}

async function addTags(){

const files=getSelectedFiles()

const tags=prompt("Tags")

if(tags===null)
return

for(const name of files){

await fetch(
backend+"/cloud/tags/add",
{
method:"POST",
headers:{
Authorization:localStorage.getItem("Token"),
"Content-Type":"application/json"
},
body:JSON.stringify({
name,
tags:tags.split(",")
})
}
)

}

loadFiles()

}

async function favoriteSelected(){

const files=getSelectedFiles()

for(const name of files){

await toggleFavorite(name)

}

}

async function setDescription(){

const files=getSelectedFiles()

const description=prompt("Description")

if(description===null)
return

for(const name of files){

await fetch(
backend+"/cloud/description",
{
method:"POST",
headers:{
Authorization:localStorage.getItem("Token"),
"Content-Type":"application/json"
},
body:JSON.stringify({
name,
description
})
}
)

}

loadFiles()

}

function selectAll(){

const boxes=document.querySelectorAll(".selectFile");

const allChecked=[...boxes].every(x=>x.checked);

boxes.forEach(x=>x.checked=!allChecked);

}

async function downloadFile(name){


const r=await fetch(
backend+"/cloud/download/"+name,
{
headers:{
Authorization:localStorage.getItem("Token")
}
}
)


const blob=await r.blob()


const url=URL.createObjectURL(blob)


const a=document.createElement("a")


a.href=url

a.download=decodeURIComponent(name)


a.click()


URL.revokeObjectURL(url)


}


async function deleteFile(name){


await fetch(
backend+"/cloud/delete",
{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:localStorage.getItem("Token")
},
body:JSON.stringify({
name
})
}
)


loadFiles()


}


init()

</script>

</body>
</html>
