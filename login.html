<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="styles.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.popup-box{
background:#12121a;
padding:20px;
border-radius:10px;
width:90%;
max-width:320px;
text-align:center;
}

.popup-box input{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:6px;
}

.popup-box button{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:6px;
cursor:pointer;
}

.tosbox{
width:100%;
height:220px;
overflow-y:auto;
border:1px solid rgba(255,255,255,0.15);
border-radius:10px;
padding:12px;
margin-top:14px;
background:rgba(0,0,0,0.25);
font-size:13px;
line-height:1.5;
white-space:pre-wrap;
box-sizing:border-box;
text-align:left;
}

.tosagree{
display:flex;
align-items:center;
gap:8px;
margin-top:12px;
font-size:14px;
opacity:.6;
pointer-events:none;
}

.tosagree.enabled{
opacity:1;
pointer-events:auto;
}

.tosagree input{
width:16px;
height:16px;
}
</style>
</head>
<body>

<div class="toggle" onclick="toggleTheme()">Toggle</div>

<div class="wrapper">
<h2>Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<div id="tosbox" class="tosbox">Loading Terms of Service...</div>

<label id="tosagree" class="tosagree">
<input type="checkbox" id="agree">
<span>I have read and agree to the Terms of Service</span>
</label>

<button onclick="login()">Login</button>

<a href="signup.html">Create account</a>
</div>

<div class="popup" id="twofaPopup">
  <div class="popup-box">
    <h3>Enter 2FA Code</h3>
    <input id="twofaCode" placeholder="Code">
    <button onclick="submit2FA()">Verify</button>
  </div>
</div>

<script src="theme.js"></script>

<script>
let pendingUser = null
let backendUrl = null
let tosRead = false

async function loadTos(){
  try{
    const r = await fetch("tos.txt")
    const text = await r.text()
    tosbox.textContent = text
  }catch{
    tosbox.textContent = "Failed to load Terms of Service."
  }
}

tosbox.addEventListener("scroll",()=>{
  const nearBottom = tosbox.scrollTop + tosbox.clientHeight >= tosbox.scrollHeight - 10

  if(nearBottom && !tosRead){
    tosRead = true
    tosagree.classList.add("enabled")
  }
})

document.addEventListener("keydown",e=>{
if(e.key==="Enter"){
const popup=document.getElementById("twofaPopup")

if(popup.style.display==="flex"){
submit2FA()
}else{
login()
}
}
})

async function getBackend(){
  const r = await fetch("server.txt")
  return (await r.text()).trim()
}

async function login(){
  if(!tosRead){
    alert("You must scroll through the Terms of Service first")
    return
  }

  if(!agree.checked){
    alert("You must agree to the Terms of Service")
    return
  }

  try{
    const base = await getBackend()
    backendUrl = base

    if(!base){
      alert("Backend not found")
      return
    }

    const username = document.getElementById("username").value
    const password = document.getElementById("password").value

    const r = await fetch(base + "/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username,
        password,
        agreedToTos: true
      })
    })

    const d = await r.json()

    if(d && d.twofa){
      pendingUser = d.username || username

      if(d.queue){
        alert(
"Queued for 2FA\n\n"+
"Position: "+d.position+
"\nQueue ETA: "+Math.ceil(d.eta/1000)+"s"+
"\nGlobal Cooldown: "+Math.ceil(d.globalCooldown/1000)+"s"
)
      }

      document.getElementById("twofaPopup").style.display = "flex"
      return
    }

    if(d && d.token){
      localStorage.setItem("Token", d.token)
      localStorage.setItem("username", username)
      location.href = "dashboard.html"
    }
    else if(d && d.banned){
      alert("Banned: " + d.reason + "\nRemaining: " + d.remaining)
    }
    else{
      alert("Login failed")
    }

  }catch(err){
    alert("Network error")
  }
}

async function submit2FA(){
  try{
    const code = document.getElementById("twofaCode").value

    const r = await fetch(backendUrl + "/2fa/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: pendingUser,
        code
      })
    })

    const d = await r.json()

    if(d && d.token){
      localStorage.setItem("Token", d.token)
      localStorage.setItem("username", pendingUser)
      location.href = "dashboard.html"
    }else{
      alert("Wrong or expired code")
    }

  }catch(err){
    alert("2FA failed")
  }
}

loadTos()
</script>

</body>
</html>
