<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terms of Service</title>
<style>
*{box-sizing:border-box}
html,body{
margin:0;
font-family:Arial,sans-serif;
background:#0e0e0e;
color:#fff;
overflow-x:hidden;
}
body.light{
background:#f2f2f2;
color:#111;
}
.topbar{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:clamp(8px,1.5vw,15px);
background:#121212;
z-index:1000;
flex-wrap:wrap;
}
body.light .topbar{
background:#ffffff;
}
.icons{
display:flex;
flex-wrap:wrap;
gap:clamp(4px,1vw,10px);
}
.icons span{
cursor:pointer;
font-size:clamp(11px,1.2vw,14px);
padding:clamp(5px,1vw,8px) clamp(8px,1.5vw,12px);
border-radius:8px;
background:#1e1e1e;
}
body.light .icons span{
background:#e6e6e6;
}
.wrapper{
max-width:1200px;
margin:auto;
padding:clamp(10px,2vw,20px);
margin-top:clamp(90px,10vh,130px);
}
.card{
background:#1e1e1e;
padding:clamp(14px,2vw,20px);
border-radius:12px;
margin-bottom:clamp(12px,2vw,18px);
font-size:clamp(13px,1.4vw,15px);
}
body.light .card{
background:#ffffff;
color:#111;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
h1{
font-size:clamp(20px,3vw,28px);
margin-bottom:20px;
}
h2{
font-size:clamp(16px,2vw,20px);
margin-bottom:8px;
}
.footer{
opacity:0.7;
margin-top:20px;
font-size:clamp(12px,1.2vw,14px);
}
</style>
</head>
<body>

<div class="topbar">
<div>Terms of Service</div>
<div class="icons">
<span onclick="toggleTheme()">🌓</span>
</div>
</div>

<div class="wrapper">
<h1>Terms of Service</h1>
<div id="tosContainer"></div>
<div id="lastUpdated" class="footer"></div>
</div>

<script>
function toggleTheme(){
document.body.classList.toggle("light")
localStorage.setItem("theme",document.body.classList.contains("light")?"light":"dark")
}
if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light")
}

async function loadTOS(){
const res = await fetch("TOS.json")
const data = await res.json()

const container = document.getElementById("tosContainer")
container.innerHTML = ""

data.sections.forEach((s,i)=>{
const div = document.createElement("div")
div.className = "card"
div.innerHTML = `<h2>${i+1}. ${s.title}</h2><p>${s.content}</p>`
container.appendChild(div)
})

document.getElementById("lastUpdated").textContent = "Last Updated: " + data.lastUpdated
}

loadTOS()
</script>

</body>
</html>
