<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terms of Service</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Inter',sans-serif;
background:#07070a;
color:#e5e7eb;
overflow-x:hidden;
}

body.light{
background:#f8fafc;
color:#111827;
}

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
align-items:center;
justify-content:space-between;
padding:16px 26px;
background:rgba(7,7,10,.82);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,.06);
z-index:1000;
}

body.light .topbar{
background:rgba(255,255,255,.82);
border-color:#e5e7eb;
}

.brand{
font-size:15px;
font-weight:700;
letter-spacing:.08em;
text-transform:uppercase;
}

.actions{
display:flex;
gap:10px;
}

.btn{
padding:10px 16px;
border-radius:14px;
background:#111114;
border:1px solid #23232a;
cursor:pointer;
font-size:13px;
font-weight:600;
transition:.2s;
user-select:none;
}

.btn:hover{
transform:translateY(-2px);
background:#1a1a21;
}

body.light .btn{
background:#ffffff;
border-color:#e5e7eb;
}

.wrapper{
width:min(1150px,calc(100% - 30px));
margin:auto;
padding-top:110px;
padding-bottom:70px;
}

.hero{
position:relative;
overflow:hidden;
padding:42px;
border-radius:28px;
background:
linear-gradient(180deg,rgba(99,102,241,.22),rgba(99,102,241,0)),
linear-gradient(135deg,#111114,#0b0b0e);
border:1px solid rgba(255,255,255,.06);
margin-bottom:28px;
}

body.light .hero{
background:
linear-gradient(180deg,rgba(99,102,241,.12),rgba(99,102,241,0)),
linear-gradient(135deg,#ffffff,#f3f4f6);
border-color:#e5e7eb;
}

.hero::after{
content:"";
position:absolute;
top:-30%;
right:-10%;
width:420px;
height:420px;
border-radius:50%;
background:radial-gradient(circle,rgba(99,102,241,.22),transparent 70%);
pointer-events:none;
}

.hero h1{
font-size:44px;
font-weight:800;
letter-spacing:-1.4px;
margin-bottom:14px;
position:relative;
z-index:1;
}

.hero p{
max-width:860px;
line-height:1.8;
opacity:.82;
font-size:15px;
position:relative;
z-index:1;
}

.meta{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:18px;
margin-bottom:32px;
}

.meta-card{
padding:20px;
border-radius:22px;
background:#0f0f13;
border:1px solid rgba(255,255,255,.06);
transition:.2s;
}

.meta-card:hover{
transform:translateY(-2px);
border-color:rgba(99,102,241,.35);
}

body.light .meta-card{
background:#ffffff;
border-color:#e5e7eb;
}

.label{
font-size:11px;
font-weight:700;
text-transform:uppercase;
letter-spacing:.12em;
opacity:.5;
margin-bottom:10px;
}

.value{
font-size:14px;
line-height:1.75;
}

.section{
position:relative;
padding:28px;
border-radius:24px;
background:#0f0f13;
border:1px solid rgba(255,255,255,.06);
margin-bottom:22px;
overflow:hidden;
transition:.25s;
}

.section:hover{
border-color:rgba(99,102,241,.28);
transform:translateY(-2px);
}

body.light .section{
background:#ffffff;
border-color:#e5e7eb;
}

.section::before{
content:"";
position:absolute;
top:0;
left:0;
width:4px;
height:100%;
background:linear-gradient(180deg,#6366f1,transparent);
opacity:.9;
}

.section h2{
display:flex;
align-items:center;
gap:12px;
font-size:22px;
font-weight:700;
margin-bottom:20px;
letter-spacing:-0.4px;
}

.section-number{
color:#818cf8;
font-weight:800;
}

.clause{
padding:14px 16px;
margin-bottom:12px;
border-radius:16px;
background:rgba(255,255,255,.02);
border:1px solid rgba(255,255,255,.04);
line-height:1.8;
font-size:14px;
transition:.2s;
}

.clause:hover{
background:rgba(99,102,241,.08);
border-color:rgba(99,102,241,.25);
transform:translateX(2px);
}

body.light .clause{
background:#f8fafc;
border-color:#e5e7eb;
}

.footer{
margin-top:36px;
padding-top:24px;
border-top:1px solid rgba(255,255,255,.06);
opacity:.65;
font-size:13px;
line-height:1.8;
text-align:center;
}

body.light .footer{
border-color:#e5e7eb;
}

::-webkit-scrollbar{
width:9px;
}

::-webkit-scrollbar-thumb{
background:#2a2a34;
border-radius:999px;
}

@media(max-width:700px){

.hero{
padding:28px;
}

.hero h1{
font-size:32px;
}

.section{
padding:22px;
}

.section h2{
font-size:18px;
}

.clause{
padding:12px;
font-size:13px;
}

.topbar{
padding:14px 18px;
}
}
</style>
</head>

<body>

<div class="topbar">
<div class="brand">Terms</div>

<div class="actions">
<div class="btn" onclick="location.href='dashboard.html'">
Dashboard
</div>

<div class="btn" onclick="toggleTheme()">
🌓
</div>
</div>
</div>

<div class="wrapper">

<div class="hero">
<h1 id="heroTitle"></h1>
<p id="heroDesc"></p>
</div>

<div class="meta" id="metaBox"></div>

<div id="sections"></div>

<div class="footer" id="footer"></div>

</div>

<script>
function toggleTheme(){
document.body.classList.toggle("light")

localStorage.setItem(
"theme",
document.body.classList.contains("light")
? "light"
: "dark"
)
}

if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light")
}

async function loadTOS(){

const res = await fetch("tos.txt")
const text = await res.text()

const lines = text
.split("\n")
.map(x=>x.trim())
.filter(Boolean)

const heroTitle = document.getElementById("heroTitle")
const heroDesc = document.getElementById("heroDesc")
const metaBox = document.getElementById("metaBox")
const sections = document.getElementById("sections")
const footer = document.getElementById("footer")

heroTitle.textContent = lines[0] || "Terms of Service"
heroDesc.textContent = lines[1] || ""

metaBox.innerHTML = ""
sections.innerHTML = ""

let i = 2

while(i < lines.length && !/^\d+\.$/.test(lines[i])){

const key = lines[i]
const value = lines[i + 1] || ""

const card = document.createElement("div")
card.className = "meta-card"

card.innerHTML = `
<div class="label">${key}</div>
<div class="value">${value}</div>
`

metaBox.appendChild(card)

i += 2
}

while(i < lines.length){

if(/^\d+\.$/.test(lines[i])){

const number = lines[i].replace(".","")
const title = lines[i + 1] || "Untitled"

const section = document.createElement("div")
section.className = "section"

let html = `
<h2>
<span class="section-number">${number}.</span>
${title}
</h2>
`

i += 2

while(
i < lines.length &&
!/^\d+\.$/.test(lines[i])
){

html += `<div class="clause">${lines[i]}</div>`

i++
}

section.innerHTML = html
sections.appendChild(section)

}else{
i++
}
}

footer.textContent =
"Terms of Service • Last Updated " +
new Date().toISOString().split("T")[0]
}

loadTOS()
</script>

</body>
</html>
