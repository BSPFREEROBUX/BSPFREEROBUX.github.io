<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terms of Service</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

html,body{
font-family:'Inter',sans-serif;
background:#07070a;
color:#e5e7eb;
}

body.light{
background:#f9fafb;
color:#111827;
}

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 20px;
background:rgba(10,10,12,.85);
backdrop-filter:blur(12px);
border-bottom:1px solid #1f1f23;
z-index:1000;
}

body.light .topbar{
background:rgba(255,255,255,.85);
border-color:#e5e7eb;
}

.icons{
display:flex;
gap:10px;
}

.icons span{
cursor:pointer;
padding:8px 14px;
border-radius:12px;
background:#111114;
border:1px solid #1f1f23;
font-size:13px;
transition:.2s;
}

.icons span:hover{
transform:translateY(-1px);
background:#1a1a1f;
}

body.light .icons span{
background:#f3f4f6;
border-color:#e5e7eb;
}

.wrapper{
width:min(1050px,calc(100% - 24px));
margin:auto;
padding-top:110px;
padding-bottom:60px;
}

.hero{
padding:32px;
border-radius:20px;
background:linear-gradient(180deg, rgba(99,102,241,.18), rgba(99,102,241,0));
border:1px solid #1f1f23;
margin-bottom:26px;
position:relative;
overflow:hidden;
}

.hero::after{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:radial-gradient(circle at center, rgba(99,102,241,.08), transparent 60%);
}

.hero h1{
font-size:34px;
font-weight:700;
margin-bottom:10px;
letter-spacing:-0.5px;
}

.hero p{
opacity:.8;
line-height:1.7;
max-width:800px;
}

.meta{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:14px;
margin-bottom:30px;
}

.meta-card{
background:#0f0f12;
border:1px solid #1f1f23;
border-radius:16px;
padding:18px;
transition:.2s;
}

.meta-card:hover{
transform:translateY(-2px);
}

body.light .meta-card{
background:#ffffff;
border-color:#e5e7eb;
}

.meta-card .label{
font-size:11px;
text-transform:uppercase;
opacity:.6;
margin-bottom:8px;
letter-spacing:.1em;
}

.meta-card .value{
font-size:14px;
line-height:1.6;
}

.section{
background:#0f0f12;
border:1px solid #1f1f23;
border-radius:18px;
padding:22px;
margin-bottom:18px;
transition:.2s;
}

.section:hover{
border-color:#2a2a30;
}

body.light .section{
background:#ffffff;
border-color:#e5e7eb;
}

.section h2{
font-size:18px;
font-weight:600;
margin-bottom:14px;
display:flex;
gap:8px;
align-items:center;
}

.section-number{
color:#6366f1;
font-weight:700;
}

.clause{
font-size:14px;
line-height:1.75;
margin-bottom:10px;
padding-left:10px;
border-left:2px solid rgba(99,102,241,.4);
}

.clause:hover{
border-color:#6366f1;
}

ul{
margin-left:20px;
margin-top:10px;
}

li{
margin-bottom:8px;
line-height:1.7;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:16px;
margin-top:28px;
}

.card{
background:#0f0f12;
border:1px solid #1f1f23;
border-radius:16px;
padding:18px;
transition:.2s;
}

.card:hover{
transform:translateY(-2px);
border-color:#2a2a30;
}

body.light .card{
background:#ffffff;
border-color:#e5e7eb;
}

.card h3{
margin-bottom:8px;
font-size:16px;
}

.card p{
font-size:14px;
opacity:.85;
line-height:1.6;
}

.footer{
margin-top:34px;
padding-top:16px;
border-top:1px solid #1f1f23;
font-size:13px;
opacity:.6;
line-height:1.7;
}

::-webkit-scrollbar{
width:8px;
}
::-webkit-scrollbar-thumb{
background:#2a2a30;
border-radius:10px;
}
</style>
</head>

<body>

<div class="topbar">
<div>Terms</div>
<div class="icons">
<span onclick="location.href='dashboard.html'">Dashboard</span>
<span onclick="toggleTheme()">🌓</span>
</div>
</div>

<div class="wrapper">

<div class="hero">
<h1 id="heroTitle"></h1>
<p id="heroDesc"></p>
</div>

<div class="meta" id="metaBox"></div>

<div id="sections"></div>

<div class="grid" id="extras"></div>

<div class="footer" id="footer"></div>

</div>

<script>
function toggleTheme(){
document.body.classList.toggle("light")
localStorage.setItem("theme",document.body.classList.contains("light")?"light":"dark")
}
if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light")
}

async function loadTOS(){
const res = await fetch("TOS.json")
const data = await res.json()

document.getElementById("heroTitle").textContent =
data.hero?.title || "Terms of Service"

document.getElementById("heroDesc").textContent =
data.hero?.description || "Please review these Terms carefully."

const metaBox = document.getElementById("metaBox")
metaBox.innerHTML=""

if(data.meta){
Object.entries(data.meta).forEach(([k,v])=>{
const div=document.createElement("div")
div.className="meta-card"
div.innerHTML=`<div class="label">${k}</div><div class="value">${v}</div>`
metaBox.appendChild(div)
})
}

const sections = document.getElementById("sections")
sections.innerHTML=""

if(Array.isArray(data.sections)){
data.sections.forEach((s,i)=>{
const div=document.createElement("div")
div.className="section"

let html=`<h2><span class="section-number">${i+1}.</span> ${s.title || "Untitled Section"}</h2>`

if(Array.isArray(s.content)){
s.content.forEach((c,index)=>{
html+=`<div class="clause">${i+1}.${index+1} ${c}</div>`
})
}
else if(typeof s.content === "string"){
html+=`<div class="clause">${i+1}.1 ${s.content}</div>`
}

if(Array.isArray(s.list)){
html+="<ul>"
s.list.forEach(li=>{
html+=`<li>${li}</li>`
})
html+="</ul>"
}

div.innerHTML=html
sections.appendChild(div)
})
}

const extras = document.getElementById("extras")
extras.innerHTML=""

if(data.extras?.cards){
data.extras.cards.forEach(c=>{
const div=document.createElement("div")
div.className="card"
div.innerHTML=`<h3>${c.title}</h3><p>${c.content}</p>`
extras.appendChild(div)
})
}

document.getElementById("footer").textContent =
(data.extras?.footer || "Terms of Service") +
" | Last Updated: " +
(data.lastUpdated || "Unknown")
}

loadTOS()
</script>

</body>
</html>
