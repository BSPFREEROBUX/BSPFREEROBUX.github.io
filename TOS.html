<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terms of Service</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
}
html{
scroll-behavior:smooth;
}
body{
font-family:'Inter',sans-serif;
background:
radial-gradient(circle at top left, rgba(99,102,241,.20), transparent 26%),
radial-gradient(circle at top right, rgba(59,130,246,.12), transparent 28%),
#07070a;
color:#e5e7eb;
min-height:100vh;
overflow-x:hidden;
}
body.light{
background:
radial-gradient(circle at top left, rgba(99,102,241,.10), transparent 26%),
radial-gradient(circle at top right, rgba(59,130,246,.08), transparent 28%),
#f8fafc;
color:#111827;
}
.topbar{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
display:flex;
align-items:center;
justify-content:space-between;
padding:16px 24px;
background:rgba(7,7,10,.78);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,.06);
}
body.light .topbar{
background:rgba(255,255,255,.78);
border-bottom:1px solid #e5e7eb;
}
.brand{
font-size:13px;
font-weight:800;
letter-spacing:.16em;
text-transform:uppercase;
opacity:.9;
}
.actions{
display:flex;
gap:10px;
}
.btn{
padding:10px 16px;
border-radius:14px;
border:1px solid rgba(255,255,255,.08);
background:rgba(255,255,255,.03);
color:inherit;
cursor:pointer;
font-size:13px;
font-weight:700;
transition:.2s ease;
user-select:none;
}
.btn:hover{
transform:translateY(-2px);
background:rgba(99,102,241,.12);
border-color:rgba(99,102,241,.28);
}
body.light .btn{
background:#fff;
border-color:#e5e7eb;
}
.wrapper{
width:min(1180px,calc(100% - 28px));
margin:0 auto;
padding-top:106px;
padding-bottom:56px;
}
.hero{
position:relative;
overflow:hidden;
padding:42px 44px;
border-radius:28px;
background:
linear-gradient(135deg, rgba(17,17,20,.98), rgba(13,13,18,.96) 58%, rgba(17,17,20,.98)),
linear-gradient(180deg, rgba(99,102,241,.16), transparent);
border:1px solid rgba(255,255,255,.06);
box-shadow:0 20px 60px rgba(0,0,0,.28);
margin-bottom:24px;
}
body.light .hero{
background:
linear-gradient(135deg, #ffffff, #f8fafc 58%, #ffffff),
linear-gradient(180deg, rgba(99,102,241,.10), transparent);
border-color:#e5e7eb;
box-shadow:0 20px 60px rgba(15,23,42,.06);
}
.hero::before{
content:"";
position:absolute;
inset:-1px;
background:radial-gradient(circle at 85% 20%, rgba(99,102,241,.24), transparent 26%);
pointer-events:none;
}
.hero h1{
position:relative;
z-index:1;
font-size:52px;
line-height:1;
font-weight:900;
letter-spacing:-2px;
text-transform:uppercase;
background:linear-gradient(180deg,#fff,#c7d2fe);
-webkit-background-clip:text;
background-clip:text;
color:transparent;
}
body.light .hero h1{
background:linear-gradient(180deg,#0f172a,#334155);
-webkit-background-clip:text;
background-clip:text;
color:transparent;
}
.hero p{
position:relative;
z-index:1;
margin-top:16px;
max-width:920px;
font-size:15px;
line-height:1.9;
opacity:.82;
}
.meta{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:16px;
margin-bottom:24px;
}
.meta-card{
position:relative;
overflow:hidden;
padding:20px 20px 18px;
border-radius:22px;
background:linear-gradient(180deg, rgba(15,15,19,.98), rgba(12,12,15,.98));
border:1px solid rgba(255,255,255,.06);
box-shadow:0 12px 30px rgba(0,0,0,.16);
transition:.22s ease;
}
.meta-card:hover{
transform:translateY(-2px);
border-color:rgba(99,102,241,.32);
box-shadow:0 16px 40px rgba(99,102,241,.08);
}
body.light .meta-card{
background:#fff;
border-color:#e5e7eb;
box-shadow:0 12px 30px rgba(15,23,42,.05);
}
.meta-card::after{
content:"";
position:absolute;
right:-58px;
top:-58px;
width:160px;
height:160px;
border-radius:50%;
background:radial-gradient(circle, rgba(99,102,241,.18), transparent 68%);
pointer-events:none;
}
.label{
font-size:11px;
font-weight:800;
letter-spacing:.14em;
text-transform:uppercase;
opacity:.55;
margin-bottom:10px;
}
.value{
font-size:14px;
line-height:1.85;
opacity:.96;
}
#sections{
display:flex;
flex-direction:column;
gap:18px;
}
.section{
position:relative;
overflow:hidden;
border-radius:26px;
background:linear-gradient(180deg, rgba(15,15,19,.98), rgba(12,12,16,.98));
border:1px solid rgba(255,255,255,.06);
box-shadow:0 12px 32px rgba(0,0,0,.15);
transition:.24s ease;
}
.section:hover{
transform:translateY(-2px);
border-color:rgba(99,102,241,.34);
box-shadow:0 18px 46px rgba(99,102,241,.08);
}
body.light .section{
background:#fff;
border-color:#e5e7eb;
box-shadow:0 12px 30px rgba(15,23,42,.05);
}
.section-header{
display:flex;
align-items:flex-start;
gap:14px;
padding:22px 24px;
border-bottom:1px solid rgba(255,255,255,.06);
background:linear-gradient(90deg, rgba(99,102,241,.12), transparent 68%);
}
body.light .section-header{
border-bottom:1px solid #e5e7eb;
background:linear-gradient(90deg, rgba(99,102,241,.09), transparent 68%);
}
.section-number{
display:flex;
align-items:center;
justify-content:center;
flex:0 0 auto;
width:42px;
height:42px;
border-radius:14px;
background:rgba(99,102,241,.18);
border:1px solid rgba(99,102,241,.22);
color:#c7d2fe;
font-size:15px;
font-weight:900;
letter-spacing:-.02em;
}
body.light .section-number{
color:#4338ca;
background:rgba(99,102,241,.10);
border-color:rgba(99,102,241,.15);
}
.section-title{
font-size:22px;
line-height:1.25;
font-weight:800;
letter-spacing:-.5px;
padding-top:4px;
}
.section-content{
padding:18px;
display:flex;
flex-direction:column;
gap:12px;
}
.clause{
position:relative;
padding:16px 18px 16px 22px;
border-radius:18px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.05);
line-height:1.9;
font-size:14px;
transition:.2s ease;
overflow:hidden;
}
.clause::before{
content:"";
position:absolute;
left:0;
top:0;
bottom:0;
width:4px;
background:linear-gradient(180deg,#6366f1,#8b5cf6);
opacity:.95;
}
.clause:hover{
transform:translateX(3px);
background:rgba(99,102,241,.09);
border-color:rgba(99,102,241,.26);
}
body.light .clause{
background:#f8fafc;
border-color:#e5e7eb;
}
body.light .clause:hover{
background:#eef2ff;
}
.clause-number{
display:inline-block;
font-weight:800;
color:#a5b4fc;
margin-right:8px;
min-width:44px;
}
body.light .clause-number{
color:#4338ca;
}
.footer{
margin-top:28px;
padding-top:20px;
border-top:1px solid rgba(255,255,255,.06);
text-align:center;
font-size:13px;
line-height:1.8;
opacity:.65;
}
body.light .footer{
border-top:1px solid #e5e7eb;
}
::-webkit-scrollbar{
width:10px;
}
::-webkit-scrollbar-thumb{
background:#2a2a34;
border-radius:999px;
}
body.light ::-webkit-scrollbar-thumb{
background:#cbd5e1;
}
@media(max-width:760px){
.wrapper{
width:min(100% - 18px,1180px);
padding-top:92px;
}
.hero{
padding:28px 22px;
border-radius:24px;
}
.hero h1{
font-size:34px;
letter-spacing:-1.3px;
}
.hero p{
font-size:14px;
line-height:1.8;
}
.section-header{
padding:18px;
gap:12px;
}
.section-title{
font-size:18px;
}
.section-number{
width:38px;
height:38px;
border-radius:12px;
font-size:14px;
}
.section-content{
padding:14px;
}
.clause{
padding:14px 14px 14px 18px;
font-size:13px;
line-height:1.8;
}
.topbar{
padding:14px 16px;
}
.btn{
padding:9px 13px;
font-size:12px;
}
}
</style>
</head>
<body>
<div class="topbar">
<div class="brand">Terms</div>
<div class="actions">
<div class="btn" onclick="location.href='dashboard.html'">Dashboard</div>
<div class="btn" onclick="toggleTheme()">🌓</div>
</div>
</div>

<div class="wrapper">
<div class="hero">
<h1 id="heroTitle"></h1>
<p id="heroDesc"></p>
</div>

<div class="meta" id="metaBox"></div>

<div id="sections"></div>

<div class="footer" id="footer"></div>
</div>

<script>
function toggleTheme(){
document.body.classList.toggle("light")
localStorage.setItem("theme",document.body.classList.contains("light")?"light":"dark")
}

if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light")
}

function cleanText(s){
return String(s || "").replace(/\*/g,"").trim()
}

async function loadTOS(){
const res = await fetch("tos.txt")
const text = await res.text()

const lines = text
.split("\n")
.map(line=>line.trim())
.filter(Boolean)
.map(cleanText)

const heroTitle = document.getElementById("heroTitle")
const heroDesc = document.getElementById("heroDesc")
const metaBox = document.getElementById("metaBox")
const sections = document.getElementById("sections")
const footer = document.getElementById("footer")

heroTitle.textContent = lines[0] || "Terms of Service"
heroDesc.textContent = lines[1] || ""

metaBox.innerHTML = ""
sections.innerHTML = ""

let i = 2

while(i < lines.length && !/^\d+\.$/.test(lines[i])){
const key = lines[i]
const value = lines[i + 1] || ""
const card = document.createElement("div")
card.className = "meta-card"
card.innerHTML = `<div class="label">${key}</div><div class="value">${value}</div>`
metaBox.appendChild(card)
i += 2
}

while(i < lines.length){
if(/^\d+\.$/.test(lines[i])){
const number = lines[i].replace(".","")
const title = lines[i + 1] || "Untitled"
const section = document.createElement("div")
section.className = "section"
let html = `<div class="section-header"><div class="section-number">${number}</div><div class="section-title">${title}</div></div><div class="section-content">`
i += 2
while(i < lines.length && !/^\d+\.$/.test(lines[i])){
const line = lines[i]
const match = line.match(/^(\d+\.\d+)\s+(.*)$/)
if(match){
html += `<div class="clause"><span class="clause-number">${match[1]}</span>${match[2]}</div>`
}else{
html += `<div class="clause">${line}</div>`
}
i++
}
html += `</div>`
section.innerHTML = html
sections.appendChild(section)
}else{
i++
}
}

footer.textContent = "Terms of Service • Last Updated " + new Date().toISOString().split("T")[0]
}

loadTOS()
</script>
</body>
</html>
